let gCat='all', hCat='all';

G.push(

  // ── BUSINESS & INVESTING ─────────────────────────────────────────────────
  {n:"Cindy Eckert (Whitehead)",e:"#314,#425",c:"biz",d:"Founder of Sprout Pharmaceuticals. Got FDA approval for flibanserin — the first drug for female sexual dysfunction — after 2 previous companies had failed to do so. Sold the company for $1 billion, watched the acquirer fail to market it, then bought it back for $1. Her negotiating principle: know your opposition's arguments better than they know them, and be the most prepared person in every room, always."},
  {n:"Scott Belsky",e:"#336",c:"biz",d:"Behance founder and Adobe Chief Product Officer, author of The Messy Middle. His insight: the period between a project's exciting launch and its eventual success is when most people quit — and it's also where the most important skills get forged. Discusses how to maintain momentum, manage energy (not just time), and make decisions when you have the least information and the highest uncertainty."},
  {n:"Gary Keller",e:"#401",c:"biz",d:"Founder of Keller Williams Realty (world's largest real estate company by agent count) and author of The ONE Thing. His central thesis: extraordinary results always come from narrowing your focus to a single most-important thing. The 'domino effect': small actions done consistently knock over progressively larger ones. He rebuilt Keller Williams from near-collapse during the 2008 housing crisis."},
  {n:"Julie Rice",e:"#372",c:"biz",d:"SoulCycle co-founder who built a cult brand out of a commodity by obsessing over instructor quality and community. Her insight: you can charge premium prices for any experience if you make people feel genuinely seen. Discusses taming anxiety as a leadership skill, mastering difficult conversations, and why the culture you build in the first ten employees is the culture you'll have at ten thousand."},
  {n:"Bozoma Saint John",e:"#288",c:"biz",d:"Former head of marketing at Apple Music, Uber, and Netflix CMO. Discusses her path from Ghana to Silicon Valley, from Spike Lee film sets to Apple's WWDC stage. Her WWDC 2016 Apple Music presentation — introducing Apple Music to skeptical developers with hip-hop — is considered one of the decade's best tech stage performances. Her philosophy: authenticity is not a brand strategy, it's a prerequisite for any strategy that works long-term."},
  {n:"Mike Maples Jr. & Andy Rachleff",e:"#397",c:"biz",d:"Two veteran Silicon Valley investors discuss the two questions every entrepreneur must answer: 'Who is your customer?' and 'What is your value proposition?' Rachleff created the concept of 'product-market fit' and argues most founders answer these questions in the wrong order. Maples brings his thunder lizard framework. One of the archive's most concentrated discussions of early-stage company building."},
  {n:"Catherine Hoke",e:"#293",c:"biz",d:"Founder of Defy Ventures, which brings entrepreneurship training into maximum-security prisons. Her core belief: the skills that help people survive in criminal environments — resourcefulness, resilience, leadership, risk calculation — are exactly the skills needed to build legitimate businesses. She describes the moment a hardened lifer broke down in a business pitch competition as the most powerful thing she'd witnessed in any boardroom."},
  {n:"Liz Lambert",e:"#320",c:"biz",d:"Boutique hotel entrepreneur who transformed neglected properties in Austin and Marfa into cult-destination experiences. Discusses the art of hospitality as creating an environment where guests feel genuinely seen rather than processed. Her design philosophy: everything should tell a story about the specific place it's in — the history, the landscape, the people. She opposes the homogenization of the hotel industry."},
  {n:"Frank Blake",e:"#303",c:"biz",d:"Former Home Depot CEO who built a remarkable culture of recognition at scale — 400,000 employees. Wrote personal thank-you letters to frontline employees who went above and beyond. His 'crazy good turns' philosophy: the best cultures are built by leaders who notice and celebrate small acts of generosity in real time, not through formal recognition programs. One of the most practical episodes on organizational culture in the archive."},
  {n:"Doug McMillon",e:"#345",c:"biz",d:"Walmart CEO — the largest private employer in the world. Started unloading trucks at a Walmart distribution center as a summer associate at 17. Discusses how to lead a 2.3 million-person organization through transformation without losing its core identity, why culture change at scale requires modeling new behavior personally before changing policy, and the peculiar challenges of a company whose decisions affect entire communities."},
  {n:"Karlie Kloss",e:"#307",c:"biz",d:"Supermodel who taught herself to code and founded Kode With Klossy, coding camps for young women that have reached tens of thousands of girls. Discusses her decision to treat visibility as leverage for access rather than income, how she thinks about building a public persona that aligns with genuine values, and why she believes access to technical education is a more powerful equalizer than almost any other intervention."},
  {n:"Whitney Wolfe Herd",e:"#316",c:"tech",d:"Bumble founder and CEO. Left Tinder after sexual harassment and discrimination, then built a competing product with one design constraint: women must make the first move. That single rule changed the emotional dynamics of every interaction on the platform. Became the youngest woman ever to take a company public in the US. Her argument: company culture is built on founder behavior in the first year, not on mission statements."},
  {n:"Harley Finkelstein",e:"#486",c:"biz",d:"Shopify President who worked his way through law school running a t-shirt printing business. His mission: give every entrepreneur access to the same tools previously only available to large corporations. Discusses the future of commerce (back toward independent brands), why he shares almost everything transparently with his team, and the specific operational changes that allowed Shopify to scale during COVID."},
  {n:"Peter Mallouk",e:"#356",c:"biz",d:"President of Creative Planning, one of America's largest independent wealth management firms. Named 'best independent financial advisor' by Barron's three consecutive years. Discusses the most common wealth-destroying mistakes (trying to time markets, paying excessive fees, emotional investing), what actually works over long periods, and how to think about quality of life vs. net worth as measures of financial success."},
  {n:"Brad Feld (Unplugging)",e:"#448",c:"biz",d:"The episode's most cited passage: Feld's description of completely disconnecting for a month every year — no email, no calls, no checking in. Most of his peers predicted disaster; nothing bad happened. His insight: most urgency is manufactured. The real disasters in any business are slow-moving, and being genuinely unreachable for a month doesn't cause them or prevent them. What it does do is allow real recovery."},
  {n:"Mike Novogratz",e:"#451",c:"biz",d:"Galaxy Digital CEO. Former Goldman Sachs partner who had a transformative ayahuasca experience in 2017 and became one of crypto's most prominent investors. His candor about his 2018 Bitcoin losses — he publicly predicted $40K, it crashed to $3K — is exceptional in a world where finance professionals almost never admit specific mistakes publicly. Discusses the psychology of managing through massive public failure."},
  {n:"Rana el Kaliouby",e:"#423",c:"tech",d:"CEO of Affectiva (sold to Smart Eye for $73.5M) and AI researcher. Her company built AI that can read human emotional states from facial expressions in real time. Discusses the ethics of emotion AI, what it means to have machines that can detect our feelings before we've consciously processed them, and how she navigated being a Muslim woman building a tech company after moving from Egypt to MIT."},

  // ── MEDIA & WRITING ADDITIONS ────────────────────────────────────────────
  {n:"Nick Thompson",e:"#311",c:"media",d:"WIRED editor-in-chief. Discusses how to cover technology with appropriate skepticism — neither breathless boosterism nor reflexive pessimism. Argues that the most important stories are the ones that reveal how technology actually changes human behavior rather than how it was supposed to. Competitive cyclist who discusses how physical performance feeds cognitive clarity."},
  {n:"Steve Jurvetson",e:"#317,#404",c:"biz",d:"DFJ VC partner and one of the first investors in Elon Musk's companies. A collector of rocket parts, vintage computers, and radical ideas. His investment thesis: back founders who are working on problems so large that only a company can solve them. His personal collection includes moon rocks, the world's oldest computer, and SpaceX hardware. Books I've Loved: one of the show's most unusual reading lists."},
  {n:"Eric Schmidt",e:"#367",c:"tech",d:"Former Google CEO. The episode is primarily about Bill Campbell — 'the trillion-dollar coach' who mentored Schmidt, Steve Jobs, Jeff Bezos, and dozens of Silicon Valley's most powerful leaders without ever taking equity or public credit. Campbell's philosophy: leaders succeed by building teams, not by being individually brilliant. He never gave advice without first asking questions."},
  {n:"David Rubenstein",e:"#495",c:"biz",d:"Carlyle Group co-founder. Discusses raising the first $5M for Carlyle (rejected 42 times before succeeding), advising presidents, and his 'patriotic philanthropy' — buying and restoring national treasures including copies of the Magna Carta and the Declaration of Independence. Now one of America's most prominent interviewers of leaders. Sprints every day and takes the stairs to maintain urgency."},
  {n:"Tyler Cowen",e:"#413",c:"media",d:"Economist, blogger (Marginal Revolution), author of Average Is Over. His concept of 'mood affiliation': the tendency to adopt beliefs that match your emotional state rather than the evidence, which he considers the primary driver of bad thinking. His dining habit: always eat at the place no one recommends, because those are the places with the best risk-reward ratio. One of the most intellectually eclectic guests in the archive."},
  {n:"Lori Gottlieb",e:"#415",c:"medicine",d:"Therapist and author of Maybe You Should Talk to Someone. Her insight: the stories we tell about ourselves are almost always the primary obstacle to change — and most people need help noticing that the story is a story rather than a fact. Her book interweaves her own therapy process with four patient stories, demonstrating that the psychological patterns she treats in others are identical to the ones she carries herself."},
  {n:"Guy Raz",e:"#462,#489",c:"media",d:"Host of How I Built This. First episode: building a great podcast, managing depression, podcast ecosystem predictions. Second episode reverses roles — Raz interviews Tim for How I Built This, covering Tim's near-suicide at Princeton, the BrainQUICKEN origin story, and the specific decisions behind the 4-Hour Workweek. One of the most autobiographically revealing conversations Tim has given in the entire archive."},
  {n:"Kara Swisher (Tech Journalism)",e:"#218",c:"media",d:"Tech's most feared journalist. The episode includes her description of sliding a CEO's own emails across the table during an interview to confront him with contradictions. Her preparation method: she reads every document, remembers every statement, and cross-references everything. Her philosophy: most tech journalism is captured by its subjects because journalists want continued access — she decided early that access was less valuable than independence."},
  {n:"James Cameron (Impossible Goals)",e:"#346",c:"film",d:"The practical lesson from Cameron's career: set goals before the technology to achieve them exists, then trust that technology will arrive. He did this for both Titanic (inventing underwater photography techniques) and Avatar (pioneering motion-capture CGI). The goal drives innovation; technology doesn't constrain the goal. His descent to the Mariana Trench was research for Avatar's sequels — he couldn't direct underwater scenes without experiencing the deepest ocean personally."},
  {n:"Maria Popova (Brain Pickings)",e:"#39,#92",c:"media",d:"Two appearances. First: the origin of Brain Pickings as a weekly email to seven friends while working in advertising. Second: how to be interesting, creating more time in a day, how to start a successful blog. Her rules: only write about things that genuinely surprise or move you; never write for SEO or virality; maintain absolute editorial independence regardless of financial pressure. She has run Brain Pickings for 15+ years without advertising."},
  {n:"A.J. Jacobs (Gratitude Chain)",e:"#211,#344",c:"media",d:"Two appearances. First: The Year of Living Biblically — a year following every Bible rule literally. Key discovery: acting grateful made him feel grateful, not the other way around. Action precedes emotion. Second: 10 strategies to be happier through gratitude, centered on his project of personally thanking every person in his morning coffee supply chain. Over 1,000 people across 3 continents."},
  {n:"Morgan Spurlock",e:"#150",c:"film",d:"Documentary filmmaker (Super Size Me, Inside Man, Where in the World is Osama Bin Laden?). His approach: be your own subject when no one else will agree to be filmed the way you need. Self-describes as a 'professional storyteller' — the form is secondary to the story. Discusses how he pitches ideas to networks, why he chooses topics that make people uncomfortable, and his childhood of drawing his own comic books."},
  {n:"Dan Ariely",e:"(referenced)",c:"science",d:"Behavioral economist and author of Predictably Irrational, referenced throughout the show for his research on cognitive biases and irrational decision-making. His core finding: humans are predictably irrational in mappable ways — the same biases show up across cultures, income levels, and education levels. Most referenced for his work on loss aversion, the IKEA effect, and the relationship between effort and perceived value."},
  {n:"Ezra Klein (Vox)",e:"#208",c:"media",d:"Vox founder. Built Vox on the premise that the media's job is not to tell people what happened but to explain why it matters. Treats every piece as a chance to genuinely understand something rather than to perform understanding. Has written candidly about how his own confirmation biases shape his analysis — a level of epistemic transparency rare in political journalism. Daily meditator and voracious cross-disciplinary reader."},

  // ── SCIENCE, HEALTH & TECH ───────────────────────────────────────────────
  {n:"Nick Szabo (Crypto Pioneer)",e:"#244",c:"tech",d:"Cryptographer and legal scholar who created the concept of smart contracts and is widely considered one of the most likely candidates for being Satoshi Nakamoto. Co-hosted with Naval Ravikant. Discusses the deep history of money as a social technology, why decentralization is fundamentally a political rather than technical question, and the long arc from commodity money to cryptocurrency. One of the rarest public appearances in the archive."},
  {n:"Murray Carter",e:"#236",c:"adventure",d:"18th-generation Yoshimoto Bladesmith — one of only a handful of Westerners ever certified in the traditional Japanese knife-making method, after 7 years as a live-in apprentice in Japan. His philosophy of Shokunin: the artisan who devotes an entire lifetime to mastering a single craft, with the explicit goal of improving slightly every day until death. The immigration paperwork that allowed him to stay in the US listed his occupation as 'Alien of Extraordinary Ability.'"},
  {n:"Danielle & Astro Teller",e:"#77",c:"tech",d:"Astro Teller is CEO of X (Google's moonshot factory). His framework for killing projects early: teams are rewarded for identifying fatal flaws in their own projects as quickly as possible, because the cost of discovering a fatal flaw at year 3 vs. month 3 is enormous. His wife Danielle Teller is a physician and author. The episode draws surprising connections between how you run a moonshot lab, how medicine handles diagnostic uncertainty, and what makes relationships last."},
  {n:"Stewart Brand",e:"#281",c:"science",d:"Whole Earth Catalog creator, Long Now Foundation co-founder. His current obsession: de-extinction — using genetic technology to bring back extinct species. Argues that the passenger pigeon and woolly mammoth can and should be revived. Also discusses the Long Now Clock — a 10,000-year mechanical clock being built inside a mountain in Texas to promote long-term thinking. Cities as the most efficient and environmentally friendly human structures ever invented."},
  {n:"Tim O'Reilly",e:"#278",c:"tech",d:"O'Reilly Media founder, 'Web 2.0' coiner. His framework for spotting technological trends early: follow the money to wherever bottlenecks are forming. Argues most predictions about AI are wrong because people treat it as a replacement for humans rather than an amplifier of humans — the same mistake made about previous automation waves. His insight about network effects: platforms that help their users become more successful always win."},
  {n:"M. Sanjayan",e:"#285",c:"science",d:"Conservation scientist and CEO of Conservation International. His most memorable argument: we are not saving the environment for its own sake — we are saving it for ourselves, because human civilization depends on ecosystem services that we have not figured out how to replace. Discusses battling the busy trap as a conservationist in a world where conservation victories take decades and defeats happen overnight."},
  {n:"Jonathan Eisen",e:"#54",c:"science",d:"UC Davis evolutionary biologist and microbiome expert. Co-guest with Jessica Richman on the first serious mainstream microbiome conversation in the archive. Discusses what the science actually shows (vs. what companies claim), the extraordinary complexity of the gut-brain connection, and why this field is both genuinely exciting and massively over-hyped. His 'Overselling the Microbiome Award' blog is one of science communication's more useful correctives."},
  {n:"Mark Plotkin",e:"#469",c:"science",d:"Ethnobotanist who has spent 40 years in the Amazon documenting medicinal plant knowledge from indigenous tribes. His most provocative argument: more useful medicines likely lie undiscovered in the Amazon than in all the world's pharmaceutical libraries combined. Discusses how to identify real vs. fake shamans, the distinction between legitimate ayahuasca ceremonies and tourist psychedelic tourism, and why the destruction of the Amazon is also the destruction of a pharmaceutical library."},
  {n:"Steven Rinella",e:"#470,#482",c:"adventure",d:"Host of MeatEater and one of America's most important hunting writers. Argues that hunting is not a sport but a reconnection to the natural world — and that the environmental movement's rejection of hunters as allies is one of its greatest strategic mistakes. Episode #482 is a short introduction to true wilderness survival skills, covering navigation, fire, water, and shelter with practical specificity."},
  {n:"Martin Gibala",e:"#217",c:"medicine",d:"McMaster exercise physiologist whose research showed you can achieve the cardiovascular adaptations of 45 minutes of moderate exercise with just 3 x 20-second all-out sprints (60 seconds total work). The 'one-minute workout' received enormous press attention. The deeper lesson: the dose-response curve for exercise is much steeper at the lower end than most people assume — even very short bursts of high-intensity work produce substantial benefits."},
  {n:"Adam Gazzaley",e:"#83",c:"science",d:"UCSF neuroscientist who builds video games that are FDA-approved medical treatments for ADHD. His game NeuroRacer was the first prescription digital therapeutic. His argument: the brain cannot distinguish between a real experience and a high-quality simulation — which means games can produce genuine neurological changes. The same neural plasticity that makes brains vulnerable to addiction can be harnessed for therapeutic purposes."},
  {n:"Art De Vany",e:"#239",c:"science",d:"Economist and evolutionary fitness pioneer who developed 'Evolutionary Fitness' a decade before paleo/ancestral health became mainstream. His approach: intermittent fasting, random high-intensity exercise (to mimic the unpredictable demands of hunter-gatherer life), no processed carbohydrates. At 80+ years old he remains one of the most physically impressive guests in the archive. His argument: aging is not destiny, it is the accumulated consequence of specific lifestyle choices."},
  {n:"Paul Stamets (Mycelium)",e:"#340",c:"science",d:"The most extraordinary personal story in the episode: Stamets took psilocybin mushrooms as a severely stuttering teenager — he climbed a tree during a storm and told himself repeatedly that he would stop stuttering. He came down from the tree and his stutter was gone. It has not returned. His mother subsequently took lion's mane mushrooms during end-stage cancer and her oncologist described her improvement as unusual. Neither story is scientifically explainable — both are verified."},
  {n:"Wim Hof (The Iceman)",e:"#102",c:"science",d:"The episode's most alarming story: Hof describes swimming under a 1-meter ice deck, losing the hole, going blind underwater (his retinas froze), and navigating back to the surface purely by feel. 'Shit happens,' he says. His stress hormone research is the episode's scientific core: his measured cortisol levels during extreme cold exposure were lower than those of office workers sitting at their desks. Most of what we call stress is self-generated, not environmentally caused."},
  {n:"Dom D'Agostino (Ketosis)",e:"#117",c:"science",d:"The 500-lb deadlift after a 7-day fast is the episode's most cited moment — not as a fitness recommendation but as a demonstration that the ketogenic state is not catabolic in the way conventional nutrition science assumed. D'Agostino's broader argument: the medical establishment's fear of dietary fat and preference for carbohydrates is one of the most consequential scientific errors of the 20th century."},
  {n:"Ed Cooke (Memory)",e:"#52,#53",c:"science",d:"The memory palace technique in full detail across two episodes. Cooke's insight: memory is not a filing cabinet — it is a story-generating machine. The brain does not remember facts; it remembers experiences. Therefore the technique for memorizing any fact is to convert it into a bizarre, emotionally resonant, spatially located experience. The technique can be learned in hours and dramatically improves memory across all domains. Memrise, his company, applies this at scale."},

  // ── SPORT & ATHLETICS ADDITIONS ──────────────────────────────────────────
  {n:"Shaun White",e:"#140",c:"sport",d:"Three-time Olympic gold medalist in snowboarding. Born with Tetralogy of Fallot — a heart defect requiring multiple open-heart surgeries — with doctors predicting a 'sluggish' heart and limited activity. His parents never told him he couldn't do anything (except scuba dive), which he credits with eliminating fear at a formative age. Met Tony Hawk at age 5 at a local skate park and spent years trying to impress him enough to come over and introduce himself."},
  {n:"Joe De Sena (Spartan Race)",e:"#16",c:"sport",d:"Grew up in Queens with exposure to organized crime as a teenager. Used extreme endurance sport — marathon swimming, ultra-running, obstacle courses — to rebuild himself. Founded Spartan Race from a small Vermont farm and built it into the world's largest obstacle course company with 1M+ participants. His philosophy: modern comfort is a disease that breeds weakness. He puts his own children through the same obstacle courses as adult competitors."},
  {n:"Kelly Starrett (Mobility)",e:"#3,#64,#85",c:"sport",d:"Three-episode arc. #3 covers foundational movement principles with co-guest Dr. Justin Mager. #64 gives an insider's candid assessment of CrossFit — the goods, the bads, and the genuinely dangerous. #85 covers the 80/20 of mobility work: the specific interventions that address the majority of common movement problems in the shortest time. His book Becoming a Supple Leopard became the standard reference for movement quality."},
  {n:"Dave Camarillo (Guerrilla Jiu-Jitsu)",e:"#196",c:"sport",d:"One of the most successful combat sports coaches in the world — his students include UFC champions and world BJJ champions. His innovation: integrating judo's throwing techniques into BJJ at a time when the two disciplines were siloed. His broader competitive philosophy: the best advantage in any domain comes from combining knowledge that specialists in adjacent fields haven't integrated. The gap between disciplines is where the best opportunities live."},
  {n:"Ryan Flaherty (Speed Coach)",e:"#238",c:"sport",d:"Has trained more top-10 NFL Combine performers than any other coach. His signature discovery: most athletes' speed deficits trace to the same biomechanical source (limited hip extension), diagnosable via force plate testing. His protocols produce dramatic improvements in 8–12 weeks. His broader argument: most performance training is based on tradition rather than measurement — systematic testing of what actually works would transform most sports."},
  {n:"Charles Poliquin",e:"#91,#198",c:"sport",d:"World-renowned strength coach who trained Olympic athletes across 17 different sports over a 40-year career. First episode covers testosterone optimization, strength training fundamentals, and why most gym programs are structurally wrong. Second episode: his favorite mass-building program, nighttime routine for better sleep, and specific supplementation protocols. Known for being extraordinarily direct, frequently controversial, and almost always right."},
  {n:"Jason Khalipa (CrossFit)",e:"#246",c:"sport",d:"CrossFit Games world champion who simultaneously built a chain of CrossFit gyms. The most emotionally powerful moment: his daughter Ava's leukemia diagnosis during his peak competitive years. He describes using the mental frameworks from competitive athletics — process focus, controllables only, ruthless prioritization of what matters right now — to navigate the worst experience of his life. A practical model for applying competitive psychological tools to catastrophic adversity."},
  {n:"Dorian Yates (HIT)",e:"#235",c:"sport",d:"6x Mr. Olympia champion who trained only 4 days per week for under 45 minutes per session, using a single working set per exercise taken to absolute failure. His Blood and Guts approach is the most extreme application of high-intensity training ever systematically applied to professional bodybuilding. Now practices yoga and discusses plant-based nutrition — and is candid about the long-term physical cost of extreme muscle development on joints, tendons, and cardiovascular health."},
  {n:"Jason Nemer (AcroYoga)",e:"#182",c:"sport",d:"Co-founder of AcroYoga — the discipline combining acrobatics, yoga, and Thai massage. His argument: being literally held in the air by a partner creates a quality of physical and emotional trust that years of conversation cannot replicate. The vulnerability of entrusting your physical safety to another person — and the responsibility of being entrusted with theirs — produces a depth of connection that most people only experience in extreme circumstances."},
  {n:"Terry Laughlin",e:"#276",c:"sport",d:"Creator of Total Immersion swimming. The technique Tim Ferriss credits with teaching him to swim properly as an adult — introduced to him by Chris Sacca. Laughlin's insight: most people swim inefficiently because they fight the water rather than work with it. His method prioritizes eliminating drag before adding propulsion. The same principle applies across physical disciplines and domains: remove friction before adding force. He passed away in 2017; this was one of his final major interviews."},
  {n:"Maurice Ashley (Chess)",e:"#449",c:"sport",d:"The first Black chess Grandmaster in history — a path from the streets of Brooklyn through decades of competitive play to reaching the highest title in the game. Discusses the magic of chess as a tool for teaching abstract thinking to young people from disadvantaged backgrounds, how trash-talking in chess works as a psychological weapon (and why it backfired on him early in his career), and his current work bringing chess to underserved communities."},
  {n:"Phil Hellmuth (Poker)",e:"#260",c:"sport",d:"17-time World Series of Poker bracelet winner. His mental approach: play the person, not the cards. He can read physical tells and betting patterns with a precision he cannot fully articulate consciously. His 'poker brat' public persona — emotional outbursts, table rants — is at least partly calculated: many opponents underestimate him because they assume emotional = irrational. The episode is one of the archive's best discussions of using public perception strategically."},

  // ── PHILOSOPHY & RELATIONSHIPS ADDITIONS ─────────────────────────────────
  {n:"Marie Kondo (KonMari)",e:"#234",c:"philosophy",d:"The KonMari method — discard everything that does not spark joy, organize what remains by category — is the surface. The deeper philosophy is more interesting: the deliberate act of choosing what belongs in your life forces you to confront what you actually value versus what you've accumulated by inertia. Kondo views tidying as a form of spiritual practice that produces clarity not just about objects but about relationships, careers, and life direction."},
  {n:"Will MacAskill (EA)",e:"#120",c:"philosophy",d:"Oxford philosopher and Effective Altruism co-founder. His challenge: if you genuinely care about doing good, you should be as rigorous about your charitable impact as any other major decision. Which causes save the most lives per dollar? Which careers create the most impact? The answers are often counterintuitive and uncomfortable for people who give based on emotional resonance rather than evidence. One of the archive's most intellectually demanding episodes."},
  {n:"Phil Zimbardo",e:"#226",c:"philosophy",d:"Creator of the Stanford Prison Experiment. The experiment showed that ordinary college students assigned to 'guard' roles began abusing their 'prisoner' peers within days — and that Zimbardo himself was drawn into the situational dynamics despite knowing it was an experiment. His follow-on work on heroism: the same situational forces that produce evil can be deliberately harnessed to produce heroism. Heroism is a habit and a choice, not a personality trait."},
  {n:"Jack Kornfield (Buddhism)",e:"#300,#414",c:"philosophy",d:"Two appearances. First: finding freedom, love, and joy in the present — his most comprehensive overview of the Buddhist psychological framework. Second: how to find peace during COVID. His most distinctive contribution to the archive: the argument that genuine meditation practice requires working with difficulty and pain, not transcending them. The goal is not to eliminate emotion but to hold it with awareness."},
  {n:"Sharon Salzberg (Metta)",e:"#277",c:"philosophy",d:"The most detailed loving-kindness (metta) meditation instruction in the archive. Salzberg's argument: most Western practitioners focus on mindfulness of breath and skip the equally important practice of cultivating compassion — starting with yourself (which is the hardest part for most people), expanding to people you love, then to strangers, then to difficult people. The sequence is the practice. She co-founded IMS with Jack Kornfield in 1975."},
  {n:"Tara Brach (RAIN)",e:"#94",c:"philosophy",d:"One of the most listened-to meditation episodes in the entire archive. Her 'trance of unworthiness' — the background sense that something is fundamentally wrong with us — as the hidden driver of overwork, relationship problems, addiction, and anxiety. The RAIN practice (Recognize, Allow, Investigate, Nurture) is her primary teaching tool. Its power is in the 'Allow' step: most people skip directly from recognizing a difficult emotion to trying to fix it."},
  {n:"Alain de Botton (Philosophy as Therapy)",e:"#118",c:"philosophy",d:"Philosophy as a practical tool for daily emotional problems, not academic abstraction. His argument: philosophy was captured by universities and needs to be returned to its original purpose — helping people navigate anxiety, failure in love, the fear of death, and the question of how to spend a limited life. His School of Life is the institutional expression of this idea, now operating in cities worldwide."},
  {n:"Esther Perel (Desire)",e:"#241,#271,#418",c:"philosophy",d:"Three appearances covering progressively deeper territory. First: the fundamental tension between security and desire in long-term relationships. Second: intimacy, emotional baggage, and why we fall in love with people whose unresolved issues match our own. Third: relationships during quarantine — the lockdown as a stress test revealing which relationships had genuine depth versus those sustained by distraction. Her most practical episode for couples."},
  {n:"Jerry Colonna (Reboot)",e:"#373",c:"philosophy",d:"The 'CEO whisperer' — left VC after a breakdown, did years of psychological work, now coaches founders. His central question: 'How are you complicit in creating the conditions you say you don't want?' The book Reboot grew from his coaching practice. His insight: most startup failures that look like strategic failures are actually psychological failures. The founder who can't fire a co-founder, the CEO who micromanages, the leader who avoids conflict — these are trauma responses, not strategy failures."},
  {n:"Leo Babauta (Zen Habits)",e:"#488",c:"philosophy",d:"Creator of Zen Habits — one of the world's most read blogs on simplicity and habits. His own transformation: quit smoking, eliminated debt, ran ultramarathons, lost weight, changed careers — all through single-habit focus, one change at a time. He published everything without copyright from the beginning, believing open access spreads ideas more effectively than protection. Homeschools his six children. Unschooling as a philosophy of learning."},
  {n:"Dan Harris (10% Happier)",e:"#481",c:"philosophy",d:"The live on-air panic attack (traced to self-medicating post-Iraq war depression with cocaine and ecstasy) that led ABC's Dan Harris to meditation is the episode's origin story. His contribution to the archive: making meditation accessible to people who find the standard framing ('ancient wisdom,' 'spiritual practice') alienating. His book and podcast use the frame of a skeptical, secular journalist testing evidence-based claims."},
  {n:"Michael Gervais (FOPO)",e:"#256",c:"philosophy",d:"Sports psychologist for the Seattle Seahawks and multiple Olympic athletes. FOPO (fear of other people's opinions) as the primary psychological obstacle to peak performance — not fear of failure. His training approach with the Seahawks: build an internal performance standard completely independent of external reaction through systematic mindfulness training. The process contributed to their Super Bowl XLVIII championship."},
  {n:"Jim Dethmer (Above the Line)",e:"#434",c:"philosophy",d:"Executive coach whose above-the-line / below-the-line framework has become one of the most widely adopted leadership tools in Silicon Valley. The framework's power: it names a state (below the line: defensive, closed, victim) that everyone knows from experience but that most people have no language for, which means they have no leverage over it. The moment you can name it, you can change it."},

  // ── ADVENTURE & EXPLORATION ADDITIONS ────────────────────────────────────
  {n:"Alex Honnold (El Capitan)",e:"#160",c:"adventure",d:"The episode's central revelation: Honnold's emotional affect was tested in a brain scanner before his El Capitan free solo. His amygdala showed almost no activation in response to images that produce fear responses in normal subjects. The neuroscientist's interpretation: Honnold is not brave in the conventional sense — he genuinely processes frightening stimuli differently. His preparation made the fear irrelevant; the neurology made it manageable."},
  {n:"Jimmy Chin (Meru)",e:"#114",c:"adventure",d:"The Meru climb is described in unusual detail — the Shark's Fin on Mount Meru had defeated more elite climbing teams over 30 years than any other ascent in the Himalayas. Jimmy filmed it while simultaneously risking his life on an ascent few people believed was possible. The conversation about how to manage risk across a career of compounding dangerous decisions is the episode's most practically applicable section."},
  {n:"David Blaine (Breath Hold)",e:"#245",c:"adventure",d:"Blaine's 17-minute breath hold on live television is the episode's headline, but the deeper content is his description of the mental technology required: entering a state so deep that time distortion becomes the primary tool, dissociating from the sensation of oxygen deprivation without losing enough consciousness to drown. His training partner was a world-champion freediver. The episode is one of the archive's best explorations of voluntary control of the autonomic nervous system."},
  {n:"Caroline Paul (Risk)",e:"#151,#227",c:"adventure",d:"Two appearances. First: lessons from firefighting and luging on overcoming fear. Second: conquering fear and reducing anxiety. Both center on her core thesis: Western culture systematically teaches girls risk-aversion at the exact developmental window when boys learn to embrace it, producing measurable differences in adult confidence and career risk-taking. She is a licensed pilot, surfer, and paraglider who practices what she preaches."},
  {n:"Rolf Potts (Vagabonding)",e:"#41,#42",c:"adventure",d:"Two-part conversation on long-term travel as a philosophy. Potts's argument: time wealth is more valuable than money wealth, and most people have far more time wealth available than they realize — they just exchange it prematurely for financial security. His specific tactics: work abroad, house-sit, volunteer, slow travel, go to places no one is writing about. His most enduring insight: the best travel experiences happen in the gaps between planned activities."},
  {n:"Phil Keoghan (Amazing Race)",e:"#242",c:"adventure",d:"Host of The Amazing Race, 21 Emmy Awards. His 'No Opportunity Wasted' philosophy came from being trapped as a young diver in a sunken ship off New Zealand, certain he was going to die. He escaped. The experience produced a specific clarity about what mattered. His bucket list framework: don't make the list at the end of your life — make it now, when you still have time to do the things on it."},
  {n:"Ken Block (Gymkhana)",e:"#358",c:"adventure",d:"DC Shoes co-founder whose Gymkhana YouTube series (500M+ views) became one of the most-watched automotive content series in history. His DC Shoes insight: the brand grew because it was genuinely part of skateboarding culture rather than marketing to it. Gymkhana worked because it was authentic — Block actually drove like that. The lesson: subcultural authenticity cannot be manufactured, and audiences can detect the difference at a distance."},
  {n:"Samy Kamkar (Hacker)",e:"#74",c:"tech",d:"At 17, launched the Samy worm on MySpace — the fastest-spreading computer virus in history, infecting 1 million profiles in 24 hours. Subsequently became a white-hat security researcher. The episode covers how to optimize online dating profiles using behavioral psychology, how to open locked cars using electronic vulnerabilities, and how to hijack drones. One of the most genuinely surprising and eclectic conversations in the archive."},
  {n:"Sebastian Junger (Tribe)",e:"#161",c:"adventure",d:"The episode's most important argument: PTSD is not solely a biological response to trauma — it is partly a symptom of returning from the intense communal bonds of combat to a society defined by isolation, purposelessness, and comfort. Veterans who return to tight communities show much lower rates of PTSD than those who return to suburban isolation. The solution to some forms of mental illness may not be more treatment but more community."},

  // ── FOOD & CRAFT ADDITIONS ───────────────────────────────────────────────
  {n:"Murray Carter (Bladesmith)",e:"#236",c:"food",d:"The episode's title — 'The Alien of Extraordinary Ability' — refers to the immigration category that allowed Carter to stay in the US after 7 years as a live-in apprentice in Japan. He is one of the only Westerners to complete the traditional Yoshimoto Bladesmith apprenticeship. His philosophy of Shokunin: not just a person who makes knives, but a person who has devoted their life to the mastery of a single craft for its own sake, with the goal of improving every single day."},
  {n:"Nick Kokonas (Alinea)",e:"#341,#429",c:"food",d:"Two appearances. First: how Alinea was built and what it means to treat cooking as emotional communication. The Grant Achatz cancer story — designing menus during chemotherapy while unable to taste — is the episode's emotional center. Second: COVID-era conversation on resurrecting restaurants, Tock's skin-in-the-game reservation model, and his philosophy of investing in people over business models. One of the most entrepreneurially rich food conversations in the archive."},
  {n:"Eric Ripert (Buddhist Chef)",e:"#268",c:"food",d:"The episode is unusual for a chef interview because cooking is almost secondary to the conversation about Ripert's Buddhist practice. He meditates every morning before service and treats each dish as an opportunity for present-moment attention. His argument: the quality of consciousness you bring to the preparation of food is perceptible in the food itself — which is why his kitchen atmosphere is unusually calm for three-Michelin-star level."},
  {n:"Samin Nosrat (Salt Fat Acid Heat)",e:"#339",c:"food",d:"The episode captures Nosrat's pedagogy better than any review of her book: she physically demonstrates how salt, fat, acid, and heat produce their effects rather than describing them. Her insight on fear of cooking: it is almost always fear of failure when not following a recipe exactly — not fear of cooking itself. The moment you understand what you're trying to achieve (not how to follow instructions), the recipe becomes a suggestion rather than a constraint."},
  {n:"Joshua Skenes (Saison)",e:"#156",c:"food",d:"The chef behind Saison — one of America's most expensive and conceptually unusual restaurants, built around an open wood-fire hearth. Skenes approaches cooking as a spiritual practice. His sourcing: he grows, forages, and sources every ingredient personally. His philosophy: the quality of attention you bring to the preparation of food is transferred to the person eating it. He considers sourcing — not cooking — the most important part of his work."},
  {n:"Mark Bittman (Food Reform)",e:"#205",c:"food",d:"Former NYT food columnist, author of How to Cook Everything. His argument: the American food system is broken at the agricultural and political level, not the recipe level. Individual dietary choices matter less than the systemic incentives that determine what food is available and affordable. His VB6 (vegan before 6pm) is a pragmatic middle ground: most of the health benefits of veganism without the full commitment."},
  {n:"Andrew Zimmern (Recovery)",e:"#40",c:"food",d:"Host of Bizarre Foods. Origin story: was homeless and addicted in New York City in his late 20s, living on the streets, before getting sober and rebuilding through cooking. The episode is as much about recovery and resilience as food. His culinary philosophy: respect for a culture is expressed by eating what its people eat, not by politely declining what makes you uncomfortable. Has eaten in 170+ countries."},
  {n:"Sam Kass (White House Chef)",e:"#82",c:"food",d:"Simultaneously served as the Obama family's personal chef and as Senior Policy Advisor for Nutrition — one of the most unusual dual roles in American political history. The political battles required to change federal nutrition guidelines are as fascinating as the cooking. His insight: the gap between what nutrition science says and what federal policy recommends is almost entirely explained by agricultural industry lobbying."},

  // ── POLITICS & LEADERSHIP ADDITIONS ──────────────────────────────────────
  {n:"Cory Booker (Newark Mayor)",e:"#233",c:"politics",d:"The episode's most striking moment: Booker's description of going on a 10-day hunger strike during a standoff with the city of Newark, and his subsequent decision to move into public housing for 4+ months. Both decisions were made to restore credibility with constituents who felt he was governing from a distance. His daily practice of reading actual constituent communications before any briefing is one of the most practical leadership habits in the archive."},
  {n:"Madeleine Albright",e:"#437",c:"politics",d:"First female US Secretary of State. Her diplomatic brooch collection — wearing different pins as intentional signals (serpent for adversarial days, dove for hopeful ones) — is the episode's most memorable detail but not its most important. Her core insight: the most powerful tool in any negotiation is being more prepared than the other party expects you to be. She has never walked into a meeting without knowing the other side's interests better than they expected."},
  {n:"George Raveling",e:"#332,#438",c:"sport",d:"Legendary basketball coach who has coached at Iowa, USC, and Washington. He was standing next to Martin Luther King Jr. at the March on Washington when King gave the 'I Have a Dream' speech — and still has the original manuscript, which King handed to him afterward. Discusses what he learned from 60+ years of coaching, the great game of life, and how to practice self-leadership during the most difficult moments in history."},
  {n:"Frank Blake (Home Depot)",e:"#303",c:"biz",d:"The 'crazy good turns' philosophy in practice: Blake describes specific incidents of Home Depot employees who went extraordinary lengths for customers — carrying a generator miles to help someone whose family was on oxygen during a power outage — and the personal thank-you letters he wrote in response. His argument: recognition culture is built by individual acts of noticing, not by formal programs."},
  {n:"Doris Kearns Goodwin (Historians)",e:"#335",c:"media",d:"The episode's most practical section: Goodwin's discussion of how all four presidents she studied — Lincoln, FDR, LBJ, Teddy Roosevelt — responded to personal failure. All four went through periods of profound defeat that their contemporaries believed were permanent. All four used the experience to develop qualities they wouldn't have developed otherwise. Her insight: the quality of a leader is revealed not in their victories but in how they process catastrophic defeat."},

  // ── ADDITIONAL NOTABLE GUESTS ─────────────────────────────────────────────
  {n:"Kevin Rose (Biohacking)",e:"#1,#24,#129,#209",c:"tech",d:"Four appearances across the archive's history. The Random Show format — Tim and Kevin riffing on whatever they're currently experimenting with — produced some of the archive's most practical early content on biohacking before it was a mainstream term. Kevin's gut microbiome research, sleep tracking, and fasting experiments preceded most of the trends by 3–5 years. The show's origin episode (#1) captures both of them figuring out what the podcast was going to be."},
  {n:"Peter Diamandis (Abundance)",e:"#56,#90",c:"biz",d:"Two appearances. First: How to Think Like Elon Musk and Jeff Bezos — Diamandis explains 'moonshot thinking' using his XPRIZE framework. Second: answering listener questions including how to disrupt education via AI and what his morning routine looks like with twin four-year-olds jumping on the bed. His book Bold is the most practical guide to exponential technology thinking aimed at non-engineers."},
  {n:"Richard Koch (80/20 Investing)",e:"#466",c:"biz",d:"Turned $2M into $100M+ by applying the 80/20 principle to private equity investing: find the 20% of businesses that will generate 80% of returns, concentrate there, and ignore everything else. Discusses achieving unreasonable success by being unreasonably selective. His life philosophy: live in places you love (he lives in Gibraltar), do only the work you find genuinely fascinating, and say no to everything that doesn't meet both criteria."},
  {n:"Alex Blumberg (Gimlet)",e:"#58,#59",c:"media",d:"The two episodes that constitute the best practical guide to audio storytelling in the archive. Blumberg's rules: every great story has a protagonist who wants something and faces obstacles; the interview is not for information but for emotion; the best moments come when you stay silent after the answer. His own experience building Gimlet Media — documented in his own podcast Startup — illustrated every principle in real time, including the painful mistakes."},
  {n:"Patrick Arnold (Chemistry)",e:"#143",c:"science",d:"The world's most famous performance-enhancement chemist — the man behind the designer steroids that fueled the BALCO scandal involving Barry Bonds, Marion Jones, and others. Discusses the chemistry and pharmacology of performance-enhancing compounds with unusual frankness. His broader argument: the line between legitimate supplementation and doping is arbitrary and inconsistently applied, and the war on doping in sport is both unwinnable and hypocritical."},
  {n:"Bob Metcalfe (Ethernet)",e:"#297",c:"tech",d:"Inventor of Ethernet — the networking protocol connecting most of the world's computers — and Metcalfe's Law (network value grows proportionally to the square of connected users). Now a farmer in Maine, deliberately counterweighting his digital work. His observation about technological predictions: they are almost always wrong in timing and magnitude but right in direction. The internet was inevitable; the specific form it took was not."},
  {n:"Raoul Pal (Macro Trading)",e:"#63",c:"biz",d:"Co-founder of Real Vision, former Goldman Sachs executive. His macro framework: follow the debt cycle. The 2008 crisis, the European sovereign debt crisis, and most major market dislocations of the last 30 years were predictable from debt cycle analysis. His decision to 'retire' at 36 to Cayman Islands was actually a transition — he then built Real Vision into one of the most influential financial media companies of the decade."},
  {n:"Astro Teller (Moonshots)",e:"#77,#309",c:"tech",d:"Two appearances. First with Danielle Teller on Google X. Second: a solo deep dive on 10x thinking. His framework: 10x improvement is actually easier than 10% improvement because 10x requires abandoning your current approach entirely — freeing you from the constraints that make 10% so difficult. Google X's most counterintuitive practice: rewarding teams for killing their own projects early, because discovering a fatal flaw at month 3 vs. year 3 saves enormous resources."},
  {n:"Gabor Maté (Addiction)",e:"#298",c:"medicine",d:"Physician and author whose work on addiction has reframed how millions of people think about the subject. His core thesis: addiction is not a moral failing or a disease in the conventional sense — it is always a response to pain, rooted in trauma or adverse childhood experience. The question is never 'why the addiction?' but 'why the pain?' His discussion of ayahuasca as a tool for accessing and processing that underlying pain was one of the earliest serious treatments of the subject in mainstream media."},
  {n:"Stan Grof (LSD Research)",e:"#347",c:"medicine",d:"Czech psychiatrist who conducted approximately 4,500 LSD-assisted psychotherapy sessions before it was made illegal, then developed Holotropic Breathwork as an alternative that produces comparable states without pharmacological agents. At 87, still one of the most lucid voices on non-ordinary states of consciousness. His clinical observations across 50+ years of practice are an irreplaceable record of human psychological experience at the edge of ordinary awareness."},
  {n:"Rick Doblin (MAPS)",e:"#440",c:"medicine",d:"Founder of MAPS (Multidisciplinary Association for Psychedelic Studies) who has spent 35 years navigating the FDA approval process for MDMA-assisted psychotherapy. The 'psychedelic domino' concept: he believes MDMA's approval for PTSD will open regulatory pathways for psilocybin, ketamine, and other substances. His 35-year persistence in the face of institutional resistance is one of the most remarkable stories of patient advocacy in modern medicine."},
  {n:"Marcela Ot'alora (MDMA Therapy)",e:"#396",c:"medicine",d:"One of the world's only trained MDMA-assisted psychotherapy therapists. Discusses what actually happens in a session, how to become a psychedelic therapist, the crucial role of the therapist's own psychological work in their effectiveness, and the extraordinary results she has witnessed in patients with treatment-resistant PTSD. One of the most detailed accounts of therapeutic psychedelic practice available in any mainstream media format."},
  {n:"James Fadiman (Microdosing)",e:"#66",c:"science",d:"Has studied psychedelic compounds since the 1960s, when LSD was legal and in clinical use. His microdosing protocol (1/10th of a standard dose, one day on and two days off) is now practiced by millions of people worldwide following data he collected from self-experimenters over decades. The episode is one of the first serious mainstream treatments of microdosing — before it became a Silicon Valley cliché."},
  {n:"Hamilton Morris (Pharmacology)",e:"#337",c:"science",d:"Journalist and filmmaker behind Hamilton's Pharmacopeia (Vice). The archive's deepest discussion of psychoactive compound pharmacology — covering DMT, MDMA, mescaline, and obscure research chemicals with the depth of a specialist and the accessibility of a journalist. His argument: the current Schedule I/II/III system for classifying drugs is scientifically incoherent and pharmacologically arbitrary, and the harms of criminalization vastly exceed the harms of the drugs themselves."},
  {n:"Martin Polanco & Dan Engle",e:"#104",c:"medicine",d:"Two researchers studying ibogaine-assisted therapy for opioid addiction. Ibogaine — derived from the African Tabernanthe iboga plant — has produced near-miraculous results in some clinical settings: a single treatment producing lasting cessation of opioid addiction with minimal withdrawal symptoms. The episode is one of the first mainstream media treatments of ibogaine that was neither sensationalist nor dismissive."}
