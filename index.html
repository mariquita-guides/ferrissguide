G.push(

  // ── EPISODES 499–510 ──────────────────────────────────────────────────────
  {n:"Katie Haun",e:"#499",c:"biz",d:"Former federal prosecutor who investigated the dark web, drug markets, and the first major government Bitcoin seizure. Later became the first female general partner at Andreessen Horowitz and founded her own crypto fund. Her episode aired just as NFTs were exploding and she explained the mechanics and cultural meaning of NFTs before almost anyone else in mainstream media had. One of the most practically clarifying crypto conversations in the archive."},
  {n:"Steven Pressfield",e:"#501",c:"media",d:"Author of The War of Art, Gates of Fire, and The Legend of Bagger Vance. His concept of Resistance — the internal force blocking creative work — gets its most developed treatment here in The Artist's Journey framework. The distinction between the Hero's Journey (external adventure) and the Artist's Journey (internal initiation into one's own unique voice) is one of his most important later ideas. Also covers shadow careers: jobs that approximate your true calling without the full vulnerability of actually doing it."},
  {n:"Jordan Peterson",e:"#502",c:"philosophy",d:"Clinical psychologist and author of 12 Rules for Life and Maps of Meaning. Discusses psychedelics (his own experiences), the psychological meaning of Biblical stories, and the rules themselves in depth. Peterson's framework: order and chaos are the fundamental categories of experience, not good and evil — and the ideal is to walk the line between them. One of the most downloaded episodes of 2021. Also discusses his near-death experience from a rare autoimmune condition."},
  {n:"Walter Isaacson (CRISPR)",e:"#503",c:"science",d:"Biographer of Steve Jobs, Albert Einstein, and Benjamin Franklin turns his attention to Jennifer Doudna and the invention of CRISPR gene editing. His central argument: the greatest innovation of the 21st century may be the ability to edit the software of life itself. The episode covers the science, the ethics, the patent wars, and the human story of how a tool capable of eliminating genetic disease was developed."},
  {n:"Vitalik Buterin & Naval Ravikant",e:"#504",c:"tech",d:"Creator of Ethereum co-hosted with Naval Ravikant. Covers how Ethereum works vs. Bitcoin, ETH2 and scaling plans, NFTs, life extension, and Vitalik's surprisingly unusual personal philosophy. He is notably unconcerned with wealth, lives simply, and is primarily motivated by the political and social implications of decentralized systems. One of the most downloaded episodes of 2021."},
  {n:"Elizabeth Lesser",e:"#505",c:"philosophy",d:"Co-founder of Omega Institute for Holistic Studies (America's largest retreat center for wellness and personal growth). Coined the term 'ADD' in the context of relationships — Authenticity Deficit Disorder. Discusses grief as an underrated transformative force, intentional communities, and the emotion of 'illumination' — the specific feeling that arrives when something previously confusing suddenly becomes clear."},
  {n:"Balaji Srinivasan",e:"#506,#547",c:"tech",d:"Former CTO of Coinbase, a16z general partner, Stanford lecturer. Two appearances — both among the most downloaded episodes of 2021. His framework: the future is a contest between centralized systems (nation-states, big tech, legacy media) and decentralized ones (Bitcoin, crypto, open-source). His 'Network State' concept: communities formed online that eventually buy land and gain diplomatic recognition. Dense, fast, and consistently ahead of mainstream conversation."},
  {n:"Aubrey Marcus",e:"#178,#555",c:"philosophy",d:"Founder of Onnit supplements and author of Own the Day, Own Your Life. Two appearances. First discusses plant medicine experiences, ayahuasca as a tool for psychological healing, and the relationship between physical performance and psychological integration. Second appearance digs deeper into psychedelics, open relationships, and his philosophy of radical self-acceptance. One of Tim's closest long-running relationships in the archive."},

  // ── EPISODES 507–540 ──────────────────────────────────────────────────────
  {n:"Greg McKeown (Effortless)",e:"#510",c:"media",d:"Second appearance: Effortless — the follow-up to Essentialism. While Essentialism asks 'what is essential?' Effortless asks 'how do you make the essential easier?' His key insight: most high achievers are stuck in the belief that hard things must always be done hard. The easiest path is often the fastest path. Lighten the effort on important things by eliminating unnecessary resistance."},
  {n:"Chip Wilson",e:"#514",c:"biz",d:"Lululemon founder. Discusses the art of setting goals (he set a goal 25 years out when founding Lululemon), the 10 great decisions of his life, and why he deliberately builds his companies around specific customer archetypes rather than broad markets. His original Lululemon customer was a highly specific 32-year-old professional woman — the precision of this targeting was key to the brand's identity."},
  {n:"Chris Bosh",e:"#515",c:"sport",d:"Two-time NBA champion with LeBron James and Dwyane Wade in Miami. After his career was ended by life-threatening blood clots, he reinvented himself as a technology investor and children's book author. Discusses Leonardo da Vinci as a model of curiosity-driven reinvention, the poison of complaining (how it became a firing offense in Miami Heat's culture), and 'the way' — his personal philosophy drawn from martial arts."},
  {n:"Dr. Peter Attia (Longevity)",e:"#517",c:"medicine",d:"Fourth appearance: longevity drugs, Alzheimer's disease, and what he calls the 3 most important levers for extending healthspan. Covers rapamycin, metformin, SGLT2 inhibitors, and ApoB as a cardiovascular risk marker. His most comprehensive longevity-specific episode — goes significantly deeper on the pharmacological tools than previous appearances."},
  {n:"Michael Pollan (Plants)",e:"#520",c:"science",d:"This Is Your Mind on Plants — his follow-up to How to Change Your Mind. Covers three plant-derived psychoactive compounds: opium (the history of its suppression vs. alcohol), mescaline (the sacred plant traditions of Native American ceremony), and caffeine (the most widely used psychoactive substance in the world, which most people have never experienced the absence of). His personal caffeine-abstinence experiment is the episode's most surprising section."},
  {n:"Dr. Andrew Huberman",e:"#521,#684",c:"science",d:"Stanford neurobiologist and host of Huberman Lab. First appearance: one of the most downloaded episodes of 2021. Covers optimizing sleep (the non-negotiable foundation of performance), enhancing performance through light exposure and temperature, reducing anxiety with specific breathing protocols, and using the body to control the mind. Second appearance digs into the neuroscience of focus, dopamine management, and performance optimization protocols."},
  {n:"Anne Lamott",e:"#522",c:"media",d:"Author of Bird by Bird (one of the most celebrated books on writing ever written) and Traveling Mercies. Discusses taming the inner critic, finding grace in daily life, and her unconventional approach to prayer. Her most famous advice on writing: 'Shitty first drafts' — the only way to get to good work is through permission to write badly first. Recovering alcoholic, passionate Quaker, and one of the archive's most warmly received guests."},
  {n:"Ramit Sethi (Rich Life)",e:"#524",c:"biz",d:"Third appearance: how to play offense with money, plan bucket lists, and build a rich life with your partner. His '100 Days to a Rich Life' challenge and the specific conversations he teaches couples to have about money. His insight: most people treat money as a taboo topic with their partner — and this avoidance is one of the primary causes of financial dysfunction in relationships."},
  {n:"Dr. Sue Johnson",e:"#529",c:"medicine",d:"Developer of Emotionally Focused Therapy (EFT), which has become one of the most evidence-based couples therapy approaches available. Discusses how to improve sex within long-term relationships (the answer involves emotional safety rather than technique), the science of adult attachment theory, and why most relationship arguments are really attachment protests — desperate attempts to feel seen and secure."},
  {n:"Henry Shukman",e:"#531,#560",c:"philosophy",d:"Zen teacher and author of One Blade of Grass. Two appearances. First: Zen tools for awakening, how ayahuasca and meditation compare and contrast, an introduction to koans, and using wounds as doorways to transformation. Second: 20 minutes of guided calm plus an in-depth exploration of the strange and powerful world of Zen koans — paradoxical questions designed to break the conceptual mind's grip."},
  {n:"Sheila Heen",e:"#532",c:"biz",d:"Harvard Negotiation Project faculty member and co-author of Difficult Conversations and Thanks for the Feedback. Discusses how to navigate hard conversations without destroying relationships, the subtle and underrated art of apologizing, and a specific 60-day challenge for improving your ability to receive feedback. Her insight: most people conflate feedback with criticism — and this conflation causes them to reject the most valuable information they receive."},
  {n:"Paul Conti",e:"#533",c:"medicine",d:"Psychiatrist and author of Trauma: The Invisible Epidemic. His framework for understanding how trauma works at the neurological level — how it rewires the brain's threat-detection systems — and the specific interventions that produce genuine healing rather than symptom management. Discusses how to recognize when someone you love is being driven by trauma responses rather than genuine preferences."},
  {n:"Diana Chapman",e:"#536",c:"philosophy",d:"Co-founder of the Conscious Leadership Group. Her 'above the line / below the line' framework (originally developed with Jim Dethmer) gets its most detailed treatment here: specific techniques for recognizing when you're in a reactive, defensive state and moving back into openness and curiosity. The '15 Commitments of Conscious Leadership' are the practical framework she teaches to leadership teams across Silicon Valley."},
  {n:"Noah Feldman",e:"#540",c:"media",d:"Harvard law professor and polymath who speaks 10+ languages. Discusses deep focus for hyper-productivity, why learning languages unlocks different cognitive frameworks, predicting the future with historical pattern-recognition, the possibilities and limitations of DAOs, and lessons from the Iraq invasion (he helped draft the interim Iraqi constitution). His biography of Oliver Wendell Holmes, Jr. is described as one of the archive's strongest book recommendations."},
  {n:"Chris Dixon & Naval Ravikant",e:"#542",c:"tech",d:"a16z general partner and crypto theorist Chris Dixon, co-hosted with Naval Ravikant. The wonders of Web3, how to pick the right hill to climb in technology investing, the right amount of crypto regulation, NFTs as a new form of cultural ownership, and the untapped potential of crypto networks for organizing collective action. Third most downloaded episode of 2021."},

  // ── EPISODES 547–580 ──────────────────────────────────────────────────────
  {n:"Rich Roll",e:"#561",c:"sport",d:"Ultra-endurance athlete and host of The Rich Roll Podcast. At 40, was a sedentary overweight entertainment lawyer who reinvented himself as one of the world's fittest men. Completed 5 Ironman-distance triathlons on 5 Hawaiian islands in under a week. Discusses how to reinvent yourself at any age, the relationship between plant-based diet and endurance performance, and why sobriety (he's been sober for 25+ years) has been the foundation of his physical transformation."},
  {n:"Dr. Michio Kaku",e:"#562",c:"science",d:"Theoretical physicist and bestselling author of The Future of the Mind and Physics of the Future. Discusses time travel (why it's theoretically possible but practically impossible), the beauty of physics as a language of the universe, parallel universes (the multiverse interpretation of quantum mechanics), string theory, and what Einstein's greatest mistake was. One of the best introductory conversations on frontier physics in the archive."},
  {n:"Cal Newport (Deep Life)",e:"#568",c:"media",d:"Author of Deep Work, Digital Minimalism, and Slow Productivity. Second full solo appearance: eternal pursuit of craftsmanship, the 'deep life' (a life structured around things that matter most rather than constant busyness), slow productivity (fewer things done better over longer time horizons), and a 30-day digital minimalism challenge. Also revisits The 4-Hour Workweek with Tim (#594) — the episode that produced one of 2022's most downloaded conversations."},
  {n:"Boyd Varty",e:"#571",c:"adventure",d:"South African tracker, lion whisperer, and author of The Lion Tracker's Guide to Life. Grew up on Londolozi Game Reserve in South Africa and learned to track big animals from master trackers as a child. His philosophy: tracking is a metaphor for living — you follow signs without knowing the destination, trust your instincts when logic fails, and stay present to what's actually in front of you. One of the most quietly beautiful episodes in the archive."},
  {n:"Morgan Housel",e:"#576",c:"biz",d:"Author of The Psychology of Money — the best-selling personal finance book of 2020 and 2021. His central insight: financial success is less about knowing the right moves than about behavior, temperament, and time. The $6 million janitor (Ronald Read — a Vermont gas station attendant who left $8M to his local library and hospital) is the episode's most memorable illustration: wealth is built through patience and frugality, not income. The most downloaded episode of 2022."},
  {n:"Matt Mullenweg in Antarctica",e:"#578",c:"tech",d:"Tim and Matt Mullenweg recorded an episode in Antarctica during an expedition together — covering personal fears, bucket lists, grief (Mullenweg discusses the loss of his father), crafting life missions, and Tim's penguin impressions. One of the most unusual recording environments in the archive's history. Their friendship stretches across multiple episodes and is one of the show's warmest recurring relationships."},
  {n:"Jane McGonigal (Imaginable)",e:"#579",c:"science",d:"Second appearance: she predicted a global respiratory pandemic in a 2010 simulation game called Superstruct, 10 years before COVID. Her 'Imaginable' framework: how to become the expert of your own future by vividly imagining it in concrete detail. Covers trust warfare (how bad actors use disinformation to make people distrust facts rather than to promote specific false beliefs), the 10-year winter hypothesis, and how to cultivate genuine optimism as a skill rather than a temperament."},
  {n:"Mark Zuckerberg",e:"#582",c:"tech",d:"CEO of Meta (Facebook). Discusses long-term strategy (his 10-year technology roadmap), business and parenting principles, personal energy management, building the metaverse, seeking awe (he describes specific natural experiences that produce genuine wonder), the role of religion in his life, and solving deep technical challenges in AR. Second most downloaded episode of 2022. Notably candid about the personal cost of running one of the world's most scrutinized companies."},
  {n:"Susan Cain (Bittersweet)",e:"#583",c:"media",d:"Second appearance: her book Bittersweet — how the overlooked emotion of bittersweetness (the simultaneous awareness of beauty and loss) is one of the most important and undervalued human experiences. Covers transforming pain into creativity, building emotional resilience, Sufi wisdom traditions (which she argues have the most sophisticated understanding of bittersweet emotion), and the specific research behind why minor-key music produces states of profound connectedness."},
  {n:"Bo Shao",e:"#584",c:"biz",d:"Managed $3B+ in assets. Built the eBay of China in 1999 (EachNet) with essentially no capital. His path: born during China's Cultural Revolution, grew up on food rations, earned a scholarship to Harvard, founded one of China's first major internet companies, sold it to eBay for $180M. Discusses the blessings and burdens of chasing perfection, his pillars of parenting, and his approach to pursuing positions that most rational people reject as too uncertain."},
  {n:"Donald Hoffman",e:"#585",c:"science",d:"Cognitive scientist at UC Irvine with a radical thesis: reality as we perceive it is a user interface — a desktop, not the underlying operating system. Space, time, and matter are not fundamental — they are representations our brains construct. Beyond spacetime, consciousness may be fundamental. Discusses rethinking death (if consciousness is not generated by the brain, what does death mean?), panpsychism, and quantum Bayesianism. One of the most genuinely mind-bending conversations in the archive."},

  // ── EPISODES 590–610 ──────────────────────────────────────────────────────
  {n:"Edward O. Thorp",e:"#596",c:"biz",d:"Mathematician who beat the dealer (invented card counting in blackjack), beat roulette (built the world's first wearable computer to predict wheel outcomes), beat the stock market (ran one of history's best-performing hedge funds), and spotted Bernie Madoff as a fraud 17 years before his arrest. His autobiography A Man for All Markets is one of the most extraordinary intellectual adventure stories ever written. His rule: know when enough is enough."},
  {n:"Morgan Fallon",e:"#597",c:"media",d:"Anthony Bourdain's longtime director and closest collaborator — 10 years and 9 Emmy nominations traveling the world together. Discusses what it was actually like to be in the room with Bourdain, how Bourdain's work ethic and attention to craft raised the standards of everyone around him, lessons learned from working with Michael Mann, and his own grief and healing after Bourdain's death. One of the archive's most emotionally resonant episodes."},
  {n:"Isabel Behncke",e:"#598",c:"science",d:"Primatologist who followed bonobo communities for 3,000 kilometers through the Congo jungle. Her thesis: bonobos — who are as genetically close to humans as chimpanzees — resolve conflict through play and sex rather than violence, which challenges the assumption that aggression is inherent to primate social life. Discusses what play deprivation does to primates (and humans), the role of sexual selection in social bonding, and what bonobos reveal about human potential."},
  {n:"Jason Portnoy",e:"#600",c:"biz",d:"Former PayPal and Palantir executive. One of the most downloaded episodes of 2022 — a completely unexpected conversation about porn addiction, shame spirals, and the path to recovery. Portnoy describes hiding an escalating pornography addiction for years while working at some of Silicon Valley's most demanding companies. His insight: secrecy is the food that shame feeds on — when he finally told his wife, the shame lost its power. A landmark episode in the archive for its candor."},
  {n:"Jack Kornfield (Beautiful Purpose)",e:"#601",c:"philosophy",d:"Third appearance: how to overcome apathy and find beautiful purpose — recorded during the exhaustion of COVID's second year, when many people felt a pervasive listlessness. His framework for apathy: it is not laziness but grief — grief for the world as it was, grief for the future that was expected. The antidote is not productivity but beauty, and small acts of care that restore meaning at the individual scale."},
  {n:"Balaji Srinivasan (Network State)",e:"#606",c:"tech",d:"His most developed presentation of the Network State concept: online communities that develop shared values, build economic density, and eventually acquire physical territory. Discusses memetic warfare (how information is weaponized to change what people believe is true), moral flippenings (how society's consensus on ethical questions can reverse over short periods), Bitcoin maximalism vs. portfolio approaches, and the one commandment he thinks every person should have."},

  // ── EPISODES 614–650 ──────────────────────────────────────────────────────
  {n:"Michael Schur",e:"#565",c:"film",d:"Creator of The Good Place and Parks and Recreation, co-creator of Brooklyn Nine-Nine, writer for The Office. Discusses how Saturday Night Live trains writers (the room system that produces comedy under extreme time pressure), his television education at The Office under Michael Schur, and his book How to Be Perfect — a tour of moral philosophy disguised as entertainment. Lorne Michaels's leadership philosophy: the most important thing is not any individual piece but the ongoing institution."},
  {n:"John List",e:"#566",c:"science",d:"Chief economist at Lyft (previously Uber), one of the world's most prolific field experiment economists. Discusses strategic quitting (how to determine when to cut your losses vs. persist — most people quit too late because of sunk-cost bias), theory of mind (how understanding what others believe changes how you communicate), his field experiments that revealed hidden patterns in charitable giving, and the primitives of decision-making."},
  {n:"Sue Flood",e:"#567",c:"adventure",d:"Wildlife photographer and documentary filmmaker who has spent decades filming in Antarctica. David Attenborough's longtime collaborator. Discusses making your own luck (specific tactics, not platitudes), what it takes to survive weeks in extreme polar conditions, and how she reinvented herself after serious illness. The first episode recorded in Antarctica, where Tim was also present."},
  {n:"Cal Newport (4HWW Revisit)",e:"#594",c:"media",d:"Tim and Cal Newport revisit The 4-Hour Workweek 15 years after publication — what held up, what didn't, and what neither of them anticipated. The conversation covers: whether remote work delivered on its promise (mixed results), why 'lifestyle design' became co-opted by hustle culture, what 'deep work' and 'slow productivity' look like as a sustainable alternative, and the specific habits Tim has abandoned from the book's original recommendations."},
  {n:"Richard Wiseman",e:"#593",c:"science",d:"Psychologist, bestselling author of The Luck Factor and Quirkology. His research on luck: lucky people are not the recipients of chance — they use specific habits and cognitive patterns that make them more likely to notice and act on opportunities. His luck diary methodology: tracking near-misses and lucky breaks reveals your luck patterns. Also covers mass participation psychology experiments, mentalism, NLP (and its limitations), and the history of remote viewing research."},
  {n:"Roland Griffiths",e:"#641",c:"science",d:"Founding director of the Johns Hopkins Center for Psychedelic & Consciousness Research — the scientist who revived psilocybin research after a 30-year hiatus. While recording this episode, he had just received a Stage IV glioblastoma diagnosis with months to live. Discusses facing death with equanimity, how his own terminal diagnosis is the ultimate test of the practices he has studied, how psilocybin helps dying patients come to peace with death, and the art of living each day as if it were complete in itself."},
  {n:"Dr. Chris Palmer",e:"#633",c:"medicine",d:"Harvard Medical School psychiatrist and author of Brain Energy. His thesis: mental illness is metabolic illness. Depression, bipolar disorder, schizophrenia, OCD, PTSD — all may share a common root in mitochondrial dysfunction and impaired brain metabolism. His most dramatic case study: a severely schizophrenic patient who achieved complete remission after adopting a ketogenic diet. Discusses the extraordinary case studies, the underlying science, and the clinical implications."},
  {n:"Dr. John Krystal",e:"#625",c:"medicine",d:"Chairman of Yale Psychiatry and the world's leading expert on ketamine as a psychiatric treatment. The most comprehensive single episode on ketamine ever produced for a general audience. Covers mechanisms (how ketamine produces rapid antidepressant effects via glutamate rather than serotonin), clinical protocols, the difference between racemic ketamine and esketamine (Spravato), the risks, and what the research suggests about PTSD, suicidality, and treatment-resistant depression."},
  {n:"Bas Rutten",e:"#621",c:"sport",d:"UFC Hall of Famer and kickboxing world champion. Discusses fundamentals of real-world self-defense (very different from sport martial arts), his own savage fight stories, how he dealt with childhood bullies, the 'Bas Rutten breathing technique' for increasing stamina and endurance (a specific method he developed and taught to NFL teams), his personal reinvention from bouncer and fighter to fitness educator, and his surprising practice of daily prayer."},
  {n:"Dr. Gabor Maté (Myth of Normal)",e:"#620",c:"medicine",d:"Second appearance: The Myth of Normal — his most comprehensive treatment of how modern Western society produces illness. Covers: the myth of normal health (most accepted health states are actually states of chronic stress and suppression), how anger works physiologically (suppressed anger as a physical phenomenon, not just psychological), the specific trauma patterns that produce autoimmune disease and cancer, and his concept of 'toxic normalcy' — the cultural messages that teach us to be disconnected from ourselves."},

  // ── EPISODES 650–720 ──────────────────────────────────────────────────────
  {n:"Terry Real",e:"#651",c:"medicine",d:"Couples therapist and author of I Don't Want to Talk About It and Us. Trained under Pia Mellody and Patrick Carnes, two of the most important figures in relational trauma therapy. Discusses his contrarian approach to couples therapy — he takes direct positions rather than remaining neutral — and his concept of 'relational mindfulness': staying present during conflict rather than retreating into defense. He argues most relationship dysfunction in men traces to the specific wound of having been trained out of vulnerability."},
  {n:"Jack Canfield",e:"#655",c:"media",d:"Co-creator of Chicken Soup for the Soul (600M+ copies sold worldwide). His path from inner-city teacher to bestselling author. Discusses his E+R=O formula (Event + Response = Outcome — the only variable you control is your response), his work with W. Clement Stone that introduced him to the success principles he's taught for 50 years, his experiences with ayahuasca ceremonies, and how he thinks about continuous growth at the same age most people are winding down."},
  {n:"Martha Beck",e:"#(multiple)",c:"philosophy",d:"Sociologist, life coach, and author of Finding Your Own North Star. Has appeared in compilations with Derek Sivers and Seth Godin discussing simplicity. Her coaching philosophy centers on the distinction between social self (who you've been trained to be) and essential self (who you actually are) — and the chronic pain and anxiety that result when they diverge. Trained as a sociologist at Harvard and applies rigorous research methods to questions most life coaches handle intuitively."},
  {n:"Craig Mod",e:"#(multiple)",c:"media",d:"Writer, photographer, and walker living in Japan. Author of Things Become Other Things and Kissa by Kissa. Appears in the 2022 and 2026 'How to Simplify Your Life' compilations. His work centers on slow travel (walking hundreds of kilometers across Japan), the disappearing rural Japan that these walks document, and how walking reshapes thinking. His 'roden' and 'ridgeline' newsletters are among the most thoughtfully produced in the world."},
  {n:"Dr. Andrew Huberman (Performance)",e:"#684",c:"science",d:"Second full appearance: deep dive into the neuroscience of focus, dopamine management, testosterone optimization, and vision training for peak performance. His most tactical episode — covers specific protocols for adjusting your dopamine baseline, why your eyes control your nervous system state (panoramic vision activates the parasympathetic system; narrow focus activates the sympathetic), and what the research says about ice baths, heat, and their neuroendocrine effects."},
  {n:"Steve Jang",e:"#707",c:"biz",d:"Recorded live from South Korea. Covers Korea's exploding soft power (K-pop, K-drama, Korean film), the poverty-to-power playbook (how Korea went from one of the world's poorest countries to one of its most culturally influential in 60 years), the concept of 'Han' energy (a specifically Korean emotional force combining grief, resilience, and drive), must-see Korean films, and the economics of export-focused cultural industries."},
  {n:"Dr. Willoughby Britton",e:"#(referenced)",c:"science",d:"Brown University neuroscientist and clinical psychologist who studies the adverse effects of meditation — a subject most of the contemplative community has been reluctant to discuss. Her 'Cheetah House' project supports people who have had difficult or destabilizing meditation experiences. Her research: approximately 20% of regular meditators report significant adverse effects at some point, including anxiety, dissociation, and perceptual disturbances. A genuinely important corrective to uncritical meditation enthusiasm."},
  {n:"Dr. Nolan Williams",e:"#(referenced)",c:"medicine",d:"Stanford psychiatrist developing theta-burst TMS (transcranial magnetic stimulation) as an ultra-rapid treatment for depression — his 'Stanford Accelerated Intelligent Neuromodulation Therapy' (SAINT) has achieved 80%+ remission rates in treatment-resistant depression in under 5 days. Also studying psilocybin in combination with TMS. His work represents one of the most exciting frontiers in psychiatric treatment."},
  {n:"Dr. Andy Galpin",e:"#(referenced)",c:"science",d:"Exercise physiologist at Cal State Fullerton who has tested hundreds of elite athletes. His practical frameworks for building strength, endurance, and power simultaneously (without each undermining the other) — previously thought impossible — have influenced how many coaches approach concurrent training. Discusses the specific biomarkers he tracks in elite athletes and the biggest training mistakes he observes across all sports."},

  // ── EPISODES 720–860 ──────────────────────────────────────────────────────
  {n:"Michelle Khare",e:"#860",c:"media",d:"YouTube creator behind Challenge Accepted (6M+ subscribers, 1B+ views) who has embedded with the FBI, Secret Service, and military, earned a black belt in taekwondo in 90 days, and attempted Tom Cruise's most dangerous stunts. The most recent guest in the archive. Discusses how to open impossible doors through Jedi-level cold emails, using fear-setting to change your life, and building a YouTube channel around genuine personal transformation rather than performed confidence."},
  {n:"Jim Collins (Return on Luck)",e:"#856",c:"biz",d:"Third appearance: What to Make of a Life and How to Maximize Your Return on Luck. The distinction between luck and return on luck: everyone gets lucky occasionally — the differentiator is whether you're prepared to seize the opportunity when it arrives. The conversation covers his concept of 'productive paranoia' (how the best companies are simultaneously confident and alert to threats), and his personal practice of tracking every significant decision against its eventual outcome."},
  {n:"Tish Rabe",e:"#854",c:"media",d:"Author of 200+ children's books including the Cat in the Hat Learning Library and selected to continue the Dr. Seuss franchise after his death. Discusses the craft of writing for children (the specific constraints of meter, vocabulary, and visual-verbal integration), how she was selected over hundreds of candidates to extend the Dr. Seuss universe, her work writing for early Sesame Street, and how she has written 300+ songs in 40+ years of creative output."},
  {n:"Jordan Jonas",e:"#853",c:"adventure",d:"Winner of Alone Season 6 — survived 77 days alone in the Siberian wilderness, longer than any previous contestant. Spent years living with nomadic tribes in Siberia and Mongolia learning traditional survival skills before his appearance on the show. Discusses the art of wilderness survival (fire, shelter, water, food), lessons from nomadic peoples about what constitutes a good life, hardship as the path to peace (his most counterintuitive claim: his time alone was the most peaceful of his adult life), and the specific moments when he nearly quit."},
  {n:"Tim McGraw",e:"#852",c:"music",d:"Sold 100M+ records across 30+ years of country music. Started with a $20 guitar purchased at a pawn shop, having never sung in public. Discusses creative longevity (what sustains a career across three decades while most peers fade), the specific decisions that kept him growing rather than repeating, his sobriety journey (stopped drinking cold turkey in 2008), and how physical fitness became the foundation that everything else rests on after 40."},
  {n:"Dr. Tommy Wood",e:"#851",c:"medicine",d:"Neuroscientist and physician specializing in brain protection and cognitive longevity. His most practically useful thesis: the brain's ability to process information and resist dementia depends primarily on metabolic health, not genetics — and the same interventions that protect cardiovascular health protect the brain. Covers: the specific lifestyle factors most strongly associated with dementia prevention, why conventional neurological risk assessment is inadequate, and what 'future-proofing' your brain actually requires."},
  {n:"Dr. Michael Levin",e:"#849",c:"science",d:"Tufts developmental biologist working on bioelectricity — the electrical information systems that cells use to coordinate development and tissue repair. His most extraordinary claim: cancer may be a disease of bioelectric communication breakdown rather than genetics. His lab has produced demonstrations of remarkable regeneration in animals by manipulating bioelectric patterns, and has implications for anti-aging, cancer treatment, and our understanding of what 'cognition' means at the cellular level."},
  {n:"Steve Young",e:"#847",c:"sport",d:"Super Bowl MVP, Hall of Fame San Francisco 49ers quarterback. After retiring from football at the height of his career due to concussions, became a founding partner at HGGC (a $6B+ private equity firm). Discusses the specific challenges of reinvention after peak achievement (when your identity is inseparable from a role that ends), how his Mormon faith provided a framework for navigating catastrophic transitions, and how to blend dreams and plans rather than treating them as opposites."},
  {n:"Dom D'Agostino (Ketosis Practical Guide)",e:"#845",c:"science",d:"Fifth appearance: the most practical and tactical ketosis episode in the archive. Covers using ketosis for enhanced mood and cognition (not just physical performance), the specific protocols he now recommends for long-term brain protection, how to track ketosis affordably and accurately, what the latest research says about exogenous ketones, and how Tim's own recent ketosis experiment compared to previous attempts."},
  {n:"LeBron James & Mike Mancias",e:"#349",c:"sport",d:"NBA legend LeBron James and his longtime trainer and recovery specialist Mike Mancias. Covers LeBron's obsessive attention to sleep, nutrition, and physical recovery as the foundation of his 20-year career. LeBron reportedly spends $1.5M per year on his body. His most actionable insight: recovery is the training. What you do in the 20 hours outside the gym determines what's possible in the 4 hours inside it."},
  {n:"Hugh Jackman",e:"#444",c:"film",d:"Oscar-nominated actor (Logan), creator of Wolverine across 17 years. The 85% rule: never train past 85% of maximum capacity to prevent injuries that break consistency. Practices Transcendental Meditation twice daily. The only actor to have defined a Marvel character across a career that spans the character's entire cinematic life. Discusses daily routine, how he prepares for physically demanding roles, and what he learned from the failures that never made headlines."},
  {n:"Dr. Jim Loehr",e:"#490",c:"sport",d:"Performance psychologist and author of The Power of Full Engagement. Co-founder of the Human Performance Institute. His career-defining insight: energy management (not time management) is the foundation of sustained high performance. He has worked with the world's top tennis players and military personnel on the specific psychological skills that enable consistent peak performance under pressure."},
  {n:"Dr. Stefi Cohen",e:"#491",c:"sport",d:"Powerlifter who holds 25+ world records across multiple weight classes. Has deadlifted 4.4x her body weight — one of the greatest relative strength feats ever recorded by any human. Simultaneously holds a PhD in physical therapy. Discusses her mental approach to breaking world records, the sports psychology of competing against yourself rather than opponents, how she trained through injuries that would have ended most careers, and why the gap between what most people think their limits are and what their actual limits are is larger than they imagine."},
  {n:"Aubrey Marcus (Own the Day)",e:"#178",c:"philosophy",d:"Onnit CEO and author of Own the Day, Own Your Life. Covers his morning protocol (cold water, sunlight, specific nutrition and supplementation), his philosophy of optimization as a tool for presence rather than performance, and his candid reflections on how ayahuasca ceremonies reorganized his relationship to fear, authenticity, and purpose. One of Tim's closest recurring relationships in the archive."},
  {n:"Allen Walton",e:"#351",c:"biz",d:"Founder of SpyGuy Security — an e-commerce business selling spy and security equipment. Grew it to 7 figures while working a full-time job. One of the show's more unusual business stories — a completely unsexy product category (hidden cameras and security equipment) generating substantial profits through disciplined SEO and customer service. Discusses the path to seven figures without VC, without a co-founder, and without quitting your day job first."},
  {n:"Ed Zschau",e:"#380",c:"biz",d:"The professor who changed Tim Ferriss's life — he taught a legendary entrepreneurship course at Princeton that Tim credits as one of the formative experiences of his career. Also served as a US Congressman from California and was a Silicon Valley pioneer before returning to academia. One of the more personal episodes in the archive: Tim discusses what it means to honor a teacher and what Zschau actually taught him."},
  {n:"Dr. Vivek Murthy",e:"#417",c:"medicine",d:"Former US Surgeon General under both Obama and Biden. His signature public health concern: loneliness as an epidemic producing measurable physical harm (equivalent to smoking 15 cigarettes daily). Discusses his personal history as a child of immigrants who built a medical career while battling profound shyness, his work on opioids and the addiction crisis, and why he believes social connection is the most important and most neglected factor in public health."},
  {n:"John Paul DeJoria",e:"#441",c:"biz",d:"Co-founder of Paul Mitchell hair care and Patrón tequila — two of the most successful premium consumer brands in their categories. Was homeless twice before building his first successful business. Sold Paul Mitchell products door-to-door out of his car while living in it. His rule: be ready for the no's — they don't discourage you, they bring you closer to the yes. His philanthropic record is as remarkable as his business record."},
  {n:"David Yarrow",e:"#443",c:"media",d:"Wildlife and cultural photographer whose prints sell for $50,000–$500,000 each and whose work is collected by museums worldwide. Discusses how the photography market works (it is dramatically different from the art market), how he takes images that appear impossible (getting within feet of wild lions and wolves), and the specific techniques he uses to place himself in position for images that no one else attempts."},
  {n:"Rabbi Lord Jonathan Sacks",e:"#455",c:"philosophy",d:"Former Chief Rabbi of the United Kingdom, philosopher, and one of the most important public intellectuals of his generation. Discusses the difference between the ethics of responsibility (what we owe each other) and the ethics of rights (what we can demand), why he believes the West is in a spiritual and ethical crisis, and what the Hebrew Bible's understanding of human dignity offers to the modern world. One of the archive's most erudite and moving philosophical conversations."},
  {n:"Dr. Martine Rothblatt",e:"#487",c:"biz",d:"Founded Sirius XM Satellite Radio, then founded United Therapeutics (a pharmaceutical company with a $10B+ market cap) after her daughter was diagnosed with a rare fatal lung disease. Now leads research in xenotransplantation (using pig organs for human transplants) and has been called 'the highest-paid female CEO in America.' Also founded the world's most advanced humanoid robot, BINA48. One of the most extraordinary convergence of achievements in the entire archive."},
  {n:"Walter Isaacson (CRISPR deep dive)",e:"#503",c:"media",d:"The book The Code Breaker covers how Jennifer Doudna and Emmanuelle Charpentier developed CRISPR-Cas9 and won the Nobel Prize, the patent war with the Broad Institute, and the ethical questions raised by the ability to edit the human germline. Isaacson's central observation: the CRISPR story, like all great innovation stories, turns on the character of the people involved as much as the science itself."},
  {n:"Katie Haun (NFTs & Dark Web)",e:"#499",c:"biz",d:"The episode's unique value: Haun explains NFTs from first principles — why digital ownership is not just a speculative bubble but a genuine new capability — while also discussing the most colorful stories from her federal prosecutor career (including the federal agents who stole Bitcoin from the Silk Road seizure they were supposed to be managing). One of the clearest explanations of both crypto technology and crypto culture in the archive."},
  {n:"Dr. Sue Johnson (EFT)",e:"#529",c:"medicine",d:"The Emotionally Focused Therapy conversation includes the most specific practical advice on sexual intimacy in long-term relationships in the archive. Johnson's finding: most sexual problems in long-term relationships are attachment problems in disguise — they resolve when the underlying sense of emotional safety and connection is restored, often without any direct intervention on the sexual behavior itself."},
  {n:"Isabel Behncke (Bonobos)",e:"#598",c:"science",d:"The bonobo research has specific implications for human societies: bonobos demonstrate that a closely related primate can organize socially without dominance hierarchies when food is abundant and female alliances are strong. Her field work in the Congo included extraordinary physical and logistical challenges: following bonobo communities that move continuously through dense jungle, sometimes covering 15+ kilometers per day in conditions that made equipment failure routine."},

  // ── RECENT NOTABLE GUESTS 2023–2025 ──────────────────────────────────────
  {n:"George Mumford",e:"#509",c:"philosophy",d:"Mindfulness coach to Michael Jordan, Kobe Bryant, and the Chicago Bulls and Los Angeles Lakers during their championship runs. His approach: not meditation as relaxation technique but as the discipline of sustained attention — bringing your full awareness to each moment of competition regardless of outcome. His own story: recovered from heroin addiction through meditation, then built a career as one of the most sought-after sports mindfulness coaches in the world."},
  {n:"Dr. Stefi Cohen (World Records)",e:"#491",c:"sport",d:"The episode's most striking moment: Cohen discusses how she mentally approaches world record attempts — specifically, how she has eliminated the concept of 'limit' from her vocabulary and replaced it with 'current maximum.' The distinction matters: a limit is permanent; a current maximum is just a data point that training will exceed. Her combined achievement of a PhD in physical therapy and 25+ world records is without parallel in competitive strength sports."},
  {n:"Noah Feldman (Polymath)",e:"#540",c:"media",d:"His language-learning approach is the episode's most practical section: he argues that learning a language activates cognitive frameworks unavailable in your native tongue, and that 10 languages represent 10 different ways of organizing human experience. His approach to learning a new language: immersion in a single text you care about deeply (he read the same few texts in Hebrew, Arabic, and Chinese many times before branching out). Quality of engagement matters more than hours logged."},
  {n:"Bo Shao (EachNet)",e:"#584",c:"biz",d:"The EachNet story is remarkable: Shao built China's first eBay-equivalent in 1999 with no venture funding, no connections, and limited English. Sold it to eBay for $180M within three years. His insight about pursuing the unpopular: every great opportunity he has found was one that the majority of rational people dismissed as too uncertain, too early, or too unfamiliar. The best investments look wrong."},
  {n:"Dr. Peter Attia (Alzheimer's)",e:"#517",c:"medicine",d:"The most important practical section of this episode: Attia's framework for thinking about Alzheimer's risk factors that are modifiable vs. fixed. His hierarchy of interventions: sleep first (consistently the highest-leverage), then exercise, then nutrition, then pharmacological tools. The most surprising claim: ApoE4 genotype (the strongest known genetic Alzheimer's risk factor) may be nearly fully addressable through lifestyle — which dramatically changes the prognosis for the approximately 25% of the population who carry it."},
  {n:"Rich Roll (Reinvention)",e:"#561",c:"sport",d:"The specifics of Rich Roll's reinvention: at 39, overweight and sedentary, he tried to climb a staircase and had to stop halfway up due to exhaustion. This moment of humiliation became the catalyst. Within 18 months he had completed his first triathlon; within 4 years he was one of the world's fittest men. His insight: it is never too late, but it requires a specific kind of trigger — not inspiration but genuine crisis — to overcome the inertia of established patterns."},
  {n:"Michael Schur (Good Place)",e:"#565",c:"film",d:"The Good Place's entire premise — a show about moral philosophy where the joke is that the protagonist doesn't realize she's in the wrong place — required Schur to read the entire Western philosophical tradition of ethics. His insight: the gap between philosophy as academics practice it and philosophy as a tool for daily life is almost entirely a problem of presentation. The ideas themselves are immediately useful; they're just buried in inaccessible language."},
  {n:"Ann Lamott (Bird by Bird)",e:"#522",c:"media",d:"Bird by Bird's central teaching — 'shitty first drafts' as permission to begin — is the episode's most cited idea, but Lamott's discussion of prayer is equally remarkable. She defines prayer not as petition to a supernatural being but as attention — the practice of showing up to life with openness rather than agenda. Her description of alcoholism and recovery as the training ground for all her best work is one of the archive's most honest accounts of how crisis produces art."},
  {n:"Boyd Varty (Lion Tracker)",e:"#571",c:"adventure",d:"His core insight: the best trackers don't know where the lion is — they follow what's in front of them and update their model continuously. The tracking philosophy applied to life decisions: stop trying to know the destination before you start, follow the signs that are genuinely present, and trust that the path will reveal itself to attention. One of the most quietly influential frameworks in the archive for people navigating major career or life transitions without a clear map."}
