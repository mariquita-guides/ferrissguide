G.push(

  // ── BUSINESS & INVESTING ─────────────────────────────────────────────────
  {n:"Tracy DiNunzio",e:"#30,#31,#32",c:"biz",d:"Founder and CEO of Tradesy, the peer-to-peer luxury fashion marketplace. Tim invested via his AngelList syndicate alongside Richard Branson and John Doerr. Three-part episode — unusually long format — because Tim caught her in the trenches of rapid growth rather than in hindsight. She is not technically trained, learned everything as an autodidact, and demonstrates how to build a high-velocity company without a CS background."},
  {n:"Bryan Johnson",e:"#81",c:"biz",d:"Founded Braintree (sold to eBay for $800M), then invested $100M of personal capital into the OS Fund — backing scientists trying to rewrite the operating systems of life: curing aging, programming DNA, replicating the visual cortex via AI. Grew up poor in a small Utah town with a close-knit family. One of the most visionary 'what comes next' conversations in the early archive."},
  {n:"Noah Kagan",e:"#75",c:"tech",d:"Employee #30 at Facebook (fired before his options vested) and #4 at Mint.com. Built four seven-figure businesses including AppSumo and SumoMe. Moved to Austin before it was fashionable. Advocates starting a business with a $100 challenge: make your first $100 in 48 hours. Obsessive taco connoisseur. Was rejected by Google twice — couldn't remember how to do division in the interview."},
  {n:"Peter Diamandis",e:"#56,#90",c:"biz",d:"XPRIZE Foundation chairman, co-founder of Human Longevity Inc. and Planetary Resources (asteroid mining). Answers listener questions about disrupting education via AI, his morning routine with twin four-year-olds, and how to think 10x bigger rather than 10% bigger. Argues the best way to become a billionaire is to help a billion people. One of the most consistently optimistic voices in the archive."},
  {n:"Mark Hart & Raoul Pal",e:"#63",c:"biz",d:"Hedge fund managers who discuss investing, lifestyle optimization, and the overlap between the two. Mark Hart is famous for making enormous profits shorting the Chinese renminbi and on the US mortgage crisis. Raoul Pal co-founded Real Vision and is one of the most respected macro thinkers of his generation. Discusses how the best investors think about risk, position sizing, and when to live abroad."},
  {n:"Alex Blumberg",e:"#58,#59",c:"media",d:"NPR/Planet Money producer who co-founded Gimlet Media — one of the most successful podcast companies ever built, later sold to Spotify. Two-part episode on how to create a blockbuster podcast: story structure, why narrative beats information, how to pitch ideas, and the painful inside story of his own company's earliest struggles (documented in his own podcast Startup). One of the best craft conversations in the archive for anyone who makes audio."},
  {n:"Mr. Money Mustache",e:"#221",c:"biz",d:"Pete Adeney — software engineer who retired at 30 by living on 25–27K per year and writing a blog about it that became one of the most influential personal finance resources on the internet. His core philosophy: most consumer spending is 'clown purchases' — things bought for status or comfort that produce no lasting happiness. Frugality is not deprivation — it is the recognition that most of what you spend money on doesn't actually make you happy."},
  {n:"Nick Szabo",e:"#244",c:"tech",d:"Cryptographer, legal scholar, and one of the most important figures in the history of Bitcoin and smart contracts — often cited as a possible Satoshi Nakamoto. Discusses the philosophy and history of money, why decentralization matters as a political and not just technical question, and why most people's intuitions about cryptocurrency are shaped by the wrong mental models. Extremely rare public appearance from someone who almost never gives interviews."},
  {n:"Joe De Sena",e:"#16",c:"sport",d:"Founder of Spartan Race, which he built from a small Vermont obstacle course into the world's largest obstacle race company with 1M+ participants. Grew up in Queens, got into business with organized crime as a teenager, and used extreme endurance sport to rebuild himself. His philosophy: obstacles make you stronger, and manufactured comfort is the root of most human weakness. Lives on a farm in Vermont and puts every guest through brutal physical challenges."},
  {n:"Brian Koppelman",e:"#10,#424",c:"film",d:"Co-writer and co-director of Rounders, Ocean's Thirteen, The Illusionist, and Billions (the Showtime series). In the first episode discusses creativity and the writing process. In the second, a deep conversation about making art, the influence of Francis Ford Coppola, and building creative momentum. His podcast The Moment is one of the best in-depth series on creative process available anywhere."},
  {n:"Richard Betts",e:"#110",c:"food",d:"Master Sommelier, author, and craft spirits entrepreneur. Describes himself as the 'tattooed heretic of wine and whiskey.' Left the traditional fine dining world to pursue a more adventurous relationship with fermented and distilled beverages. Discusses how to develop genuine taste rather than memorized expertise, the physiology of flavor perception, and why the wine industry's credentialing system produces mediocre tasters."},
  {n:"Murray Carter",e:"#236",c:"adventure",d:"18th-generation Yoshimoto Bladesmith trained in the traditional Japanese craft of knife-making. One of only a handful of Westerners ever certified in the traditional Japanese method. Discusses the philosophy of Shokunin (the artisan who devotes a lifetime to mastering a single craft), how to assess true knife quality, and why the pursuit of mastery in a manual craft produces a quality of attention impossible in knowledge work."},
  {n:"Phil Keoghan",e:"#242",c:"adventure",d:"Host of The Amazing Race, winner of 21 Emmy Awards. His 'No Opportunity Wasted' philosophy came directly from a near-death experience as a young diver trapped in a sunken ship off New Zealand. He has since made it his mission to understand how people who have faced death approach their bucket lists — and why most people wait until a crisis to start living the life they want."},
  {n:"Nick Ganju",e:"#45",c:"tech",d:"ZocDoc co-founder (the online medical appointment booking platform). Discusses the majesty of ping pong as a thinking and performance sport, poker as a decision-making laboratory, and how he applies musical structure — he co-wrote a hit song — to product thinking. One of the show's most eclectic early conversations."},
  {n:"Danielle & Astro Teller",e:"#77",c:"tech",d:"Astro Teller is CEO of X (Google's moonshot factory) — Tim's conversation with him and his wife Danielle explores what Google X, medicine, and great relationships have in common. The answer: all require honest feedback loops, willingness to kill beloved projects, and systematic protection of the people doing the work. Danielle Teller is a physician and author."},
  {n:"Doug McMillon",e:"#345",c:"biz",d:"CEO of Walmart — the largest private employer in the world. Started as a summer associate unloading trucks at a Walmart distribution center at 17. Discusses how to lead a 2.3 million employee organization through transformation, why culture change at scale requires changing your own behavior before changing policy, and the peculiar challenges of running a company whose customers are essentially all of America."},
  {n:"Joe Gebbia & Brian Chesky",e:"#326",c:"tech",d:"Airbnb co-founders Reid Hoffman interviews both on how to scale to 100M+ users. The episode covers the specific decisions that enabled Airbnb's growth, how to build trust between strangers at scale, and the near-death moments during the 2008 recession when they were living on credit card debt and selling custom cereal boxes (Obama O's and Cap'n McCain's) to stay afloat."},
  {n:"Cindy Eckert",e:"#314,#425",c:"biz",d:"Founder of Sprout Pharmaceuticals, which she sold for $1 billion after FDA approval of the first female sexual dysfunction drug (flibanserin, dubbed 'female Viagra'). Subsequently bought the company back for $1 when the acquirer failed to market it properly. One of the most dramatic entrepreneurial reversals in the archive. Her advice: be the most prepared person in every room, know your opposition's arguments better than they do."},
  {n:"Liz Lambert",e:"#320",c:"biz",d:"Hotel and hospitality entrepreneur who transformed neglected properties in Austin and Marfa, Texas into cult-destination boutique hotels. Discusses the art of hospitality as creating an environment where guests feel genuinely seen and cared for rather than processed. Her approach to design: everything should tell a story about the place it's in."},
  {n:"Catherine Hoke",e:"#293",c:"biz",d:"Founder of Defy Ventures, which brings entrepreneurship training into maximum-security prisons. Her philosophy: everyone deserves a second chance, and the entrepreneurial skills that help people survive in criminal environments — resourcefulness, leadership, resilience — are exactly the skills needed to build legitimate businesses. Discusses going to prison herself (not as an inmate) and why it changed everything she thought she knew about human potential."},

  // ── TECH & MEDIA ──────────────────────────────────────────────────────────
  {n:"Kara Swisher & Walter Isaacson",e:"(various)",c:"media",d:"Both appear in various episodes discussing the state of technology journalism and biography respectively. Swisher's approach: never assume good faith from people who have given you evidence of bad faith. Isaacson's approach: find the one thread that runs through an entire life and pull on it."},
  {n:"David Heinemeier Hansson & Jason Fried (joint)",e:"#195,#203,#329",c:"tech",d:"The Basecamp partnership is discussed across multiple episodes. Their key insight as a pair: they have never taken outside investment, never had a board, and never optimized for growth — and this has made them more profitable, more creative, and happier than virtually every VC-backed company they've watched implode around them. 'Calm is a superpower' is their operating philosophy."},
  {n:"Eric Ripert & Anthony Bourdain",e:"(referenced)",c:"food",d:"Bourdain is referenced frequently throughout the archive as a close friend of Tim's. Their friendship and Bourdain's approach to curiosity — going to the places that scare you, eating what the locals eat, treating every meal as an act of respect for the people who made it — is one of the recurring touchstones in the show's food and travel conversations."},
  {n:"Gary Keller",e:"#401",c:"biz",d:"Founder of Keller Williams Realty (the world's largest real estate company by agent count) and author of The ONE Thing. His central thesis: extraordinary results come from narrowing your focus to the single most important thing, not from doing more. The 'domino effect' concept: one small action done consistently can knock over progressively larger dominoes. He rebuilt Keller Williams after nearly losing it in the 2008 financial crisis."},
  {n:"James Cameron & Suzy Amis Cameron",e:"#346",c:"film",d:"Second reference highlighting Suzy Amis Cameron's contribution to the episode — she co-founded MUSE School CA, a plant-based sustainability-focused school, and has pushed James's own thinking on environmental responsibility further than his work alone. The couple discuss how they navigate a relationship between two strong-willed, highly accomplished people with independent missions."},
  {n:"Karlie Kloss & Kode With Klossy",e:"#307",c:"biz",d:"The episode is more substantive than a celebrity interview — Kloss discusses the specific experience of teaching herself to code, why she founded Kode With Klossy to give other young women the same access, and how she thinks about building a public persona that aligns with genuine values rather than brand management. Her perspective on using visibility as leverage for access rather than income is distinctive."},
  {n:"Whitney Wolfe Herd",e:"#316",c:"tech",d:"Bumble founder discusses the psychological experience of building a company after leaving Tinder following sexual harassment — the combination of determination to prove something and genuine desire to build something better. The women-first design constraint she imposed wasn't just marketing: it changed the dynamics of every interaction on the platform in measurable ways."},

  // ── LIFESTYLE & FINANCE ──────────────────────────────────────────────────
  {n:"Mr. Money Mustache (Pete Adeney)",e:"#221",c:"biz",d:"The most important early retirement / financial independence conversation in the archive. Pete retired at 30, lives on ~$27K/year, and argues most people could retire within 10 years if they stopped spending on things that don't actually increase their happiness. His framing: every dollar you spend is a dollar that could be working for you instead. He bikes everywhere, builds things himself, and reports being genuinely happier than he was when earning six figures."},
  {n:"Richard Koch",e:"#466",c:"biz",d:"Author of The 80/20 Principle and one of the most successful investors you've never heard of. Turned $2M into $100M+ by applying the 80/20 principle to investing: find the 20% of businesses that will generate 80% of the returns and concentrate everything there. Discusses achieving unreasonable success by being unreasonably selective, the art of gambling as a thinking tool, and why he lives in Gibraltar."},
  {n:"Sam Zell & Grave Dancing",e:"#407",c:"biz",d:"Zell coined the term 'grave dancing' — buying assets at the bottom of cycles when everyone else is fleeing. His rules: if everyone agrees it's a good deal, it's probably not. The best deals feel uncomfortable. He learned this buying distressed real estate in the 1970s recession, became one of America's most successful real estate investors, and sold the Equity Office Properties trust for $39B at the exact peak of the 2007 market."},
  {n:"Gretchen Rubin (The Happiness Project)",e:"#290",c:"media",d:"The episode is particularly valuable for Rubin's discussion of the 'four tendencies' in the context of habit formation. Her insight: most productivity advice is written for 'Upholders' (people who naturally respond to both inner and outer expectations) and fails for the other three types. Understanding which type you are is the prerequisite for building any habit effectively."},
  {n:"Phil Hellmuth",e:"#260",c:"biz",d:"17-time World Series of Poker bracelet winner — more than any other player in history. His mental game approach: play the person, not the cards. He can read physical tells and betting patterns with a precision that most players can't consciously access. Discusses how emotional control — or the deliberate absence of it — can be used strategically. His 'poker brat' persona is at least partly calculated."},
  {n:"James Altucher (2)",e:"#18",c:"media",d:"The episode is notable for its unusual candor about failure. Altucher lost multiple fortunes — literally went from $10M to near-zero twice — and rebuilt each time. His theory: the standard path (college, corporate job, mortgage, retirement) is one of the most dangerous financial strategies most people can pursue. He gives specific advice on how to generate ideas, test them cheaply, and build a life of intellectual freedom rather than financial security."},

  // ── SCIENCE & HEALTH ADDITIONS ───────────────────────────────────────────
  {n:"Terry Laughlin",e:"#276",c:"sport",d:"Creator of Total Immersion swimming — the technique that transformed Tim's relationship with swimming and that Chris Sacca introduced Tim to. Argues that most people swim inefficiently because they're fighting the water rather than working with it. His method: minimize drag first, then add propulsion. The same principle (remove friction before adding force) applies across disciplines. He passed away in 2017; this was one of his final major interviews."},
  {n:"Art De Vany",e:"#239",c:"science",d:"Economist and evolutionary fitness pioneer. His Evolutionary Fitness approach predated the modern paleo/ancestral health movement by a decade: intermittent fasting, random high-intensity exercise, no processed carbohydrates. At 80+ years old he remains one of the most physically impressive guests in the show's history. Discusses reverse aging as a long-term investment strategy and why consistency matters less than intensity."},
  {n:"Nick Kokonas (2)",e:"#429",c:"food",d:"Second appearance during COVID: how to resurrect restaurants after the pandemic, the importance of skin in the game, and his philosophy of investing in people over business models. His insight on pricing: most restaurants charge the wrong prices for the wrong things and then go bankrupt. Tock's reservation system solved this by letting restaurants sell experiences rather than just tables."},
  {n:"Dom D'Agostino (3)",e:"#188",c:"science",d:"Third appearance on disease prevention, cancer, and living longer. The conversation goes deeper into the therapeutic potential of ketosis for cancer — specifically the hypothesis that cancer cells cannot use ketones for fuel, making the ketogenic diet a potential adjunct to chemotherapy. Also covers the research on extended fasting as a way of triggering autophagy and cellular repair."},
  {n:"Martin Polanco & Dan Engle",e:"#104",c:"medicine",d:"Two researchers studying ibogaine-assisted therapy for addiction, specifically opioid addiction. Ibogaine is derived from the African Tabernanthe iboga plant and has shown dramatic results in clinical settings — sometimes producing complete cessation of addiction after a single treatment. The episode is one of the first mainstream media treatments of ibogaine that wasn't sensationalist."},
  {n:"Jonathan Eisen & Jessica Richman",e:"#54",c:"science",d:"A microbiome scientist (Eisen) and a consumer microbiome testing pioneer (Richman, co-founder of uBiome) discuss what is actually known — and not known — about the gut microbiome's role in health. One of the earliest serious microbiome conversations on mainstream media. Richman's company later became controversial; the episode captures the early, genuinely exciting promise of the field before the hype cycle."},
  {n:"Danielle & Astro Teller",e:"#77",c:"tech",d:"Danielle Teller is a physician and author; Astro Teller (Captain of Moonshots at X) is her husband. The episode connects three seemingly disparate domains — moonshot technology projects, modern medicine, and great long-term relationships — through the common thread of honest feedback, willingness to abandon what isn't working, and protecting the people doing the work."},
  {n:"Adam Gazzaley",e:"#83",c:"science",d:"UCSF neuroscientist building video games that are FDA-approved treatments for ADHD (the game NeuroRacer is the first FDA-cleared prescription digital therapeutic). His argument: the line between game and medicine is artificial — both involve directed attention training. The brain responds to digital experiences as real experiences. This makes games a uniquely powerful therapeutic tool if designed correctly."},
  {n:"Ed Cooke",e:"#52,#53",c:"science",d:"Grandmaster of Memory and co-founder of Memrise. The memory palace technique explained in depth across two episodes. His insight: the brain is not built to remember abstract information — it's built to remember stories, places, and vivid sensory experiences. Therefore the technique for memorizing anything is to convert it into a vivid, strange, emotionally resonant image placed in a familiar location. Anyone can do this with practice."},
  {n:"Patrick Arnold",e:"#143",c:"science",d:"The world's most famous (or infamous) performance-enhancement chemist — the man behind BALCO and the steroid scandal that swept through professional sports in the early 2000s. Discusses the chemistry and pharmacology of performance-enhancing drugs with unusual frankness, the role he played in the BALCO case, and his views on where the lines between legitimate supplementation and doping should be drawn."},
  {n:"Jason Nemer",e:"#182",c:"sport",d:"Co-founder of AcroYoga. The practice of being literally held in the air by a partner — and holding another person in the air — as a tool for building physical and emotional trust. Nemer argues that the vulnerability required in AcroYoga (trusting someone else with your physical safety) creates a depth of connection that years of conversation can't replicate. One of the show's most unusual and memorable physical practice conversations."},

  // ── PHILOSOPHY & RELATIONSHIPS ────────────────────────────────────────────
  {n:"Marie Kondo",e:"#234",c:"philosophy",d:"Author of The Life-Changing Magic of Tidying Up (sold 11M+ copies). Her KonMari method: discard everything that does not spark joy, organize what remains by category rather than by room. But the deeper philosophy is more interesting: the act of intentionally choosing what belongs in your life forces you to confront what you actually value versus what you've simply accumulated by default. She views tidying as a spiritual practice, not just an organizational system."},
  {n:"Nick Szabo",e:"#244",c:"tech",d:"Cryptographer, legal scholar, and creator of the concept of 'smart contracts' — self-executing contracts whose terms are written directly into code. One of the most likely candidates for being Satoshi Nakamoto (the anonymous Bitcoin creator), which he has neither confirmed nor denied. Discusses the deep history of money as a social technology, why decentralization is fundamentally a political rather than technical question, and the long arc from barter to cryptocurrency."},
  {n:"A.J. Jacobs (The Gratitude Chain)",e:"#344",c:"media",d:"The episode that launched a global 'gratitude chain' — Jacobs's project of tracking down and personally thanking every person in the supply chain of his morning cup of coffee, from the farmer who grew the beans in Colombia to the truck driver who delivered them to the roaster. More than 1,000 people. The experiment transformed his relationship with everyday objects and became the basis for his book Thanks a Thousand."},
  {n:"Alain de Botton (School of Life)",e:"#118",c:"philosophy",d:"The first appearance — focused on philosophy as practical tool for emotional problems. De Botton argues that philosophy has been captured by academics and needs to be returned to its original purpose: helping people navigate the specific challenges of living — anxiety about work, failure in love, fear of death. His School of Life is the institutional expression of this idea."},
  {n:"Sharon Salzberg (Loving-Kindness)",e:"#277",c:"philosophy",d:"The episode goes deeper into metta (loving-kindness) meditation than almost anything else in the archive. Salzberg's argument: most Western practitioners of meditation focus exclusively on mindfulness of breath and miss the equally important practice of cultivating compassion — first for yourself, then for people you love, then for strangers, then for difficult people. The sequence matters."},
  {n:"Will MacAskill (Effective Altruism)",e:"#120",c:"philosophy",d:"One of the most intellectually challenging episodes in the early archive. MacAskill's argument: if you genuinely care about doing good, you should treat charitable giving with the same rigor as any other major decision. Which cause saves the most lives per dollar? Which career creates the most impact? The answers are often counterintuitive — and often uncomfortable for people who give based on emotional resonance rather than evidence."},
  {n:"Phil Zimbardo (Stanford Prison Experiment)",e:"#226",c:"philosophy",d:"The Stanford Prison Experiment in depth — what actually happened, what Zimbardo would do differently, and what the experiment reveals about how ordinary people become capable of cruelty under the right situational pressures. His follow-on work on heroism: the same situational forces that produce evil can be harnessed to produce heroism. He argues heroism is a habit, not a trait."},
  {n:"Esther Perel (Intimacy & Emotional Baggage)",e:"#271",c:"philosophy",d:"Second appearance — goes deeper on the emotional baggage people bring to relationships from childhood and early experiences. Her framework: you fall in love with someone, but you also fall in love with their unresolved issues, because they fit (or conflict in familiar ways with) your own. Understanding this dynamic is the prerequisite for not repeating patterns across successive relationships."},

  // ── SPORT & ATHLETICS ────────────────────────────────────────────────────
  {n:"Dorian Yates (Blood and Guts)",e:"#235",c:"sport",d:"6x Mr. Olympia champion who trained only 4 days/week for under 45 minutes per session while dominating professional bodybuilding for six years. His high-intensity training (HIT) approach: one working set to absolute failure per exercise, maximum intensity, minimal volume. The rest of the week is recovery. Now practices yoga, discusses plant-based nutrition, and is candid about the physical cost of extreme bodybuilding on his joints and tendons."},
  {n:"Shaun White",e:"#140",c:"sport",d:"The most decorated snowboarder in Olympic history (3 gold medals). Discusses the unholy hours of practice that preceded his apparently effortless performances, his complex relationship with halfpipe snowboarding after repeatedly returning from injury, and the counterintuitive role of showmanship in technical sport. One of the more revealing conversations about what it actually costs to be the best in the world at a physical skill."},
  {n:"Dave Camarillo",e:"#196",c:"sport",d:"'The Machine' — founder of Guerrilla Jiu-Jitsu and one of the most successful combat sports coaches in the world. His students include UFC champions and world BJJ champions. His innovation: bringing judo's throwing techniques into Brazilian jiu-jitsu. His broader lesson: the best competitive advantage in any field is combining knowledge from adjacent domains that most specialists haven't integrated."},
  {n:"Ryan Flaherty",e:"#238",c:"sport",d:"Performance coach who has trained more top-10 NFL Combine performers than any other coach. His discovery: most athletes' speed deficits come from the same source (limited hip extension and hip flexor weakness), and his 'force plate testing' protocols can diagnose this and produce dramatic speed improvements in 8–12 weeks. His insight: most performance training is based on tradition rather than measurement."},
  {n:"Charles Poliquin",e:"#91,#198",c:"sport",d:"One of the world's most decorated strength coaches — trained Olympic athletes across 17 different sports. First episode: testosterone optimization, strength training fundamentals, and why most gym programs fail. Second episode: his favorite mass-building program, his nighttime routine for better sleep, and specific supplementation protocols. Known for being extremely direct and frequently controversial."},
  {n:"Mark Bell",e:"#252",c:"sport",d:"World-class powerlifter and inventor of the Sling Shot (a training aid used by thousands of strength athletes worldwide). Inside Super Training gym in Sacramento. Discusses the specific culture of elite powerlifting, the psychology of maximum-effort lifting, and why the powerlifting community has produced some of the most innovative performance nutrition thinking in strength sports."},
  {n:"Jason Khalipa",e:"#246",c:"sport",d:"CrossFit Games world champion who also built a chain of CrossFit gyms. The most emotionally powerful part of the episode: his daughter Ava was diagnosed with leukemia during his peak competitive training years. He describes using the mental framework he built for athletic competition — process focus, controllables only, ruthless prioritization — to navigate the worst experience of his life. A deeply useful model for handling catastrophic adversity."},
  {n:"Kelly Starrett (3 appearances)",e:"#3,#64,#85",c:"sport",d:"Three-episode arc: first covers the foundational movement principles from Becoming a Supple Leopard; second goes into CrossFit's goods and bads with unusual candor from an insider; third covers the 80/20 of mobility work — the 20% of interventions that address 80% of common movement problems. His core insight: most chronic pain is a movement pattern problem that can be fixed, not an anatomical destiny."},
  {n:"Bob Metcalfe",e:"#297",c:"tech",d:"Inventor of Ethernet (the networking protocol that connects most of the world's computers) and Metcalfe's Law (the value of a network grows proportionally to the square of the number of connected users). Now a farmer in Maine as a deliberate counterweight to his digital work. Discusses the long arc from ARPANET to the modern internet, and why most technological predictions are wrong in degree but right in direction."},
  {n:"Alex Blumberg (Podcast Craft)",e:"#58,#59",c:"media",d:"The two-part podcast masterclass is the best practical guide to audio storytelling in the archive. Blumberg's rules: every good story has someone who wants something and faces obstacles getting it; the interview is not for information but for emotion; the best moments happen when you stay silent after the answer. His own experience building Gimlet illustrated every principle in real time."},

  // ── MEDIA & CREATIVITY ───────────────────────────────────────────────────
  {n:"Brian Koppelman (Billions Creator)",e:"#10,#424",c:"film",d:"Second reference covers his creative collaboration with David Levien across decades: Rounders (1998), Ocean's Thirteen, The Illusionist, and Billions. His creative philosophy: the story you're most afraid to tell is always the most important one. He credits Julia Cameron's The Artist's Way with transforming his creative practice, and has done morning pages (three handwritten pages immediately upon waking) for over 20 years."},
  {n:"Joe De Sena (Spartan Race)",e:"#16",c:"sport",d:"One of the most intense guests in the early archive. De Sena's view: modern comfort is a disease. His Spartan Race is deliberately designed to be uncomfortable in ways that office work and suburban life are not. He puts his own children through the same obstacle courses his racers face. His farm in Vermont has no WiFi and limited heat. His mission: use discomfort as a tool for building resilience in a culture that has engineered it out."},
  {n:"Nick Ganju (ZocDoc)",e:"#45",c:"tech",d:"Co-founder of ZocDoc, which has facilitated hundreds of millions of medical appointments. The ping pong discussion is the episode's hook but the substance is about how to apply game theory and behavioral economics to product design. His music songwriting background informs his product thinking in surprising ways — he applies melodic structure to user flow design."},
  {n:"Rolf Potts (Vagabonding)",e:"#41,#42",c:"adventure",d:"Two-part conversation on long-term travel as a lifestyle philosophy rather than a vacation. Potts's argument: most people have far more time wealth than they realize — they just exchange it for financial wealth and security prematurely. His specific tactics: work abroad, house-sit, volunteer, slow travel. His most important insight: the most memorable travel experiences are almost never the ones you planned."},
  {n:"Lisa Randall (Extra Dimensions)",e:"#115",c:"science",d:"The episode that opened Tim's thinking on theoretical physics. Randall works on the hypothesis that there are additional spatial dimensions beyond the three we experience — dimensions that could explain dark matter, the weakness of gravity, and other anomalies in the Standard Model. Her ability to make cutting-edge physics intuitive without dumbing it down is remarkable. She also wrote an opera libretto, which she discusses in the context of how science and art share the same fundamental curiosity."},
  {n:"Morgan Spurlock",e:"#150",c:"film",d:"Documentary filmmaker (Super Size Me, Inside Man, Where in the World Is Osama Bin Laden?). His approach: be your own subject when no one else will agree to be filmed in the way you need them to be. Discusses how he pitches ideas to networks, why he chooses topics that make people uncomfortable, and the unexpected consequences of making himself the guinea pig in his own experiments."},
  {n:"A.J. Jacobs (Year of Living Biblically)",e:"#211",c:"media",d:"Jacobs spent a year following every rule in the Bible as literally as possible — including stoning adulterers (with pebbles, in Central Park), not shaving his beard, wearing only white linen, and attempting to avoid all lies. The experience was genuinely transformative in unexpected ways: he found that acting grateful made him feel grateful, that slowing down to observe the Sabbath was one of the most valuable things he'd ever done. Action precedes feeling — not the other way around."},
  {n:"Maria Popova (Brain Pickings Origin)",e:"#39",c:"media",d:"First appearance — the origin story of Brain Pickings, which Maria started as a weekly email to seven friends while working in advertising. Its growth was entirely organic. She discusses why she has never accepted advertising, why she thinks the internet has produced a crisis of attention, and how she decides what to write about. Her rule: only write about things that genuinely surprise or move her, never write for SEO or virality."},
  {n:"Scott Adams (Dilbert & Systems)",e:"#106",c:"media",d:"The systems vs. goals conversation is the most widely cited idea from this episode, but the discussion of affirmations is almost equally interesting. Adams argues that writing your goals 15 times per day programs your subconscious to notice relevant opportunities that were always present but invisible. He calls this 'training your attention' rather than 'manifesting.' His background in hypnosis informs his view that most human behavior is driven by subconscious pattern-matching rather than conscious decision-making."},
  {n:"Derek Sivers (Hell Yes or No)",e:"#125,#128,#202",c:"philosophy",d:"Three appearances. First: developing confidence and finding happiness. Second: success habits and billionaires with perfect abs (a more irreverent conversation). Third: Derek Sivers Distilled — a compilation of his most important ideas. The 'hell yes or no' rule, the notebook of book summaries, the decision to live minimally in multiple countries, and his habit of asking 'what's the opposite of what everyone else is doing?' as a starting point for any decision."},
  {n:"Tara Brach (Radical Acceptance)",e:"#94",c:"philosophy",d:"One of the most listened-to meditation episodes in the entire archive. The 'trance of unworthiness' — the background sense that something is fundamentally wrong with us — as the hidden driver of overwork, relationship problems, addiction, and anxiety. Her insight: this trance is so pervasive that most people don't even notice it. The practice of RAIN (Recognize, Allow, Investigate, Nurture) is a direct antidote."},
  {n:"Brené Brown (Vulnerability & Courage)",e:"#100",c:"philosophy",d:"The conversation where Brené reveals she almost never told the story of her own 'breakdown/spiritual awakening' that became the centerpiece of her TEDx talk. Her husband told her it was a terrible idea. She did it anyway, drove home mortified, and it became one of the five most-watched TED talks in history. Her insight: vulnerability is not weakness — it is the birthplace of courage, connection, and belonging."},
  {n:"James Cameron (Impossible Goals)",e:"#346",c:"film",d:"The conversation about setting explicitly impossible goals is one of the most practical in the archive for creative professionals. Cameron's method: decide what you want to make before the technology to make it exists, then trust that the technology will exist by the time you need it. He did this with both Titanic (pioneering underwater photography) and Avatar (pioneering motion-capture CGI). The goal drives the innovation; the innovation doesn't constrain the goal."},

  // ── ADDITIONAL NOTABLE GUESTS ────────────────────────────────────────────
  {n:"Shep Gordon (Celebrity Chef Inventor)",e:"#184",c:"biz",d:"The episode where Gordon explains how he invented the celebrity chef concept: he realized chefs had all the ingredients for celebrity (craft, personality, drama) but none of the mechanisms. He took Wolfgang Puck on the Sunset Strip, engineered a photograph of him with a famous actress to appear on the front page of a major newspaper, and the celebrity chef concept was born. The story illustrates his core skill: seeing a category that doesn't exist yet and creating the infrastructure for it."},
  {n:"Maria Sharapova (Mental Performance)",e:"#261",c:"sport",d:"The conversation goes deeper on her mental preparation than most sports interviews. Sharapova's approach to visualization: not just imagining winning, but specifically rehearsing every possible scenario including equipment failures, hostile crowds, and playing through pain. Her insight: the gap between top players at the elite level is almost entirely mental, not physical. The physical preparation is table stakes; the mental preparation is the differentiator."},
  {n:"Bryan Callen (Comedy & Philosophy)",e:"#47",c:"comedy",d:"The episode title — 'Eating Corgis (Yes, The Dogs) and Improving Creativity' — is a Tim joke that sets up a surprisingly deep conversation. Callen's daily martial arts practice is not just physical training — it is his primary philosophical practice. He approaches Stoic philosophy the same way: not as something to read about but as something to embody through daily choices. His reading list (Seneca, Epictetus, Marcus Aurelius) functions as his operating manual."},
  {n:"Gabby Reece (Athletic & Emotional Intelligence)",e:"#89",c:"sport",d:"Co-guest on the Hamilton/MacKenzie episode. Gabby's contribution to the conversation about physical training and relationships is distinctive: she argues that the same emotional skills required for great athletic performance — presence, adaptability, willingness to be uncomfortable — are the same skills required for great relationships. Physical training is not separate from emotional development; it is a form of it."},
  {n:"Paulo Coelho (The Alchemist)",e:"#154",c:"philosophy",d:"One of the show's most unusual conversations — Coelho is not a tactician or a systems thinker. He talks about grace, synchronicity, and the experience of receiving a complete story as if it arrived from outside him. His description of writing The Alchemist in two weeks after carrying the story for years resonates with Elizabeth Gilbert's 'Big Magic' framework. He is also surprisingly direct about his failures: two books before The Alchemist were ignored; a Brazilian publisher rejected it after seeing the first."},
  {n:"Ed Catmull (Pixar's Creative Culture)",e:"#22",c:"film",d:"The episode is one of the most valuable in the archive for anyone building a creative organization. Catmull's central insight: every Pixar film starts as a terrible movie, and the question is not how to prevent bad work but how to create the conditions where bad work can be improved without ego damage. The Braintrust — where directors receive unvarnished peer feedback with no authority over their project — is the institutional answer to that question."},
  {n:"Astro Teller (10x Thinking)",e:"#77,#309",c:"tech",d:"Two appearances. First with Danielle Teller; second a solo deep dive on 10x thinking at Google X. His argument for why 10x is easier than 10%: 10% improvement requires doing everything you currently do slightly better. 10x improvement requires abandoning your current approach entirely and finding a completely different one. The second is harder psychologically but easier practically — because you're no longer constrained by the existing approach's limitations."},
  {n:"Raoul Pal",e:"#63",c:"biz",d:"Co-founder of Real Vision, former Goldman Sachs executive, and macro investor who predicted the 2008 financial crisis. Discusses how macro traders think about global capital flows, the relationship between monetary policy and asset prices, and his decision to move to Cayman Islands at 36 to 'retire' — then built one of the most influential financial media companies of the next decade. His framework for big macro trades: follow the debt cycle."},
  {n:"Mark Hart",e:"#63",c:"biz",d:"Hedge fund manager who co-runs Corriente Advisors and made enormous profits on the Chinese renminbi depreciation trade that most institutional investors dismissed. Discusses how to hold a contrarian macro position for years while the market moves against you, the psychological cost of being right too early, and how to size positions so that being wrong doesn't ruin you before being right rewards you."},
  {n:"Jessica Richman",e:"#54",c:"science",d:"Co-founder of uBiome, which pioneered direct-to-consumer microbiome testing. Discusses the then-nascent science of the gut microbiome, how her company was gathering research data at unprecedented scale, and the promise of personalized medicine based on individual microbiome profiles. Her appearance captures an important moment in the field before both the hype and the subsequent controversy."},
  {n:"Doris Kearns Goodwin (Presidents & Leadership)",e:"#335",c:"media",d:"The Lincoln discussion is the centerpiece but the episode covers four presidents — Lincoln, FDR, LBJ, and Teddy Roosevelt — as case studies in how leaders respond to crisis, build teams of rivals, and translate adversity into growth. Her most practical insight: great leaders all had in common the ability to acknowledge mistakes publicly rather than doubling down — because admitting error made them stronger with the people around them, not weaker."},
  {n:"Kevin Costner (Vision & Career Design)",e:"#119",c:"film",d:"One of the show's most candid conversations about how creative professionals survive decades in an industry designed to commoditize them. Costner's method: he has always financed his most personal projects independently, accepting financial risk in exchange for creative control. Dances with Wolves was turned down by every major studio and he funded it himself. The film won 7 Academy Awards. His rule: never let fear of financial failure prevent you from making what matters to you."},
  {n:"Jon Favreau (Chef as Reset)",e:"#71",c:"film",d:"The story of making Chef — a small personal film after blockbuster Iron Man films — is one of the show's best illustrations of using a deliberate reset project to reconnect with original motivation. Favreau described feeling creatively disconnected after the scale and pressure of major studio films and needing something he owned completely, from script to screen. Chef was that film. The process of making it reminded him why he became a filmmaker."},
  {n:"Richard Schwartz (IFS Therapy)",e:"#492",c:"medicine",d:"One of the most practically transformative therapeutic frameworks in the archive. Schwartz's Internal Family Systems: the mind is not a monolith — it contains multiple 'parts' (the inner critic, the people-pleaser, the protector, the exiled child) each with its own agenda and history. Healing comes not from eliminating difficult parts but from befriending them and understanding what they're protecting. IFS is being adopted across therapy, coaching, and leadership development because the results are rapid and deep."},
  {n:"Lori Gottlieb (Maybe You Should Talk to Someone)",e:"#415",c:"medicine",d:"Therapist and memoirist who simultaneously writes about being a therapist and being a therapy patient herself. Her insight: the stories we tell about ourselves are the primary obstacle to change — and most people need help noticing that the story is a story rather than a fact. Her book interweaves four patient stories with her own therapy process, demonstrating in real time the universality of the patterns she treats."},
  {n:"Michael Lewis (The Big Short Origins)",e:"#427",c:"media",d:"The conversation about how he found The Big Short story is one of the best craft discussions in the archive. Lewis describes being told about Michael Burry (the fund manager who first bet against mortgage securities) by someone who found his story unbelievable. His instinct: that's exactly the story I want. He spent two years embedded with Burry, Steve Eisman, and the other 'outsiders' who saw what the entire financial system missed. His rule: the most important stories are the ones that contradict received wisdom."},
  {n:"Rana el Kaliouby (Emotion AI)",e:"#423",c:"tech",d:"The first serious discussion of emotion recognition AI in the archive. Kaliouby's company Affectiva built systems that can read facial expressions and emotional states in real time, with applications from automotive safety (detecting drowsy drivers) to market research (measuring actual audience reactions). The deeper philosophical question the episode raises: what does it mean to have AI that can read our feelings before we've consciously acknowledged them?"},
  {n:"Guy Raz (How I Built This)",e:"#462,#489",c:"media",d:"Two appearances. First: how Raz built one of the world's most listened-to podcasts, his history with depression, and his predictions for the podcast ecosystem. Second (reversed roles): Raz interviews Tim for How I Built This, extracting the origin story of the 4-Hour Workweek, Tim's near-suicide at Princeton, his first company BrainQUICKEN, and the specific decisions that shaped the subsequent decade. One of the most revealing autobiographical conversations Tim has given."},
  {n:"Jerry Colonna (CEO Whisperer)",e:"#373",c:"philosophy",d:"The episode title 'The Coach With the Spider Tattoo' points to Colonna's own journey: a successful VC partner who suffered a breakdown, did years of intensive psychological work, and built his coaching practice on the insight that founder struggles are almost always psychological rather than strategic. His central question — 'How are you complicit in creating the conditions you say you don't want?' — has been called the most important question many of his clients have ever been asked."},
  {n:"Bozoma Saint John (Marketing & Identity)",e:"#288",c:"biz",d:"One of the most charismatic presences in the archive. Her career trajectory — from Spike Lee film sets to Pepsi to Apple to Uber to Netflix — is itself a case study in using authenticity as a career strategy. She argues that most marketing fails because it tries to project an image rather than express a genuine identity. Her Apple Music presentation at WWDC 2016 (introducing Apple Music to a skeptical developer audience with 'Lose Yourself') is cited as one of the most effective tech stage presentations of the decade."},
  {n:"Scott Belsky (The Messy Middle)",e:"#336",c:"biz",d:"Behance founder and author of The Messy Middle — the period in any project or company between the initial excitement and the eventual success when most people quit. His insight: the middle is not a problem to be solved but a territory to be navigated. The skills required in the messy middle (resilience, resourcefulness, ability to keep your team motivated without external validation) are completely different from the skills required at launch or at scale."},
  {n:"Tyler Cowen (Marginal Revolution)",e:"#413",c:"media",d:"One of the most eclectic intellects in the archive. Cowen discusses COVID-19 rationality, his concept of 'mood affiliation' (the tendency to adopt beliefs that match your emotional state rather than the evidence), his daily practice of eating at restaurants no one recommends (to find hidden gems), and his 'straussian' reading practice — looking for the hidden meaning beneath the surface of texts. He also discusses the specific music he uses as a thinking aid."},
  {n:"Mike Novogratz (Crypto & Redemption)",e:"#451",c:"biz",d:"Former Goldman Sachs partner and Fortress Investment Group manager who became one of crypto's most prominent investors after an ayahuasca experience in 2017. His candor about his 2018 losses (he publicly predicted Bitcoin would hit $40K in 2018; it fell from $20K to $3K) is exceptional in a world where finance professionals almost never admit specific mistakes publicly. Discusses the psychology of large-scale financial losses and how to rebuild after public failure."},
  {n:"Harley Finkelstein (Shopify COO)",e:"#486",c:"biz",d:"Shopify's President who worked his way through law school running a t-shirt business. His argument: entrepreneurship is not about disruption — it's about access. Shopify's mission is giving every entrepreneur access to the same tools that were previously only available to large corporations. Discusses the future of retail (the pendulum swinging back toward independent brands), the importance of hiring people who are better than you, and his practice of radical transparency with his team."},
  {n:"David Blaine (Mental State Control)",e:"#245",c:"adventure",d:"The conversation goes beyond magic to explore the mental technologies Blaine has developed for extreme endurance. His description of entering a state so deep during a 17-minute breath hold that time essentially stops — that he has no experience of 45 seconds passing — is one of the most extraordinary accounts of altered consciousness in the archive. His practical insight: the primary training tool is learning to observe sensation without identifying with it."},
  {n:"Tim Kennedy (Hurry Up & Fail)",e:"#310",c:"military",d:"Special Forces sergeant, UFC fighter, and entrepreneur who argues that most people fail too slowly because they're too cautious to begin. His 'hurry up and fail' philosophy: if you're going to fail (and most first attempts do), the sooner you fail the better — because the information in failure is the most valuable thing you'll collect. He applies this to business, combat sports, and military operations equally."},
  {n:"Stefan Sagmeister",e:"#(referenced)",c:"media",d:"The legendary graphic designer who takes a year-long sabbatical every seven years, closing his studio entirely to explore without commercial pressure. Tim has referenced Sagmeister's sabbatical practice as one of the most influential ideas in his thinking about the relationship between rest and creativity. The concept: most great ideas come from periods of deliberate unproductivity, not from working harder."},
  {n:"Danielle Steel (referenced)",e:"#(referenced)",c:"media",d:"Tim references the extraordinary discipline of romance novelist Danielle Steel (100+ novels) as an example of creative output through sheer habitual practice — she reportedly writes 18–20 hours per day during production phases. The reference point in the archive is always used to contrast the 'inspiration myth' with the reality that most prolific creative output is the product of brutal schedule adherence."},
  {n:"Sam Harris & Timothy Ferriss (Conversation)",e:"#433",c:"philosophy",d:"One of the most practically useful Sam Harris episodes — focused specifically on coping with pandemic anxiety and applying mindfulness to acute stress rather than to chronic conditions. Harris's insight: the practice of mindfulness is most valuable precisely when it feels least natural — not in calm stable conditions but in the exact moments of maximum anxiety. The awareness itself doesn't go anywhere; you just temporarily lose access to it."},
  {n:"Brian MacKenzie (XPT & Breathing)",e:"#89",c:"sport",d:"The co-guest on the Hamilton/Reece episode. MacKenzie's CrossFit Endurance protocol is in the archive mostly through the 4-Hour Body reference, but his contribution to the episode is about a specific insight: breathing is the most underrated performance variable. How you breathe during exercise determines your ceiling. His work with Wim Hof methodology and breath control preceded the mainstream interest in breathwork by several years."},
  {n:"Debbie Millman (Design Matters)",e:"#214,#230,#304,#472",c:"media",d:"Four appearances across the archive make Millman one of Tim's most frequently returning guests. The arc of her appearances reveals how her thinking has evolved: from design as craft (first appearance) to design as career strategy (second) to design as life philosophy (third) to design as a lens for reviewing other creative work (Books I've Loved). Her 10-year remarkable life exercise has been cited by more listeners as life-changing than almost any other single practice."},

  // ── FOOD & CRAFT ADDITIONS ───────────────────────────────────────────────
  {n:"Richard Betts (Wine & Whiskey)",e:"#110",c:"food",d:"The most unusual sommelier conversation in the archive. Betts rejected the traditional fine dining wine world to pursue a more authentic relationship with craft beverages. His insight on developing genuine taste versus learned expertise: taste expertise built on memorized descriptors is fragile — genuine taste built on thousands of hours of sensory attention is robust. He can identify a wine's region, vintage, and producer from smell alone."},
  {n:"Joshua Skenes (Saison)",e:"#156",c:"food",d:"The chef behind Saison in San Francisco — one of the most expensive restaurants in America, built around an open-fire hearth and an almost religious commitment to the provenance of ingredients. Skenes treats cooking as a spiritual practice. His view: the quality of attention you bring to preparing food is transferred to the person eating it. He grows, forages, and sources every ingredient personally. The restaurant is as much a philosophy as a kitchen."},
  {n:"Mark Bittman (Food System Reform)",e:"#205",c:"food",d:"Former New York Times food columnist and author of How to Cook Everything. His argument: the American food system is broken not at the level of individual recipes but at the level of the agricultural and political systems that determine what ingredients are available and affordable. His VB6 (vegan before 6pm) approach is a pragmatic middle ground between idealism and behavior change."},
  {n:"Andrew Zimmern (Bizarre Foods & Recovery)",e:"#40",c:"food",d:"Host of Bizarre Foods, which has taken him to 170+ countries to eat what locals eat. His origin story is extraordinary: he was homeless and addicted in New York City in his late 20s, living on the streets, before getting sober and rebuilding his life through cooking. The episode is as much about recovery and resilience as about food. His culinary philosophy: respect is expressed by eating what people eat, not by politely declining what makes you uncomfortable."},
  {n:"Sam Kass (White House Chef)",e:"#82",c:"food",d:"The Obama White House chef who simultaneously served as Senior Policy Advisor for Nutrition — one of the most unusual job combinations in American political history. Discusses the specific challenge of cooking nutritious food for people who have essentially unlimited access to any food they want, and the political battles he had to fight to change federal nutrition guidelines. Also covers the trials by fire of cooking for state dinners."}

}

function ra(){
  const q=(document.getElementById('as').value||'').toLowerCase();
  const f=A.filter(a=>!q||(a.t+a.s+a.b).toLowerCase().includes(q));
  document.getElementById('ac2').textContent=f.length+' anecdotes shown';
  const el=document.getElementById('alist');
  el.innerHTML='';
  if(!f.length){el.innerHTML='<div class="nores">No anecdotes match your search.</div>';return;}
  f.forEach(a=>{
    const d=document.createElement('div');
    d.className='acard';
    d.innerHTML=`<div class="atitle">${a.t}</div><div class="asrc">${a.s}</div><div class="abody">${a.b}</div>`;
    el.appendChild(d);
  });
}

function showTab(tab,event){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function gc(cat,btn){
  gCat=cat;
  document.querySelectorAll('#gf .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  rg();
}

function hc(cat,btn){
  hCat=cat;
  document.querySelectorAll('#hf .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  rh();
}

rg();rh();rb();ra();
</script>
</body>
