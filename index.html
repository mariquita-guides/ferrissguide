{c:"mindset",t:"Second-level thinking: what does the consensus believe?",s:"Howard Marks — ep. #338",d:"Before acting on any belief: 'What does the consensus believe about this?' If your view matches consensus, acting on it produces average results. True edge comes from having a variant perception and being right. Applies to investing, hiring, strategy, and relationships."},
{c:"mindset",t:"'Easy choices, hard life. Hard choices, easy life.'",s:"Jerzy Gregorek — ep. #228",d:"Gregorek distilled his entire philosophy — developed through defection from Poland, refugee camp, and world championship weightlifting — into one sentence. Choosing comfort consistently creates a hard life. Choosing difficulty consistently creates an easy life."},
{c:"mindset",t:"Systems over goals",s:"Scott Adams — ep. #106",d:"Goals are for people who want to feel good about the future; systems are for people who want to make progress in the present. Instead of 'I want to lose weight,' the system is: only keep healthy food at home and walk every day. The goal dissolves into the system."},
{c:"mindset",t:"'How are you complicit?' — the core coaching question",s:"Jerry Colonna — ep. #373",d:"'How are you complicit in creating the conditions you say you don't want?' Most people describe their problems as happening to them. This question reveals their own participation. Uncomfortable precisely because it is almost always answerable."},
{c:"mindset",t:"FOPO — fear of other people's opinions as the peak-performance obstacle",s:"Michael Gervais — ep. #256",d:"The primary obstacle to peak performance is not fear of failure — it's FOPO (fear of other people's opinions). His approach: build an internal standard completely independent of external reaction through mindfulness practice."},
{c:"mindset",t:"'Terminal Wednesday' — would you do this with one year to live?",s:"Ricardo Semler — ep. #229",d:"Semler began taking Wednesdays off in his 30s, spending them asking: if I had a terminal diagnosis and one year to live, would I be doing what I am currently doing? Strips away things done out of inertia, social pressure, or theoretical future payoff."},
{c:"body",t:"One meal a day (OMAD)",s:"Gen. McChrystal — ep. #86",d:"McChrystal has eaten one meal per day — dinner only — for most of his adult life. Not for spiritual reasons: his personality prefers deferring gratification and eating as a reward after a productive day. He pairs this with running 8+ miles daily."},
{c:"body",t:"Sauna + ice bath cycling",s:"Rick Rubin — ep. #76 / Dr. Rhonda Patrick — ep. #12",d:"Regular heat/cold cycling. Patrick cites research: regular sauna use (170°F, 20+ min, 4x/week) reduces cardiovascular disease risk by up to 63% and all-cause mortality significantly. The adaptation responses are impossible to achieve through exercise alone."},
{c:"body",t:"Cold exposure every morning",s:"Wim Hof — ep. #102",d:"Cold water every day as an absolute non-negotiable. Companion breathing protocol: 30 deep breaths, breath retention, repeat. Alkalinizes the blood and activates the sympathetic nervous system."},
{c:"body",t:"Zone 2 cardio as longevity foundation",s:"Dr. Peter Attia — ep. #398",d:"3–4 hours per week of low-intensity aerobic exercise (conversational pace) as the single highest-leverage longevity intervention — more impactful than any drug or supplement. He tracks metabolic efficiency via lactate measurement."},
{c:"body",t:"The 85% training rule",s:"Hugh Jackman — ep. #444",d:"Never train past 85% of maximum capacity. The rule prevents injuries that derail consistency. 100% effort once per week produces worse outcomes over a decade than 85% effort five times per week. Long-term consistency beats short-term intensity."},
{c:"body",t:"Weighted underwater pool training — XPT",s:"Laird Hamilton — ep. #89",d:"Holding heavy dumbbells and walking across the pool floor, combined with underwater obstacle courses and breath-hold training. Cold water + breath restriction + load creates an adaptation stimulus impossible to achieve above water. 'Confuse the body completely, regularly.'"},
{c:"body",t:"RAIN — Recognize, Allow, Investigate, Nurture",s:"Tara Brach — ep. #94",d:"Practical technique for difficult emotions: Recognize what you're feeling, Allow it without resistance, Investigate it with curiosity (where do you feel it?), and Nurture yourself with the compassion you'd offer a friend. A two-minute field-deployable practice."},
{c:"body",t:"4-7-8 breathing as the strongest relaxation tool",s:"Dr. Andrew Weil — ep. #350",d:"Inhale for 4 counts, hold for 7 counts, exhale for 8 counts. Repeat four times. The most powerful relaxation response activator available without pharmacological intervention. The extended exhale activates the parasympathetic nervous system."},
{c:"body",t:"Lion's mane + niacin for neurogenesis",s:"Paul Stamets — ep. #340",d:"Lion's mane mushroom daily combined with niacin (vitamin B3). Hypothesis: lion's mane stimulates nerve growth factor; niacin opens peripheral blood vessels acting as a carrier. Taken for years with described improvements in cognitive clarity."},
{c:"body",t:"'Greasing the groove' — frequent submaximal practice",s:"Pavel Tsatsouline — ep. #55",d:"Rather than training to failure, do many sets at 40–50% of maximum throughout the day. If your max pull-ups is 10, do sets of 4–5 six times daily. Strength is a skill — skills improve with quality repetitions, not exhaustion. Never train to failure."},
{c:"work",t:"Write every single day without exception",s:"Seth Godin — ep. #138",d:"Godin has published a blog post every day for over 15 years. Waiting for inspiration is a trap. The streak is the practice — the output matters less than the daily commitment to produce. Shipping imperfect work builds the creative muscle."},
{c:"work",t:"Don't Break the Chain — calendar method",s:"Jerry Seinfeld — ep. #485",d:"Mark a red X on a paper calendar for every day you do the work. The only job is not to break the chain. Quality emerges from quantity over time as your standards rise with experience."},
{c:"work",t:"Radical transparency and shared intelligence",s:"Gen. McChrystal — ep. #86",d:"McChrystal transformed JSOC by running a daily global video briefing sharing all classified intelligence in real time across thousands of personnel. Speed of information became the decisive advantage. The death of Zarqawi followed directly from this architecture."},
{c:"work",t:"Track creative hours — target 1,000 per year",s:"Jim Collins — ep. #361",d:"Collins targets 1,000 creative hours per year and tracks them precisely — not meetings, not email: genuine creative output. Most executives believe they're doing creative work when they're actually doing reactive work. The log reveals the truth."},
{c:"work",t:"Walk 5–6 hours daily as a thinking environment",s:"Daniel Ek — ep. #484",d:"Ek walks for hours every day — not as exercise but as his primary creative thinking environment. No music, no podcasts. Research confirms walking's effect on divergent thinking: people consistently generate more creative ideas while walking than while seated."},
{c:"work",t:"Write longhand in an analog environment",s:"Neil Gaiman — ep. #366",d:"Every first draft written longhand with a specific black pen in a hut in the woods with no internet. The physical act creates different quality sentences. The hut provides the boredom he considers essential for creativity: 'You have to be bored before you can be interesting.'"},
{c:"work",t:"Dual-column journal: intended vs. actual actions",s:"Robert Rodriguez — ep. #98",d:"His father gave him a planner with two columns: planned actions on the left, actual actions on the right. The gap between them is a daily honest feedback mechanism. He kept this journal throughout El Mariachi's production specifically to record what went wrong."},
{c:"work",t:"Curiosity conversations — one per week for 40+ years",s:"Brian Grazer — ep. #279",d:"Weekly meetings with people who have no immediate professional utility to him: scientists, criminals, foreign leaders, athletes, artists. One question: 'What's the most important thing you've learned?' Virtually all his most successful films were seeded by ideas from these conversations."},
{c:"work",t:"Write in public to prevent self-censorship",s:"Chuck Palahniuk — ep. #457",d:"Writes in coffee shops and airports deliberately because isolation makes writers too precious and self-critical. The ambient noise creates a paradoxical permission to be raw and unguarded."},
{c:"work",t:"Carry a camera everywhere — create access through documentation",s:"Jamie Foxx — ep. #124",d:"Before fame, Foxx brought a professional camera to every event he could access. The camera created social utility — people wanted to be documented. He followed Puff Daddy around for months this way. 'The first social media guy without social media.'"},
{c:"decision",t:"Fear-setting — define the worst case",s:"Tim Ferriss — multiple episodes",d:"Before any difficult decision, write: (1) the worst realistic outcome, (2) how likely it is, (3) what you'd do to recover. Tim traces this to Seneca's 'premeditatio malorum' and claims it resolves more than 90% of paralyzing fears. The worst case is almost always recoverable."},
{c:"decision",t:"Scenario planning — three futures before deciding",s:"Reid Hoffman — ep. #101",d:"Hoffman maps three scenarios for every major decision: best realistic case, worst realistic case, most likely case. Can I survive the worst case? If yes, the decision becomes much easier. Distinguishes truly catastrophic risks from merely unpleasant ones."},
{c:"decision",t:"Price it as what it will become, not what it is",s:"Bob Iger — ep. #406",d:"Iger's acquisition philosophy for Pixar, Marvel, and Lucasfilm: pay prices that look expensive based on what assets are, not what they'll become under Disney's infrastructure. Made all three acquisitions over internal objections about price."},
{c:"decision",t:"Invest in what feels absurd to almost everyone",s:"Mike Maples Jr. — ep. #286",d:"The best investments (Twitter, Lyft, Twitch) all felt not just risky but strange or even absurd at the time. If an opportunity makes immediate intuitive sense to most sophisticated people, returns will be average. The discomfort of a contrarian bet is the signal."},
{c:"decision",t:"Wartime vs. peacetime CEO — different skills required",s:"Ben Horowitz — ep. #392",d:"Peacetime CEOs build culture and empower teams. Wartime CEOs override consensus and move with urgency. Most management advice is peacetime advice — and applying it in a crisis destroys companies. Most leadership is peacetime leadership."},
{c:"decision",t:"Phase transition model — know which phase your company is in",s:"Safi Bahcall — ep. #364",d:"Organizations move from 'liquid' (innovation rewarded, ~<150 people) to 'solid' (execution rewarded) at a predictable threshold. In liquid phase, innovators are heroes. In solid phase, the same behavior gets them fired. Most companies kill their best ideas by applying solid-phase management to liquid-phase problems."},
{c:"learning",t:"Read to be changed, not to confirm",s:"Penn Jillette — ep. #405",d:"Actively seek books designed to challenge and discomfort your existing views. Reading to confirm what you already believe is entertainment, not learning. The most valuable reading is the most uncomfortable reading."},
{c:"learning",t:"Study the mechanism, not the recipe",s:"Samin Nosrat — ep. #339",d:"Teach why things behave as they do rather than how to follow instructions. Once you understand the mechanism, you can improvise freely. The person who understands principles can adapt when circumstances change."},
{c:"learning",t:"Baloney detection kit — evaluate all claims the same way",s:"Neil deGrasse Tyson — ep. #389",d:"The most important science education: cognitive tools for evaluating claims — what is the evidence? Who has a stake in this being true? Can it be replicated? Carl Sagan's baloney detection kit is more important than any specific knowledge."},
{c:"learning",t:"Idea sex — write ten ideas every morning",s:"James Altucher — ep. #18",d:"Write ten ideas every morning regardless of quality. The idea muscle atrophies from disuse. Most ideas are terrible — the practice keeps the generative faculty exercised. Making unexpected connections between ideas from different domains becomes a reliable source of original work."},
{c:"learning",t:"Embrace productive aimlessness — avoid premature optimization",s:"Kevin Kelly — ep. #25-27",d:"Young people who optimize their careers too early lock in a direction before exploring the space. Kelly spent his 20s and 30s traveling and experimenting — his first real job came at 35. Breadth of experience is the best preparation for an uncertain future."},
{c:"learning",t:"Genuinely not knowing is the prerequisite to genuine listening",s:"Krista Tippett — ep. #223",d:"Tippett reads everything a guest has produced, then sets it aside to meet the person present today. Most interviewers are waiting to deploy what they already know. True listening requires not arriving with the answer."},
{c:"relationships",t:"Give more than you take — the long-game model",s:"Shep Gordon — ep. #184",d:"Gordon built his career by giving far more than he took — fronting money, absorbing losses — without keeping score. Over decades this compounded into a network of loyalty that no legal structure could replicate. He views generosity not as strategy but as daily practice."},
{c:"relationships",t:"Ask big questions and then be genuinely silent",s:"Cal Fussman — ep. #145",d:"Fussman prepares one profound open question and then genuinely stops talking. Most interviewers fill silences; Fussman lets them expand for 20–30 seconds. The most revealing moments in every great interview came in the silence after a question."},
{c:"relationships",t:"Security and desire are in fundamental tension",s:"Esther Perel — ep. #241,#271",d:"The qualities that make someone a great long-term partner — reliability, familiarity — are the same qualities that reduce erotic charge. Desire requires mystery and separateness. Her prescription: maintain separateness, pursue independent interests."},
];

// ─── BOOKS ─────────────────────────────────────────────────────────────────
const B=[
{t:"The Art of Learning",a:"Josh Waitzkin",i:"♟",w:"How to transfer mastery across domains. Build frameworks from principles, not pattern memorization. 'Making smaller circles' — finding the micro-fundamental inside every complex skill. Waitzkin spent 5 years taking notes before writing it.",r:"Josh Waitzkin (ep. #2). Tim's most-recommended book on learning and mastery."},
{t:"Principles",a:"Ray Dalio",i:"📐",w:"A system for decision-making under uncertainty. Radical transparency, meritocracy of ideas, and why ego protecting itself from feedback is the biggest obstacle to success. Distilled from 40 years running Bridgewater.",r:"Ray Dalio (ep. #264)."},
{t:"Meditations",a:"Marcus Aurelius",i:"🏛",w:"The personal journal of a Roman emperor — never intended for publication. A masterclass in practical Stoicism. Tim's one book to recommend to anyone. Pairs with The Tao of Seneca for a complete Stoic education.",r:"Referenced by Ryan Holiday, Tim Ferriss across many episodes."},
{t:"Sapiens",a:"Yuval Noah Harari",i:"🦴",w:"A sweeping reframe of human history around shared myths. Every political and economic system looks different after reading this book. The argument: Homo sapiens' unique advantage is the ability to believe in collective fictions.",r:"Yuval Noah Harari (ep. #477)."},
{t:"Man's Search for Meaning",a:"Viktor Frankl",i:"💡",w:"Psychiatrist and Holocaust survivor's account of finding meaning amid absolute suffering. We can choose our attitude toward any circumstance. The gap between stimulus and response is where freedom lives.",r:"Tim Ferriss and Tony Robbins across multiple episodes."},
{t:"The Obstacle Is the Way",a:"Ryan Holiday",i:"⚙",w:"Stoic philosophy into actionable principles. The thesis: obstacles are not in the path — they ARE the path. Adopted by NFL teams, Olympic coaches, and Silicon Valley executives.",r:"Ryan Holiday (ep. #4,#169)."},
{t:"Letters from a Stoic (Tao of Seneca)",a:"Seneca",i:"📜",w:"Tim produced an audio version and references this constantly. Seneca's letters on time, friendship, death, and equanimity. The source of Tim's fear-setting practice. The central message: don't waste your life on what others value.",r:"Tim Ferriss (ep. #134). Sam Harris called it essential (ep. #87)."},
{t:"Zero to One",a:"Peter Thiel",i:"1️⃣",w:"Going from 0 to 1 (creating something new) versus 1 to N (copying what works). Most competition is destructive; monopoly is the goal of real innovation. The best businesses are secrets most people don't yet believe.",r:"Peter Thiel (ep. #28)."},
{t:"The War of Art",a:"Steven Pressfield",i:"✍",w:"A short, fierce book on Resistance — the internal force that blocks creative work. The more important something is to your soul, the stronger the Resistance. The professional shows up and does the work regardless.",r:"Referenced by multiple guests and Tim Ferriss across dozens of episodes."},
{t:"Awareness",a:"Anthony de Mello",i:"👁",w:"A Jesuit priest's guide to waking up from conditioned thought. Radically challenges the idea that external achievements produce happiness. Naval called this one of the most impactful books he's ever read.",r:"Naval Ravikant (ep. #136,#473)."},
{t:"Influence",a:"Robert Cialdini",i:"🧲",w:"The definitive book on persuasion: reciprocity, commitment, social proof, authority, liking, scarcity. Foundational for understanding how people make decisions. Essential for negotiation, sales, or leadership.",r:"Ramit Sethi (ep. #33), Chris Sacca (ep. #79)."},
{t:"The Power of Now",a:"Eckhart Tolle",i:"🌿",w:"Challenges living in thought about the past or future. Sam Harris notes the core insight is legitimate even stripped of spiritual language: most suffering is created by mental stories, not present-moment reality.",r:"Sam Harris (ep. #14)."},
{t:"Good to Great",a:"Jim Collins",i:"📊",w:"40-year study of 1,435 companies. Level 5 Leadership, the Hedgehog Concept, and the Flywheel are among the most empirically grounded ideas in business writing.",r:"Jim Collins (ep. #361,#483)."},
{t:"The Most Important Thing",a:"Howard Marks",i:"💰",w:"The clearest articulation of second-level thinking in investing. The market prices in consensus, so you only win by being differently right. A masterclass in epistemic humility.",r:"Howard Marks (ep. #338,#431)."},
{t:"The Hard Thing About Hard Things",a:"Ben Horowitz",i:"⚡",w:"The most honest book ever written about the actual experience of running a startup — near-bankruptcy, mass layoffs, and the psychological cost of leadership decisions. The best book on peacetime vs. wartime management.",r:"Ben Horowitz (ep. #392)."},
{t:"Mating in Captivity",a:"Esther Perel",i:"🔥",w:"Why does domesticity extinguish desire? A framework for thinking about intimacy, autonomy, and erotic vitality in long-term partnership that is genuinely useful rather than merely romantic.",r:"Esther Perel (ep. #241,#271,#418)."},
{t:"Big Magic",a:"Elizabeth Gilbert",i:"✨",w:"Reframes the creative process: ideas are not possessions but visitors. Show up reliably so they can find you. Curiosity is a more sustainable guide than passion or discipline alone.",r:"Elizabeth Gilbert (ep. #430)."},
{t:"Greenlights",a:"Matthew McConaughey",i:"📓",w:"McConaughey's memoir-as-philosophy from 35 years of journals. Learn to identify and chase greenlights — and find the green lights hidden inside apparent red lights. One of the most original books Tim had read in years.",r:"Matthew McConaughey (ep. #474)."},
{t:"Team of Rivals",a:"Doris Kearns Goodwin",i:"🏛",w:"Lincoln's strategy of appointing his most formidable opponents to his cabinet. Surround yourself with people who will genuinely challenge you. Goodwin's research depth makes it read like a novel.",r:"Doris Kearns Goodwin (ep. #335)."},
{t:"Give and Take",a:"Adam Grant",i:"🤝",w:"The most successful people in most fields are 'givers.' Crucial nuance: successful givers have boundaries — they give strategically, not indiscriminately. Giving builds compounding networks of trust.",r:"Adam Grant (ep. #399)."},
{t:"When",a:"Daniel Pink",i:"⏰",w:"Human performance follows a predictable daily arc. Schedule your most cognitively demanding work in your peak window, routine tasks in the trough, creative brainstorming in the recovery phase. Immediately actionable.",r:"Daniel Pink (ep. #305)."},
{t:"Essentialism",a:"Greg McKeown",i:"◎",w:"The disciplined pursuit of less — only essential things, done extraordinarily well. Almost everything is non-essential. The ruthless elimination of good things in favor of the best things is the hardest and most important skill.",r:"Greg McKeown (ep. #355)."},
{t:"The Art of Asking",a:"Amanda Palmer",i:"🎸",w:"The radical act of asking for what you need. The inability to ask is rooted in believing you're not worth helping. Asking and receiving are forms of connection, not weakness.",r:"Amanda Palmer (ep. #67,#368)."},
{t:"Tribe",a:"Sebastian Junger",i:"🏕",w:"The modern West has optimized for safety and convenience at the expense of the shared hardship and mutual dependence that make humans feel genuinely alive. Post-traumatic stress is partly a symptom of returning to isolation and purposelessness.",r:"Sebastian Junger (ep. #161)."},
{t:"Salt, Fat, Acid, Heat",a:"Samin Nosrat",i:"🧂",w:"Teaches cooking through principles rather than recipes. Once you understand what salt, fat, acid, and heat actually do to food, you can improvise freely. A model for teaching any complex craft through principles.",r:"Samin Nosrat (ep. #339)."},
{t:"Radical Acceptance",a:"Tara Brach",i:"🌸",w:"Integrates Buddhist psychology and Western psychotherapy around the central wound of self-rejection. Most emotional suffering is rooted in a background sense of deficiency. The RAIN technique alone is worth the entire book.",r:"Tara Brach (ep. #94)."},
{t:"10% Happier",a:"Dan Harris",i:"😤",w:"The most accessible entry point to meditation for skeptical, secular readers. Harris's journey from live on-air panic attack to genuine meditation advocate. The strongest possible case for mindfulness without any spiritual language.",r:"Dan Harris (ep. #481)."},
{t:"How to Change Your Mind",a:"Michael Pollan",i:"🍄",w:"The most thorough and credible mainstream treatment of psychedelic therapy. Combines rigorous research on Johns Hopkins trials with deeply personal experience. Helped shift mainstream conversations about therapeutic psychedelics more than any academic paper.",r:"Michael Pollan (ep. #313,#365)."},
{t:"Rework",a:"Jason Fried & DHH",i:"⚒",w:"The most direct argument against conventional startup wisdom: you don't need VC, big teams, or 80-hour weeks. Every chapter is readable in five minutes and dense enough to occupy your thinking for a week.",r:"Jason Fried (ep. #329) & DHH (ep. #195,#203)."},
{t:"Quiet",a:"Susan Cain",i:"🤫",w:"The most rigorously argued case for the value of introversion. Many of the world's most important creative contributions were products of deep solitary work, not collaboration. Forces a rethinking of office design, education, and leadership development.",r:"Susan Cain (ep. #357)."},
{t:"Loonshots",a:"Safi Bahcall",i:"💡",w:"Applies physics phase transitions to organizational behavior. Companies don't kill innovative ideas through malice but through structural inevitability. Extraordinary historical cases throughout.",r:"Safi Bahcall (ep. #364,#382)."},
{t:"What I Learned Losing a Million Dollars",a:"Jim Paul & Brendan Moynihan",i:"📉",w:"There are infinite ways to make money, but very few ways to lose — all involve ego protecting a bad position. The lesson applies far beyond finance.",r:"Brendan Moynihan (ep. #29)."},
{t:"Mycelium Running",a:"Paul Stamets",i:"🍄",w:"Fungi as planetary infrastructure, mycelial networks as biological internet. Practical guide to fungi for ecological remediation, personal health, and sustainable agriculture.",r:"Paul Stamets (ep. #340)."},
{t:"The Psychedelic Explorer's Guide",a:"James Fadiman",i:"🌈",w:"The most comprehensive and responsible guide to psychedelic use — covering set, setting, dosage, integration, and microdosing protocols. The foundational reference across the show's many psychedelics episodes.",r:"James Fadiman (ep. #66)."},
{t:"Stealing Fire",a:"Steven Kotler & Jamie Wheal",i:"⚡",w:"A deep investigation into flow states — how top performers use altered states as performance tools. Synthesizes neuroscience, anthropology, and behavioral research.",r:"Referenced across multiple episodes by Tim and guests."},
{t:"The Inevitable",a:"Kevin Kelly",i:"🔭",w:"Kelly's twelve technological forces that will shape the next 30 years. A map of the direction of travel, not a prediction of specific events — more durable than most technology forecasts.",r:"Kevin Kelly (ep. #164)."},
{t:"The Body Keeps the Score",a:"Bessel van der Kolk",i:"🧠",w:"Trauma is stored in the body — not just as psychological memory but as physical dysregulation. Talk therapy alone is often insufficient. Surveys somatic approaches that access trauma through body-based pathways.",r:"Referenced by Jerry Colonna (ep. #373) and multiple other guests."},
{t:"Leonardo da Vinci",a:"Walter Isaacson",i:"🎨",w:"Da Vinci's genius was not innate but practiced — driven by insatiable curiosity that refused to specialize. Relentless curiosity applied across disciplines produces connections no specialist can make.",r:"Walter Isaacson (ep. #273)."},
{t:"Better Than Before",a:"Gretchen Rubin",i:"📅",w:"The most nuanced book on habit formation — specifically, why the same strategy fails for some and works brilliantly for others. The four tendencies framework (Upholder, Questioner, Obliger, Rebel) explains habit resistance without blame.",r:"Gretchen Rubin (ep. #290)."},
{t:"SuperBetter",a:"Jane McGonigal",i:"🎮",w:"Applies game design principles to personal challenges — illness, injury, grief, depression. Games build resilience through clear goals, immediate feedback, and meaningful narrative. Developed to recover from McGonigal's own severe concussion.",r:"Jane McGonigal (ep. #93)."},
{t:"Tribe of Mentors",a:"Tim Ferriss",i:"🗂",w:"Answers from 130 world-class performers to the same eleven questions. Pattern recognition across answers: what do the best people in the world have in common? Every answer is short; the cumulative effect is substantial.",r:"Compiled directly from the show. Tim's distillation of the most useful patterns across hundreds of interviews."},
{t:"Blood, Bones & Butter",a:"Gabrielle Hamilton",i:"🔪",w:"One of the most brutally honest memoirs in food writing. No redemption arc. A clear-eyed account of what a real cooking life actually looks and feels like. Tim cited it as a model of radical authenticity in memoir.",r:"Referenced by Tim Ferriss as a model of craft and unconventional self-education."},
