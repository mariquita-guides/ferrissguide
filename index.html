// ─── ANECDOTES ─────────────────────────────────────────────────────────────
const A=[
{t:"McChrystal's pretzel jar — the starving sergeant major",s:"Gen. McChrystal — ep. #86",b:"McChrystal was famous for eating one meal per day. His command sergeant major Jody decided to do the same out of loyalty, enduring months of hunger. Then one day McChrystal pointed to a small tin of pretzels in his quarters: 'I think there's mice eating my pretzels.' Jody had been quietly eating pretzels for the entire tour. 'It was the most unprofessional I'd ever been with an officer. I had to storm out of the room.'"},
{t:"Rick Rubin's sauna interview — recorded near heatstroke",s:"Rick Rubin — ep. #76",b:"Rubin insisted the only conditions for the podcast were inside his barrel sauna — heated to extreme temperatures — with an ice-cold horse trough directly outside. Tim sat on the floor because he couldn't handle the heat at bench level. They recorded the entire episode cycling in and out of the ice bath. Tim came close to heatstroke while trying to ask coherent questions. It became one of the most distinctive production experiences in the show's history."},
{t:"Arnold's psychological warfare on bodybuilding opponents",s:"Arnold Schwarzenegger — ep. #60",b:"Arnold described walking up to a competitor who had been obsessively training a specific body part and saying 'Wow, your arms are looking really small today' — right before they went on stage. He also laughed and joked backstage while competitors were gravely serious, unnerving them. 'I see myself on that stage winning. The contest is won or lost in the mind before you step on stage.'"},
{t:"Josh Waitzkin deliberately loses chess tournaments as a martial arts beginner",s:"Josh Waitzkin — ep. #2,#148",b:"After becoming national chess champion, Waitzkin chose to start Tai Chi Push Hands as a complete unranked novice — going to tournaments as a white belt and losing embarrassingly. He did this deliberately to experience the beginner's mind that had made him great at chess. His theory: the moment you believe you know something, you stop learning it. He eventually became world Push Hands champion."},
{t:"Naval's obsessive reading habit — the library as a superpower",s:"Naval Ravikant — ep. #97,#136",b:"Naval reads dozens of books simultaneously, abandons them freely, and feels no guilt about not finishing. He reads almost exclusively non-fiction and considers reading the highest-leverage activity available: 'The returns to reading compound. Every book makes the next book faster to read because your frameworks expand.' He described walking into a library and feeling like the richest person in the world."},
{t:"McChrystal rebuilds JSOC after catastrophic intelligence failure",s:"Gen. McChrystal — ep. #86,#88",b:"After Al-Qaeda in Iraq moved faster than any conventional intelligence cycle could track, McChrystal made the radical decision to share all classified intelligence in real time across thousands of personnel in a daily global video call. Senior officers were horrified — this violated every doctrine of compartmentalization. But the result was decisive: JSOC began adapting at the speed of their adversary. The death of Zarqawi followed directly from this architecture."},
{t:"Jocko's 4:30am photographs — discipline goes viral",s:"Jocko Willink — ep. #107",b:"Willink photographs his watch at 4:30am every morning and posts to social media with no caption — purely for personal accountability. It became an accidental movement: thousands of followers began waking up alongside him. He views this as a microcosm of his core teaching: discipline is contagious, and the standard you set for yourself becomes the culture around you. The photograph was just for himself."},
{t:"Tim's 'fear-setting' revelation in a European café",s:"Tim Ferriss — multiple episodes",b:"Tim was paralyzed by a business decision in a European café. He wrote out 'what is the worst that could reasonably happen if I do this?' and listed each scenario with its probability and a recovery plan. He realized almost everything was recoverable within 3–6 months, and the cost of inaction — staying miserable — was far higher than the cost of failure. He traced this to Seneca's 'premeditatio malorum.' It became the most recommended exercise in his first book."},
{t:"Michael Phelps swims blind to a world record",s:"Michael Phelps — ep. #494",b:"At the 2008 Beijing Olympics 200m butterfly final, Phelps's goggles filled completely with water after his dive. By 75 meters he could see nothing. He had rehearsed this exact scenario hundreds of times with coach Bob Bowman. He counted his strokes precisely, timed his flip turn by feel, and finished the race completely blind. He not only won the gold medal but set a new world record. All the visualization work made the actual race feel like just another practice run."},
{t:"Cameron dives alone to the deepest point on Earth",s:"James Cameron — ep. #346",b:"Before making Avatar's underwater sequel, Cameron designed and piloted a custom submersible to the bottom of the Mariana Trench — 35,856 feet below the surface, deeper than Everest is tall. He spent three hours alone at the deepest point any solo human has ever reached. It was almost disappointingly quiet and still — a vast grey desert. 'You can't direct scenes set in the deep ocean without understanding what deep ocean actually feels like. You can't fake that kind of knowledge. Your actors will know.'"},
{t:"Branson invents Virgin Atlantic stranded in the BVI",s:"Richard Branson — ep. #272",b:"Branson was stranded in the Virgin Islands when his flight to Puerto Rico was cancelled. He chartered a small plane, divided the price by the number of stranded passengers, and wrote 'Virgin Atlantic — $39 one way to Puerto Rico' on a chalkboard. He sold the seats and filled the plane. In his notebook: 'could this be a business?' He called Boeing the next day. Within months Virgin Atlantic was founded."},
{t:"Seth Godin's 120 books — and the lesson he unlearned",s:"Seth Godin — ep. #138",b:"Before becoming famous, Godin was a book packager who produced 120 books in ten years on topics from gardening to trivia. He thought the lesson was: volume produces quality. Then he realized he'd learned the wrong lesson. 120 books he didn't care deeply about made him faster, not better at what actually mattered. He quit packaging entirely and worked only on ideas he found genuinely important. His daily blog is the embodiment of that pivot."},
{t:"Brené Brown's vulnerability hangover",s:"Brené Brown — ep. #100",b:"Brown decided to actually be vulnerable while speaking about vulnerability at TEDx Houston. Her husband thought it was a terrible idea. She drove home mortified and vowed never to do it again. She was relieved only 500 people attended. Months later, TED's Chris Anderson called and asked to put it on the main site. Her husband consoled her: 'No one will watch it.' It became one of the five most-watched TED talks in history, with 20+ million views."},
{t:"Jerzy Gregorek defects from communist Poland to refugee camp to world champion",s:"Jerzy Gregorek — ep. #228",b:"Gregorek was a world-class weightlifter in communist Poland involved in the Solidarity movement. Facing arrest, he and his wife defected — showing up at the US Embassy with nothing and asking for asylum. They spent over a year in a refugee camp. They were eventually granted asylum, arrived in America with almost nothing, and Gregorek went on to win four world championships and coach at UCLA. 'Easy choices, hard life; hard choices, easy life' is not an abstraction — it is the thesis of his actual biography."},
{t:"Alex Honnold memorizes El Capitan move by move — then removes the rope",s:"Alex Honnold — ep. #160",b:"Honnold's preparation for the first free solo ascent of El Capitan spanned years. He climbed the route on rope dozens of times, mapping every single move until he could visualize the entire 3,000-foot route with his eyes closed. He rehearsed each crux section until he could execute it on demand in any conditions. The actual free solo took under four hours. His description of his mental state: 'Not fearlessness — prepared to a point where fear had nothing new to say.'"},
{t:"Jamie Foxx throws Puff Daddy a $400 party that rivals his million-dollar ones",s:"Jamie Foxx — ep. #124",b:"Foxx had been following Puff Daddy around Hollywood with a camera for months. One night Puff told him he'd spent a million dollars on a party. Foxx challenged him: 'I'll throw you one for $400 that rivals this.' Puff called the next morning — same day. Foxx pulled out his cue cards, called every celebrity contact he'd collected over years of standup, and produced a party Puff described as one of his favorites. The secret: years of collecting real relationships, not just names."},
{t:"Robert Rodriguez sells his body to science to fund El Mariachi",s:"Robert Rodriguez — ep. #98",b:"Rodriguez needed money to shoot his first feature film. He enrolled as a paid subject in a clinical drug research facility — sequestered for weeks while researchers tested compounds on him. He spent the time writing the El Mariachi screenplay. The research payment covered the entire $7,000 production cost. He won the Audience Award at Sundance and became the lowest-budget film ever released by a major studio."},
{t:"Shep Gordon releases a truck of chickens on the freeway for Alice Cooper",s:"Shep Gordon — ep. #184",b:"In the early 1970s, Alice Cooper was completely unknown and Gordon had no marketing budget. He hired a truck, loaded it with chickens, and attached a billboard: 'Alice Cooper coming.' He released the chickens on the freeway during rush hour. Police responded, the freeway was blocked, and the story made the front page of every major newspaper in the country. Gordon's total cost: minimal. Alice Cooper's name recognition: overnight."},
{t:"John Crowley quits his job to save his children's lives — and does it",s:"John Crowley — ep. #225",b:"Crowley was working in finance when two of his three children were diagnosed with Pompe disease — given roughly two years to live. Every doctor said nothing could be done. He found one researcher who believed an enzyme replacement might work, cold-called him, convinced investors to back a startup, and accelerated the FDA approval process at a pace the agency had never seen. The therapy saved his children's lives. They are still alive today."},
{t:"Kevin Kelly doesn't get a real job until 35 — and it's the Whole Earth Catalog",s:"Kevin Kelly — ep. #25-27",b:"Kelly dropped out of college after one year, traveled through Asia for years photographing remote communities, and spent his 20s and 30s doing whatever interested him. At 35 he got his first proper job — at the Whole Earth Catalog, which he'd dreamed of since reading it as a teenager. He went on to co-found WIRED. He used to advise young WIRED employees to quit: 'Why are you working a real job? Go be young and try something crazy.'"},
{t:"Richard Turner practices card mechanics eight hours a day — completely blind",s:"Richard Turner — ep. #411",b:"Turner lost his sight gradually starting in his 20s and is now completely blind. He refused to let it stop his obsessive card practice. He developed tactile discrimination so refined that he can identify a single card by feel and execute false shuffles indistinguishable from legitimate ones — all without sight. He practices eight or more hours every day. Tim witnessed his performance and described it as the most cognitively dissonant thing he had ever seen."},
{t:"David Blaine holds his breath for 17 minutes live on Oprah",s:"David Blaine — ep. #245",b:"Blaine trained for months with Navy SEAL physiologists for a live attempt to break the static apnea world record on The Oprah Winfrey Show. On the live broadcast, submerged in a tank, he held his breath for 17 minutes and 4 seconds. 'The real training was not physical. It was learning not to identify with the sensation of suffocation. Once you stop identifying with it, it has no power over you.'"},
{t:"Ricardo Semler gives employees the power to set their own salaries",s:"Ricardo Semler — ep. #229",b:"When Semler took over his father's company, he gave every employee complete transparency into every other employee's salary — and eventually the power to set their own. His reasoning: people almost always set their salaries at market rate when they know what peers earn. The dramatic overpayment every manager predicted never materialized. Engagement did. Semco became one of Brazil's most profitable companies."},
{t:"Dom D'Agostino deadlifts 500 lbs ten times after a seven-day fast",s:"Dom D'Agostino — ep. #117",b:"D'Agostino fasted for seven days — consuming only water — and then performed ten deadlifts at 500 lbs at the end of the fast. The purpose was to demonstrate publicly that the ketogenic state is not catabolic in the way conventional nutrition science had assumed. It became one of the most cited moments in the show's health and performance episodes."},
{t:"Jim Collins nearly abandons Good to Great — and finds Level 5 Leadership",s:"Jim Collins — ep. #361",b:"In the early research for Good to Great, Collins and his team found almost nothing reliable after months of analysis. Collins was prepared to abandon the project. Then a researcher noticed a pattern they had deliberately excluded: the leaders of every single great company were self-effacing, humble, and deeply motivated by the institution rather than personal glory. Collins had excluded 'leadership' as too soft to measure. Reintroducing it revealed Level 5 Leadership — the book's central finding."},
{t:"Cal Fussman's greatest interview was built on a question he threw away",s:"Cal Fussman — ep. #145",b:"Fussman described his most important lesson from a session with Mikhail Gorbachev. He had prepared what he considered his best question. When he sat down with Gorbachev, the conversation went somewhere so profound and unexpected that Fussman chose to follow it rather than return to his prepared question. He never asked it. 'The greatest interview I ever did was built entirely on a question I threw away before I asked it. Preparation is for courage — not for control. Once you're in the room, let it go.'"},
{t:"Amanda Palmer raises $1.2M on Kickstarter — and changes the music industry",s:"Amanda Palmer — ep. #67",b:"When Palmer left her record label, she turned to Kickstarter with a goal of $100,000. She raised $1.2 million — the most successful music crowdfunding campaign in history at the time. The campaign worked not because of her follower count but because of a decade of authentic direct engagement: crashing on fans' couches during tours, sharing meals, maintaining genuine relationships. She proved the industry's model of protecting music through scarcity was the opposite of what built loyalty."},
{t:"DHH wins Le Mans — the coder who found his philosophy on the race track",s:"DHH — ep. #195",b:"DHH is not a hobbyist race car driver. He competed at the 24 Hours of Le Mans and finished first in his class. He told Tim it validated a principle he applies to programming and business: the fastest path through anything is rarely maximum force. In racing, the fastest drivers are the smoothest — they brake late, carry maximum speed through corners, and never fight the car. In programming, the best code is elegant, not brute-force. In business, the calmest companies ship the best products."},
{t:"Stewart Copeland trains Tim to perform for Foreigner — in days",s:"Stewart Copeland — ep. #262",b:"Tim enrolled in an episode of his TV show 'The Tim Ferriss Experiment' in which he had to learn to drum well enough to perform as the drummer for Foreigner in front of a sold-out auditorium — with only a few days of training from Copeland, founding drummer of The Police. Copeland's teaching method, Tim noted, resembled Doc Brown from Back to the Future: eccentric, demanding, and remarkably effective. Tim performed. It was, by his account, nerve-breakdown inducing."},
{t:"Shay Carl eats pretzels alone and reveals addiction — the episode that broke the internet",s:"Shay Carl — ep. #189",b:"In his second appearance, Shay Carl was candid in real-time about the gap between his public persona — the sunny, loving family man with 2.3 billion YouTube views — and his private struggle with alcoholism that had been escalating for years. He described hiding alcohol from his family, the shame spiral, and the path back. The episode received more listener responses than almost anything Tim had published. It became a landmark in the show's history for the quality of its candor about the cost of success."},
];


// Additional guests
G.push(


  // ── BUSINESS & INVESTING ──────────────────────────────────────────────────
  {n:"Glenn Beck",e:"#69",c:"media",d:"Conservative media personality and founder of TheBlaze. Discussed his surprising creative influences — Walt Disney and Orson Welles — and how he approaches building a media empire as an act of storytelling rather than punditry. Candid about his struggles with alcoholism and how sobriety transformed his work."},
  {n:"Rolf Potts",e:"#41,#42",c:"adventure",d:"Author of Vagabonding and one of the founding voices of the long-term travel movement. His core argument: time wealth is more valuable than money wealth, and most people have far more freedom than they believe. He carries almost nothing when he travels. Two-part episode covering travel tactics, lateral thinking, and creating time."},
  {n:"Phil Hellmuth",e:"#260",c:"biz",d:"The winningest poker player in World Series of Poker history (17 bracelets). Discusses the mental game of poker as a template for business and life: reading people, controlling emotion, knowing when to be aggressive. Despite his 'poker brat' persona, reveals a deeply methodical and psychologically sophisticated approach."},
  {n:"Larry King",e:"#259",c:"media",d:"Co-guest with Cal Fussman — 50,000 interviews over 60 years. King's philosophy: he learned everything from his guests by asking questions he genuinely didn't know the answers to. Never over-prepared. Never let facts get in the way of a good story. One of the most important conversations about the art of interviewing in the archive."},
  {n:"Ed Cooke",e:"#52,#53",c:"science",d:"Grandmaster of Memory and co-founder of Memrise. Turned memory into a competitive sport. Argues that memory is not a fixed faculty — it is a skill, and its fundamental technique is always the same: make something strange, vivid, and emotionally resonant. The method of loci explained at depth."},
  {n:"Chase Jarvis",e:"#8",c:"media",d:"One of the world's most influential commercial photographers and CEO of CreativeLive. One of the show's earliest interviews. His thesis: creativity is not a talent — it is a practice, a habit, and a choice. 'The best camera is the one you have with you.' Discusses how to build a creative career in the internet age."},
  {n:"Jason Silva",e:"#5",c:"media",d:"Futurist filmmaker and 'shot of philosophical espresso' YouTube creator. Discusses the philosophy of awe, flow states, and using media as a tool for expanding consciousness. One of the show's earliest episodes and one of the most energetically unusual — Silva's enthusiasm is genuinely contagious."},
  {n:"Dan Ariely",e:"(referenced multiple)",c:"science",d:"Behavioral economist, author of Predictably Irrational. Referenced throughout the show for his research on irrational decision-making. His core insight: humans are predictably irrational in ways that can be mapped and accounted for. Most 'rational' financial and health decisions are actually driven by cognitive biases."},
  {n:"Mike Novogratz",e:"#451",c:"biz",d:"Galaxy Digital CEO and former Goldman Sachs and Fortress Investment Group partner. Macro trader turned crypto investor after ayahuasca experience in 2017 convinced him Bitcoin was transformative. Candid about his 2018 cryptocurrency losses, the psychology of trading at scale, and how psychedelics changed his perspective."},
  {n:"Harley Finkelstein",e:"#486",c:"biz",d:"Shopify President. Discusses the future of retail and how Shopify became the operating system for commerce. Worked his way through law school running a t-shirt business. Argues that entrepreneurship is not about disruption for its own sake but about giving more people access to tools that were previously only available to large corporations."},
  {n:"Rana el Kaliouby",e:"#423",c:"tech",d:"AI and emotional intelligence researcher, CEO of Affectiva (sold to Smart Eye for $73.5M). Her company built AI that can read human facial expressions and emotions in real time. Discusses the ethics of emotion AI, how she navigated being a Muslim woman in tech, and finding herself after moving from Egypt to MIT."},
  {n:"Guy Raz",e:"#462,#489",c:"media",d:"Host of How I Built This (one of the most listened-to podcasts in the world). First interview focuses on building a great podcast and managing depression. Second appearance reverses roles — Raz interviews Tim for How I Built This, covering key decisions, failures, and reinventions across Tim's entire career. Essential for understanding Tim's own origin story."},
  {n:"Nick Thompson",e:"#311",c:"media",d:"Editor-in-chief of WIRED. Discusses how to cover technology with appropriate skepticism — not breathless booterism or reflexive pessimism. Deeply fit (he's a competitive cyclist) and discusses the role of physical performance in mental clarity. One of the show's most nuanced conversations about tech journalism."},
  {n:"Steve Jurvetson",e:"#317,#404",c:"biz",d:"DFJ VC partner and one of Elon Musk's earliest investors. A collector of rocket parts, vintage computers, and radical ideas. His investment thesis: back founders who are working on problems so large that only a company can solve them. One of the most visionary thinkers on technology's long arc in the archive."},
  {n:"Eric Schmidt",e:"#367",c:"tech",d:"Former Google CEO who oversaw its growth from 200 employees to 50,000. Discusses Bill Campbell — 'the trillion-dollar coach' who mentored him, Steve Jobs, Jeff Bezos, and dozens of other Silicon Valley leaders. Campbell's coaching philosophy: the team is everything, individual egos are nothing."},
  {n:"David Rubenstein",e:"#495",c:"biz",d:"Carlyle Group co-founder, one of the world's most prominent private equity investors and philanthropists. Discusses raising billions of dollars from the ground up, advising presidents, and his philosophy of 'patriotic philanthropy' — buying and restoring national treasures (copies of the Magna Carta, the Declaration of Independence). Sprints to maintain urgency."},
  {n:"Sam Kass",e:"#82",c:"food",d:"Obama White House chef and senior policy advisor for nutrition. One of the most unusual career paths in the archive: simultaneously cooking for the First Family's private meals and shaping national nutrition policy. Discusses the politics of food, teaching himself to cook, and the responsibility that came with his role."},
  {n:"Tyler Cowen",e:"#413",c:"media",d:"Economist, blogger (Marginal Revolution), and author of Average Is Over. Discusses COVID-19 rationality during the pandemic, his talismanic objects, and how to think on the margins. One of the most eclectic intellects in the archive — comfortable moving from restaurant recommendations to political economy to philosophy of mind."},
  {n:"Lori Gottlieb",e:"#415",c:"medicine",d:"Therapist and author of Maybe You Should Talk to Someone. Discusses the power of getting to 'un-know' yourself — how therapy dismantles the stories we've been telling about ourselves that are no longer serving us. Also explores the parallels between her work as a therapist and being a therapy patient herself."},
  {n:"Richard Schwartz",e:"#492",c:"medicine",d:"Creator of Internal Family Systems (IFS) therapy, one of the fastest-growing therapeutic models in the world. His insight: the mind is not a monolith — it contains multiple 'parts,' and healing comes from befriending rather than battling them. IFS without drugs produces experiences that patients describe as indistinguishable from psychedelic sessions."},

  // ── FILM & TV ─────────────────────────────────────────────────────────────
  {n:"Morgan Spurlock",e:"#150",c:"film",d:"Documentary filmmaker (Super Size Me, Inside Man). Describes himself as a 'human guinea pig' filmmaker — he puts himself in extreme situations to generate documentary content. Discusses how to pitch ideas, build an audience for independent film, and his philosophy of making yourself the subject when no one else will agree to be filmed."},
  {n:"Glenn Beck (2)",e:"#69",c:"media",d:"Second reference — the episode is notable for the surprising depth of Beck's creative influences (Orson Welles, Walt Disney) and his discussion of how conservatism and creativity can coexist. One of the show's most unexpectedly nuanced conversations with a political figure."},
  {n:"Lisa Ling",e:"#388",c:"media",d:"CNN journalist and documentary filmmaker who has reported from North Korea, inside gangs, from war zones, and inside subcultures most journalists never penetrate. Discusses learning to feel deeply as a reporter after years of compartmentalization, how to gain access to closed communities, and changing perceptions through sustained attention."},
  {n:"Debbie Millman (2)",e:"#304",c:"media",d:"Fourth appearance. Focus: how to prioritize your life and make time for what matters. Her 10-year detailed life writing exercise is expanded upon here — she discusses how she used it to redesign her career in her 40s and why the specificity of the vision matters more than almost anything else."},
  {n:"Ken Block",e:"#358",c:"adventure",d:"DC Shoes co-founder and 'Gymkhana' YouTube sensation (500M+ views). Discusses building a brand that felt authentic rather than manufactured — DC Shoes grew because it was genuinely part of the culture it was serving, not marketing to it. Gymkhana became one of the most-watched automotive video series in history entirely without traditional media distribution."},
  {n:"Phil Keoghan",e:"#242",c:"adventure",d:"Host of The Amazing Race. Discusses how bucket lists actually work as psychological tools, the lessons of 30+ years of global travel, and a near-death experience as a young man that fundamentally changed how he sees time. His 'No Opportunity Wasted' philosophy emerged directly from that experience."},
  {n:"A.J. Jacobs (2)",e:"#344",c:"media",d:"Second appearance: 10 strategies to be happier through gratitude. Discusses his project tracking every person in the supply chain of a cup of morning coffee — over 1,000 people — and the profound perspective shift that came from personally thanking each one. Gratitude journalism as a transformative practice."},
  {n:"Dustin Yellin",e:"#467",c:"media",d:"Visual artist whose glass sculpture installations have sold for millions and are exhibited at major museums. Discusses how to forge your own path in the art world without institutional gatekeeping, why constraints produce better creativity than open canvases, and how his studio Pioneer Works in Brooklyn became a community for cross-disciplinary creation."},

  // ── SCIENCE & HEALTH ─────────────────────────────────────────────────────
  {n:"Jonathan Eisen & Jessica Richman",e:"#54",c:"science",d:"Microbiome researchers. One of the show's earliest explorations of the gut microbiome — its role in mental health, immune function, and disease. Jessica Richman co-founded uBiome, which brought microbiome testing to consumers. Discusses the promises and real limits of what microbiome science had established at the time."},
  {n:"Adam Gazzaley",e:"#83",c:"science",d:"UCSF neuroscientist and 'maverick of brain optimization.' Builds video games that are FDA-approved therapeutic interventions for ADHD. Argues that the distinction between gaming and treatment is artificial — both involve directed attention training. His research on cognitive enhancement is among the most practically impactful in the archive."},
  {n:"Janna Levin",e:"#445",c:"science",d:"Astrophysicist and author of Black Hole Blues (about LIGO's detection of gravitational waves). Discusses extra dimensions, time travel, and what it felt like to chronicle the 50-year project to hear the sound of two black holes colliding. One of the show's most beautiful conversations about how science is actually done."},
  {n:"Stewart Brand",e:"#281",c:"science",d:"Whole Earth Catalog creator, Long Now Foundation co-founder, and one of the most influential polymaths of the 20th century. Discusses de-extinction (bringing back the woolly mammoth and passenger pigeon), why cities are the most efficient human structures ever invented, and the Long Now's project to build a clock that runs for 10,000 years."},
  {n:"Tim O'Reilly",e:"#278",c:"tech",d:"O'Reilly Media founder and one of tech's most prescient trend spotters. Coined the term 'Web 2.0.' His framework for understanding where technology is going: follow the money to the bottlenecks. Argues that most predictions about AI are wrong because people are treating it as a replacement for humans rather than an amplifier of humans."},
  {n:"M. Sanjayan",e:"#285",c:"science",d:"Conservation scientist and CEO of Conservation International. Discusses preserving human life through preserving ecosystems, battling the busy trap as a conservationist, and why biodiversity is not just a values issue but a practical survival question. His most memorable line: 'We are not saving the environment for its own sake — we are saving it for ourselves.'"},
  {n:"Mark Plotkin",e:"#469",c:"science",d:"Ethnobotanist who has spent 40 years documenting the medicinal plant knowledge of Amazonian tribes. Discusses how to identify real vs. fake shamans, the hallucinogenic plants used in Amazonian ceremonies, and why more useful medicines likely lie undiscovered in the Amazon than in all the world's pharmaceutical libraries combined."},
  {n:"Steven Rinella",e:"#470,#482",c:"adventure",d:"Host of MeatEater and one of America's most prominent hunting writers. Discusses why hunting is not a sport but a reconnection to the natural world, the short introduction to wilderness survival skills in the second episode, and how hunting has more in common with foraging and conservation than with trophy culture. Deeply thoughtful on the ethics of eating."},
  {n:"Paul Stamets (2)",e:"#340",c:"science",d:"Second reference — the Stamets episode covers his personal transformation after taking psilocybin mushrooms as a stuttering child, which he credits with permanently resolving his stutter. His mother subsequently took a heroic dose of lion's mane mushrooms during end-stage cancer and experienced what her oncologist described as an unusual improvement. Both stories are extraordinary."},
  {n:"David Allen",e:"#384",c:"biz",d:"Creator of Getting Things Done (GTD) — one of the most influential productivity systems in history. GTD's core insight: your mind is for having ideas, not holding them. The practice of capturing everything external frees cognitive bandwidth for creative and strategic thinking. Discusses the art of stress-free productivity at depth."},
  {n:"Gabor Maté",e:"#298",c:"medicine",d:"Physician and author whose work on addiction, trauma, and ADHD has been profoundly influential. His core thesis: addiction is not a moral failing or a disease in the conventional sense — it is a response to pain, always rooted in trauma or adverse childhood experience. Also discusses ayahuasca as a tool for accessing and processing that underlying pain."},
  {n:"Stan Grof",e:"#347",c:"medicine",d:"Czech psychiatrist who conducted approximately 4,500 LSD psychotherapy sessions before it was made illegal and subsequently developed Holotropic Breathwork as an alternative. One of the most important figures in the history of psychedelic research. At 87, still one of the most lucid voices on non-ordinary states of consciousness."},
  {n:"Rick Doblin",e:"#440",c:"medicine",d:"Founder of MAPS (Multidisciplinary Association for Psychedelic Studies) who has spent 35 years pushing MDMA through FDA clinical trials. Discusses the 'psychedelic domino' — his belief that MDMA's FDA approval for PTSD will crack open regulatory barriers for psilocybin and other substances. His persistence across 35 years of rejection is one of the most remarkable stories in the archive."},
  {n:"Marcela Ot'alora",e:"#396",c:"medicine",d:"One of the few trained MDMA-assisted psychotherapy therapists in the world. Discusses what happens in a session, how to become a psychedelic therapist, the role of the therapist's own healing in the work, and the extraordinary results she has seen with trauma patients. One of the most detailed accounts of therapeutic psychedelic practice in the archive."},
  {n:"Hamilton Morris",e:"#337",c:"science",d:"Journalist, filmmaker, and psychoactive researcher behind the Vice series Hamilton's Pharmacopeia. Discusses better living through chemistry, comparing psychedelic compounds with extraordinary depth of knowledge, the history of MDMA, smart drugs, and why our current classification of substances is scientifically incoherent."},
  {n:"Art De Vany",e:"#239",c:"science",d:"Economist and evolutionary fitness pioneer. His 'Evolutionary Fitness' approach — intermittent fasting, high-intensity random exercise, avoiding processed carbohydrates — predated many modern paleo and ancestral health movements. At 80, one of the most physically impressive guests in the archive. Reverse aging as a long-term project."},

  // ── PHILOSOPHY & SPIRITUALITY ─────────────────────────────────────────────
  {n:"Tara Brach (2)",e:"#94",c:"philosophy",d:"Second reference — one of the show's most frequently recommended episodes for anyone dealing with chronic self-criticism or perfectionism. The 'trance of unworthiness' concept and the RAIN technique have been cited by more listeners as practically life-changing than almost any other single idea from the archive."},
  {n:"Jack Kornfield (2)",e:"#414",c:"philosophy",d:"Second appearance during COVID. How to find peace amidst pandemic, cultivate calm in chaos, and maintain a loving-kindness practice when ordinary life has dissolved. One of the show's most compassionate episodes, with Kornfield sharing stories from his decades of teaching meditation to dying patients and trauma survivors."},
  {n:"Alain de Botton (2)",e:"#459",c:"philosophy",d:"Second appearance: 'Books I've Loved.' De Botton's book recommendations reveal his eclectic intellectual formation — he recommends works that are beautiful and useful, arguing that the distinction between aesthetic and practical philosophy is a false one. His commentary on each book is itself a masterclass in applied philosophy."},
  {n:"Sam Harris (4)",e:"#433",c:"philosophy",d:"Fourth appearance, during COVID: how to cope during a pandemic, taming anxiety, and the relationship between meditation and psychedelics. His most practically focused appearance — less philosophical architecture, more field-deployable tools. Discusses using the awareness itself as an anchor during periods of acute anxiety."},
  {n:"Will MacAskill",e:"#120",c:"philosophy",d:"Oxford philosopher and Effective Altruism co-founder. His challenge: if you genuinely care about doing good, you should be as rigorous about your charitable impact as you would be about any other major decision. Argues that most charitable giving is driven by emotion rather than evidence, and that this is a moral problem, not just a strategic one."},
  {n:"Krista Tippett (2)",e:"#223",c:"philosophy",d:"The episode is notable for Tim's unusual level of personal vulnerability — Krista essentially interviews him back, and Tim reveals more about his inner life in this conversation than almost anywhere else in the archive. Her skill as an interviewer in making even the most guarded subjects feel safe to reveal themselves is demonstrated in real time."},
  {n:"Esther Perel (3)",e:"#418",c:"philosophy",d:"Third appearance: tactics for relationships in quarantine. The lockdown as a stress test that revealed which relationships had genuine depth and which were sustained by distraction. Her most practically focused episode — specific tactics for navigating conflict, desire, and boredom when confined with a partner."},
  {n:"Debbie Millman (3)",e:"#230",c:"media",d:"Third appearance: secrets, tactics, and creative processes of high performers and achievers. Profiles of 12 major creative figures she's interviewed on Design Matters. Discussion of the common thread in how major designers, artists, and writers overcame fear and self-doubt to do their best work."},

  // ── SPORT & ATHLETICS ────────────────────────────────────────────────────
  {n:"Maurice Ashley",e:"#449",c:"sport",d:"The first Black chess Grandmaster in history. His path from the streets of Brooklyn to becoming a chess master and then Grandmaster is one of the show's most compelling origin stories. Discusses the magic of chess as a tool for teaching abstract thinking, how to trash-talk effectively in competition, and his must-read biographies."},
  {n:"Jason Nemer",e:"#182",c:"sport",d:"Co-founder of AcroYoga, the discipline that merges acrobatics, yoga, and Thai massage. Discusses how physical trust — literally holding another person in the air — can be a transformative tool for building emotional trust. One of the show's most unusual and memorable physical practice episodes."},
  {n:"Dave Camarillo",e:"#196",c:"sport",d:"'The Machine' — one of the most successful martial arts coaches in the world, with students who are UFC and BJJ world champions. Discusses the science of building elite grapplers, his unique approach of using judo principles in BJJ, and how he applies competitive martial arts thinking to everyday problem-solving."},
  {n:"Brian MacKenzie",e:"#89",c:"sport",d:"Co-guest with Laird Hamilton and Gabby Reece. Founder of CrossFit Endurance. Argues against high-mileage training for distance running — instead uses intense strength training to build endurance. His 8–12 week protocols for going from zero to marathon featured in Tim's 4-Hour Body. Among the most controversial and impactful fitness approaches in the archive."},
  {n:"Ryan Flaherty",e:"#238",c:"sport",d:"'Savant of speed' — sports performance coach who has worked with elite athletes across almost every major sport. His core discovery: most athletes' speed deficits come from the same source (hip flexor weakness and limited hip extension), and his protocols can produce dramatic speed improvements in weeks. Has worked with more NFL Combine top performers than any other coach."},
  {n:"Dorian Yates (2)",e:"#235",c:"sport",d:"6x Mr. Olympia bodybuilding champion who pioneered Blood and Guts high-intensity training. Notable for training only 4 days per week for under 45 minutes per session while dominating professional bodybuilding. Now practices yoga, discusses microdosing psilocybin, and reflects on the physical cost of extreme bodybuilding over his career."},
  {n:"Jimmy Chin (2)",e:"#114",c:"adventure",d:"The Meru film is described in unusual detail — the Shark's Fin on Mount Meru had defeated more elite climbing teams over 30 years than any other ascent in the Himalayas. Jimmy filmed it while simultaneously risking his life. The discussion of how to manage risk across a career of compounding dangerous decisions is the most substantive part of the episode."},
  {n:"Phil Libin",e:"#95",c:"tech",d:"Evernote CEO who shares lessons learned from briefings with Jeff Bezos and Reid Hoffman. Bezos's 'work backwards from the customer' framework and Hoffman's 'networks have increasing returns to scale' framework are both explained in practical terms. One of the best episodes in the archive for second-hand wisdom from otherwise inaccessible figures."},
  {n:"Susan Garrett",e:"#200",c:"science",d:"World champion dog trainer who applies the same principles to human learning she uses to train dogs. Her insight: behaviors that get rewarded get repeated, regardless of species. The key to training any complex behavior is to make the correct action feel like the learner's own idea. Applied to children, employees, and athletes as well as dogs."},
  {n:"Amelia Boone (2)",e:"#127",c:"sport",d:"The episode is particularly notable for Amelia's discussion of how she manages the psychological dimension of training while practicing law full-time. Her insight: the harder the training, the less mental energy she has available for anxiety and self-doubt. Extreme physical training as a deliberate tool for psychological management."},

  // ── MEDIA & WRITING ──────────────────────────────────────────────────────
  {n:"Glenn Beck",e:"#69",c:"media",d:"Media personality whose surprising creative inspirations — Walt Disney and Orson Welles — led Tim to an unexpectedly revealing conversation. Beck discusses how he thinks about audience, storytelling, and building media companies as acts of creative vision rather than political strategy."},
  {n:"Soman Chainani",e:"#220",c:"media",d:"Author of The School for Good and Evil series. Discusses how to write compelling moral complexity into children's fiction, the publishing process, and how he uses his own unresolved questions about good and evil as the engine of his storytelling. His books have sold millions of copies and spawned a Netflix film."},
  {n:"Maria Popova (2)",e:"#92",c:"media",d:"Second appearance: How to be interesting, creating more time in a day, and how to start a successful blog. Discusses her reading practice in more depth — she reads multiple books simultaneously across multiple disciplines, looking for unexpected intersections. Her most practical episode for creative workers who want to build a meaningful online presence."},
  {n:"Eric Ripert (2)",e:"#268",c:"food",d:"The episode is unusual for a chef guest in that cooking is almost secondary to the conversation about his Buddhist practice and how it intersects with the extreme demands of fine dining. His description of meditating in the kitchen — treating each dish as an opportunity for present-moment attention — is one of the show's most memorable moments."},
  {n:"Seth Godin (4)",e:"#476",c:"media",d:"Fourth appearance: The Practice — on shipping creative work. His argument that the creative process must be treated as a practice (showing up regardless of inspiration) rather than a gift (waiting for muse to arrive) is made most forcefully here. Also discusses the game of life: why playing finite games within infinite ones is the trap most people fall into."},
  {n:"Debbie Millman (4)",e:"#472",c:"media",d:"Books I've Loved. The books Millman recommends reveal her intellectual formation as both a designer and a philosopher of design. Her commentary is characteristically generous — she consistently attributes her own development to the specific books that shaped it, rather than presenting herself as a self-made thinker."},
  {n:"Whitney Cummings (3)",e:"#454",c:"comedy",d:"Books I've Loved. Cummings's book recommendations center on psychology, neuroscience, and the science of connection — revealing the intellectual foundation of her comedy. Her commentary is unusually personal: she describes each book in terms of the specific wound or confusion it helped her address."},
  {n:"Ryan Holiday (4)",e:"#419",c:"media",d:"How to use Stoicism to choose 'alive time' over 'dead time' during the COVID pandemic. Holiday at his most practical — specific techniques from Stoic practice adapted to lockdown conditions. His concept of 'alive time vs. dead time' (from Robert Greene) is given its fullest treatment here."},
  {n:"Neil Strauss",e:"#15,#450",c:"media",d:"Author of The Game and 7 New York Times bestsellers. First appearance covers his extraordinary career as a journalist who embedded himself in subcultures (pickup artistry, survivalism, cults) to write about them. Second appearance is Books I've Loved — his recommendations reveal how widely he reads across self-help, psychology, and philosophy."},
  {n:"Michael Lewis (2)",e:"#427",c:"media",d:"Inside the mind of the iconic writer. The discussion of his process is one of the best craft conversations in the archive: he spends years embedded in the world of his book before writing, always starts from a character whose inner life fascinates him, and credits his Liar's Poker experience at Salomon Brothers with showing him that the most extraordinary stories are hiding in plain sight inside institutions."},
  {n:"Brené Brown (3)",e:"#409",c:"philosophy",d:"Third appearance: striving versus self-acceptance, saving marriages, and more. Her most relationship-focused episode — she discusses how to have conversations about vulnerability in partnerships, the difference between guilt (I did something bad) and shame (I am bad), and the specific research behind what makes marriages survive."},
  {n:"Matt Mullenweg (3)",e:"#420",c:"tech",d:"Books I've Loved. Mullenweg's reading recommendations are unusually varied — he crosses between technical books, fiction, philosophy, and business. His commentary reveals how a distributed-first CEO reads for pattern recognition across domains rather than for specific tactical advice."},

  // ── COMEDY & ENTERTAINMENT ───────────────────────────────────────────────
  {n:"Seth Rogen & Evan Goldberg",e:"#108",c:"comedy",d:"Co-writers of Superbad, Pineapple Express, This Is the End, and Knocked Up. Their creative partnership is built entirely on genuine shared taste — they only make things that make each other laugh. Refreshingly honest about the business side of comedy: what gets made is often what can get funded, and navigating that constraint is most of the creative challenge."},
  {n:"Jim Jefferies",e:"#428",c:"comedy",d:"Australian stand-up comedian and former host of The Jefferies Show on Comedy Central. Discusses comedy, life lessons, and the magic of filling out customs forms. His approach to comedy: say exactly what you think, with no concern for whether the audience agrees. The episode is genuinely funny — one of the more entertaining listens in the archive."},
  {n:"Rainn Wilson (2)",e:"#123",c:"film",d:"The episode goes deeper into Wilson's Baha'i faith than almost any interview he'd given — he discusses how a spiritual practice can provide structure and meaning in an industry designed to destabilize identity. Also discusses the 'sexy nostril exercise' (a breathing technique) and using acting as a form of psychological therapy."},
  {n:"BJ Novak (2)",e:"#121",c:"film",d:"One of the show's most intellectually energetic conversations. Novak discusses how The Office succeeded by treating its characters as fully realized humans rather than comic types, how comedy can be a vehicle for ideas that wouldn't survive in more serious forms, and why he finds stand-up more interesting than acting as a testing ground."},
  {n:"Aisha Tyler (2)",e:"#327",c:"comedy",d:"One of the most discussed episodes among Tim's female listeners. Tyler is unusually candid about the specific structural obstacles she's faced as a Black woman in comedy and acting — not just individual bias, but systemic assumptions about what stories she should be allowed to tell and who is allowed to find her funny."},

  // ── ADVENTURE & EXPLORATION ──────────────────────────────────────────────
  {n:"Samy Kamkar",e:"#74",c:"tech",d:"Computer hacker who, at 17, launched the fastest-spreading computer virus in history (Samy worm on MySpace). Subsequently became a white-hat security researcher. Discusses how he optimizes online dating profiles using behavioral psychology, how to open locked cars without a key, and how to hijack drones. One of the most eclectic and entertainingly useful episodes in the archive."},
  {n:"Marc Goodman",e:"#48",c:"tech",d:"FBI futurist and author of Future Crimes. Discusses high-tech crime, cybersecurity, and how to protect yourself in a world where almost everything you own is hackable. One of the most practically alarming episodes in the archive — the specific vulnerabilities he describes in home networks, cars, and medical devices are genuinely sobering."},
  {n:"Dave Elitch",e:"#348",c:"music",d:"Drummer (The Mars Volta, Justin Timberlake, Miley Cyrus). Teaches the Moeller technique — an advanced drumming method that produces more power and speed with less effort through whip-like wrist mechanics. His broader lesson: the fastest path to mastery in any physical skill is learning to eliminate wasted motion rather than adding more effort."},
  {n:"Mike Phillips",e:"#383",c:"science",d:"Wildlife biologist who led the team that reintroduced gray wolves to Yellowstone — one of the most successful conservation projects in American history. Discusses how to save a species, the extraordinary political and logistical obstacles involved, and what the reintroduction of wolves has taught us about keystone species and ecosystem cascade effects."},
  {n:"Stephen Dubner (2)",e:"#199",c:"media",d:"Second appearance. Subtitle: 'The Art of Storytelling and Facing Malcolm Gladwell in a Fist Fight.' The playful framing opens a serious conversation about how Freakonomics's storytelling approach differs from Gladwell's — both use economics to reframe common assumptions, but with different relationships to certainty and causation. Dubner on why he's comfortable with ambiguity where Gladwell often isn't."},
  {n:"Rolf Potts (2)",e:"#42",c:"adventure",d:"Second part of two-part Vagabonding episode. Covers the specific tactics of long-term budget travel: how to negotiate accommodation, how to find meaningful work while traveling, how to leave a location before you've exhausted it, and why the best travel experiences happen in the margins rather than the highlights."},
  {n:"Cal Fussman (3)",e:"#324",c:"media",d:"Cal Fussman corners Tim Ferriss — the tables are turned and Fussman interviews Tim. One of the most revealing episodes about Tim's own psychology, habits, and failures. Fussman's skill at making Tim comfortable enough to share things he wouldn't normally share is itself a masterclass in the technique he teaches elsewhere."},
  {n:"Jason Fried (2)",e:"#329",c:"tech",d:"Basecamp co-founder on living life on your own terms. The deeper philosophical argument behind Rework: that the culture of 'hustle' and 'growth at all costs' is not a path to success but a path to dysfunction. His most personal episode — discusses his own relationship to work, money, and what he's optimizing for."},
  {n:"Ann Miura-Ko (2)",e:"#447",c:"biz",d:"Books I've Loved. Miura-Ko's reading recommendations reveal an unusual combination: rigorous empirical research, historical biography, and philosophical inquiry. Her commentary consistently returns to the question of how to think about risk and uncertainty — the same adversarial rigor she brings to investing."},
  {n:"Gretchen Rubin (2)",e:"#290",c:"media",d:"One of the most practically useful episodes for anyone who has tried and failed to build lasting habits. Rubin's four tendencies framework (Upholder, Questioner, Obliger, Rebel) not only explains why habits fail but provides specific strategies for each type. Her insight: most habit advice is Upholder advice, written for people who are already naturally compliant."},

  // ── POLITICS & PUBLIC SERVICE ────────────────────────────────────────────
  {n:"Cory Booker (2)",e:"#438",c:"politics",d:"Return of Coach George Raveling — actually a separate conversation with George Raveling on self-leadership during the summer of 2020. Raveling, who was at the March on Washington when Martin Luther King gave the 'I Have a Dream' speech (and still has the original copy), gives one of the archive's most historically grounded conversations on leadership and change."},
  {n:"George Raveling",e:"#332,#438",c:"sport",d:"Legendary basketball coach who has coached at Iowa, USC, and Washington; was at the March on Washington and received the original manuscript of Martin Luther King Jr.'s 'I Have a Dream' speech. Discusses what he's learned from 60+ years of coaching, the great game of life, and how to practice self-leadership during the most difficult moments."},
  {n:"Frank Blake (2)",e:"#303",c:"biz",d:"Former Home Depot CEO who built a remarkable culture of recognition and gratitude at scale. The 'crazy good turns' episode — Frank discusses specific stories of employees who went above and beyond, and the system he built to recognize and reinforce that behavior across 400,000 people. One of the most practically useful episodes on organizational culture in the archive."},

  // ── ADDITIONAL APPEARANCES ───────────────────────────────────────────────
  {n:"Sharon Salzberg (2)",e:"#277",c:"philosophy",d:"One of the show's most quietly impactful episodes. Salzberg's discussion of how she came to meditation after a traumatic childhood, and how loving-kindness practice specifically addresses the shame and self-rejection that most meditation traditions don't directly confront, has been cited by listeners as transformative."},
  {n:"Phil Zimbardo (2)",e:"#226",c:"philosophy",d:"The Stanford Prison Experiment discussion is one of the most sobering in the archive — how quickly ordinary college students assigned to 'guard' roles began abusing their 'prisoner' peers. Zimbardo's lessons on situational power are directly applicable to organizational culture: the system matters more than individual virtue."},
  {n:"Adam Robinson (2)",e:"#322",c:"biz",d:"Second appearance: outflanking and outsmarting the competition. Develops the 'outflanking' concept in more practical detail — specific examples of how individuals and companies have changed the rules of competition to create asymmetric advantage. One of the most creatively stimulating conversations about strategy in the archive."},
  {n:"Michael Gervais (2)",e:"#256",c:"philosophy",d:"The episode goes deep on what Gervais calls the 'internal environment' — the specific cognitive and emotional states that either enable or prevent peak performance. His training protocols with the Seahawks (which contributed to their Super Bowl run) are described in enough detail to be practically useful for non-athletes."},
  {n:"Chip Conley (2)",e:"#374",c:"biz",d:"The 'Modern Elder' concept gets its fullest treatment here. Conley's experience going to Airbnb at 52, as the oldest person in many rooms, and finding that his combination of wisdom and inexperience in the new context was actually his greatest asset. A practical guide to navigating generational transitions in the workplace."},
  {n:"Blake Mycoskie (2)",e:"#446",c:"biz",d:"Second appearance. Mycoskie discusses TOMS's evolution beyond the one-for-one model (which he now acknowledges had problematic dependency effects), the Hoffman Process (an intensive psychological retreat), and ayahuasca. One of the most candid conversations about the gap between external success and internal wellbeing in the archive."},
  {n:"Bozoma Saint John",e:"#288",c:"biz",d:"Former head of marketing at Apple Music, Uber, and later CMO of Netflix. One of the most naturally charismatic guests in the archive. Discusses her path from Ghana to Silicon Valley, from Spike Lee film sets to Apple's biggest stage. Her approach to marketing: always be authentic, because audiences can detect performance at a distance."},
  {n:"Whitney Wolfe Herd (2)",e:"#316",c:"tech",d:"Bumble founder on one of the most discussed topics from her episode: the decision to make women's first move mandatory — not optional — as a design choice that fundamentally changes the dynamics of the product. The design insight: changing one structural rule can change the emotional experience of an entire platform."},
  {n:"Scott Belsky",e:"#336",c:"biz",d:"Behance founder, Adobe Chief Product Officer, author of The Messy Middle. Discusses how to conquer the messy middle of any creative or entrepreneurial project — the period after the initial excitement and before the final success when most people quit. His insight: the middle is where resilience and resourcefulness actually get built."},
  {n:"Eric Weinstein (2)",e:"#131",c:"science",d:"Tim's first deeply mathematical/physics conversation on the show. Weinstein discusses his concept of 'institutional capture' — how academic and journalistic institutions have developed self-protective mechanisms that suppress heterodox thinking — and applies it to economics, physics, and media simultaneously."},
  {n:"Jason Khalipa (2)",e:"#246",c:"sport",d:"The most emotionally charged part of the episode: Khalipa describes learning that his daughter Ava was diagnosed with leukemia during the period of his peak athletic training. His account of how his competitive mental frameworks — specifically the ability to stay process-focused under extreme pressure — transferred to navigating the worst crisis of his life is one of the show's most moving moments."},

);
