<!DOCTYPE html>
<html lang="en">
<head>

<title>The Tim Ferriss Show — Complete Guest Guide</title>
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
    --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
    --border:rgba(26,26,24,.12);--border2:rgba(26,26,24,.22);
    --accent:#1a1a18;--r:10px;--rs:6px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#a8a8a0;--text3:#6a6a64;--border:rgba(240,239,233,.1);--border2:rgba(240,239,233,.2);--accent:#f0efe9;}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
  .page{max-width:1140px;margin:0 auto;padding:2rem 1.5rem}
  .hdr{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:.5px solid var(--border)}
  .hdr h1{font-size:22px;font-weight:600;margin-bottom:4px}
  .hdr p{font-size:14px;color:var(--text2)}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .stat{background:var(--bg2);border-radius:var(--rs);padding:5px 12px;font-size:13px;color:var(--text2)}
  .stat strong{color:var(--text)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;border-bottom:.5px solid var(--border);padding-bottom:12px}
  .tab{padding:7px 16px;border:.5px solid var(--border2);border-radius:var(--rs);font-size:13px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
  .tab:hover{background:var(--bg2);color:var(--text)}
  .tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .sec{display:none}.sec.active{display:block}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;align-items:flex-start}
  .sw{position:relative;flex:1;min-width:200px}
  .sw input{width:100%;padding:8px 12px 8px 34px;border:.5px solid var(--border2);border-radius:var(--rs);font-size:13px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
  .sw input:focus{border-color:var(--accent)}
  .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
  .fbar{display:flex;gap:5px;flex-wrap:wrap}
  .fb{padding:5px 11px;border:.5px solid var(--border2);border-radius:99px;font-size:12px;cursor:pointer;background:transparent;color:var(--text2);white-space:nowrap;font-family:inherit;transition:all .12s}
  .fb:hover{background:var(--bg2);color:var(--text)}
  .fb.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .cnt{font-size:12px;color:var(--text3);margin-bottom:10px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px}
  .card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem}
  .cn{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
  .ce{font-size:12px;color:var(--text3);margin-bottom:8px}
  .cd{font-size:13px;color:var(--text2);line-height:1.65}
  .badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;margin-bottom:8px;font-weight:500}
  .b-biz{background:#dceefb;color:#144e80}.b-tech{background:#dceefb;color:#0a3a65}
  .b-media{background:#fef3dc;color:#7a4a08}.b-film{background:#fce8f3;color:#8a2060}
  .b-comedy{background:#fde8e8;color:#922020}.b-science{background:#dcf5ec;color:#0a5c36}
  .b-medicine{background:#dcf5ec;color:#064030}.b-sport{background:#fde8dc;color:#8a3010}
  .b-philosophy{background:#efefeb;color:#4a4a42}.b-military{background:#e8f5dc;color:#2a4e10}
  .b-adventure{background:#fef3dc;color:#5a3808}.b-music{background:#eeedfb;color:#4a40aa}
  .b-food{background:#e8f5dc;color:#1a4e10}.b-politics{background:#e8f5dc;color:#2a5018}
  @media(prefers-color-scheme:dark){
    .b-biz{background:#0c2a42;color:#7ab8e8}.b-tech{background:#0a2438;color:#6aaee0}
    .b-media{background:#3a2a08;color:#e8b860}.b-film{background:#380820;color:#e080b0}
    .b-comedy{background:#380808;color:#e08080}.b-science{background:#083020;color:#60d0a0}
    .b-medicine{background:#062818;color:#50c090}.b-sport{background:#381808;color:#e09060}
    .b-philosophy{background:#222220;color:#b0b0a8}.b-military{background:#182808;color:#90c060}
    .b-adventure{background:#382008;color:#d0a050}.b-music{background:#1a1848;color:#a090e8}
    .b-food{background:#102808;color:#80c050}.b-politics{background:#182a08;color:#88c058}
  }
  .hlist{border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
  .hi{padding:1rem 1.25rem;border-bottom:.5px solid var(--border);background:var(--bg)}
  .hi:last-child{border-bottom:none}
  .hi:nth-child(even){background:var(--bg2)}
  .hcat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
  .htitle{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
  .hsrc{font-size:12px;color:var(--text3);margin-bottom:6px}
  .hdesc{font-size:13px;color:var(--text2);line-height:1.65}
  .bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
  .bcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;display:flex;gap:14px;align-items:flex-start}
  .bicon{width:40px;height:52px;border-radius:4px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}
  .bt{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
  .ba{font-size:12px;color:var(--text3);margin-bottom:6px}
  .bw{font-size:13px;color:var(--text2);line-height:1.65}
  .br{font-size:12px;color:#1a6ab0;margin-top:5px}
  @media(prefers-color-scheme:dark){.br{color:#6aaee0}}
  .alist{display:flex;flex-direction:column;gap:10px}
  .acard{background:var(--bg);border:.5px solid var(--border);border-left:3px solid #6060c0;border-radius:var(--r);padding:1rem 1.25rem}
  .atitle{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
  .asrc{font-size:12px;color:var(--text3);margin-bottom:8px}
  .abody{font-size:13px;color:var(--text2);line-height:1.7}
  .nores{padding:2rem;text-align:center;color:var(--text3);font-size:14px}
  .legend{font-size:12px;color:var(--text3);margin-bottom:.5rem;font-style:italic}
  @media(max-width:600px){.page{padding:1rem}.cards{grid-template-columns:1fr}.bgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
<div class="hdr">
  <h1>The Tim Ferriss Show — Complete Guest Guide</h1>
  <p>Every substantive guest interview across 825+ episodes, sourced from tim.blog/podcast transcripts</p>
  <div class="stats">
    <div class="stat"><strong id="total-g">~400</strong> guests</div>

<script>
const CAT={biz:'Business & investing',tech:'Tech founders',media:'Media & writing',film:'Film & TV',comedy:'Comedy',science:'Science & health',medicine:'Medicine & longevity',sport:'Sport & athletics',philosophy:'Philosophy & spirituality',military:'Military & leadership',adventure:'Adventure & exploration',music:'Music',food:'Food & craft',politics:'Politics & public service'};
const BDG={biz:'b-biz',tech:'b-tech',media:'b-media',film:'b-film',comedy:'b-comedy',science:'b-science',medicine:'b-medicine',sport:'b-sport',philosophy:'b-philosophy',military:'b-military',adventure:'b-adventure',music:'b-music',food:'b-food',politics:'b-politics'};
const HCAT={morning:'Morning routine',mindset:'Mindset',body:'Body & health',work:'Work & creativity',decision:'Decision making',learning:'Learning',relationships:'Relationships'};

// ─── GUESTS ────────────────────────────────────────────────────────────────
const G=[
// BUSINESS & INVESTING
{n:"Naval Ravikant",e:"#97,#136,#228,#473",c:"philosophy",d:"AngelList co-founder and prolific angel investor (Twitter, Uber, Yammer). Argues happiness is a learnable skill, not a destination. The 5 chimps theory: you become the average of who and what you spend time with — extending to media and ideas. Reads voraciously, meditates daily, ruthlessly curates his environment."},
{n:"Peter Thiel",e:"#28",c:"biz",d:"PayPal co-founder, Palantir investor, first Facebook investor. Signature question: 'What important truth do very few people agree with you on?' Argues capitalism and competition are antonyms. Believes failure is always a tragedy, never an educational imperative. Don't wait — his biggest regret was not starting PayPal sooner."},
{n:"Chris Sacca",e:"#79,#132",c:"biz",d:"First investor in Twitter, Uber, Instagram, Kickstarter. Built potentially the best-performing seed fund in VC history (~250x multiple). Credits being different — not trying to fit in — as his core edge. Recorded on Necker Island with Richard Branson. Introduced Tim to Total Immersion swimming."},
{n:"Ray Dalio",e:"#264",c:"biz",d:"Bridgewater founder ($160B+ AUM), author of Principles. Practices TM twice daily. Writes every major decision into documented 'principles.' Built radical transparency and idea meritocracy as Bridgewater's operating system. Argues the biggest obstacle to success is ego protecting itself from honest feedback."},
{n:"Tony Robbins",e:"#35,#37,#38,#178,#186",c:"biz",d:"World's leading performance coach. Daily 10-min 'priming' ritual: kapalabhati breathing, gratitude, visualization. Distinguishes achievement from fulfillment — argues most people sacrifice the latter for the former. Jumps in cold water to shift his state before important work."},
{n:"Reid Hoffman",e:"#101,#248,#326",c:"biz",d:"LinkedIn co-founder. 'Permanent beta' career framework — always iterating on yourself. Uses three-scenario planning before every major decision. Scaled LinkedIn to 300M+ users. His 10 commandments of startup success are a must-read."},
{n:"Howard Marks",e:"#338,#431",c:"biz",d:"Oaktree Capital co-founder ($120B+ AUM). Author of The Most Important Thing. Second-level thinking: 'Is this priced correctly given what everyone else believes?' Meditates regularly. Views equanimity as essential to clear investment thinking."},
{n:"Bob Iger",e:"#406",c:"biz",d:"Disney CEO. Wakes at 4:15am, exercises before consuming any information, reads widely before engaging with the world. Acquired Pixar, Marvel, Lucasfilm, and 21st Century Fox. Describes optimism as a leadership choice that requires active maintenance."},
{n:"Richard Branson",e:"#272",c:"biz",d:"Virgin Group founder (400+ companies). Carries a notebook everywhere — credits this with preserving ideas that became businesses, including Virgin Atlantic (invented while stranded in the BVI after a cancelled flight). Delegates radically by trusting people beyond their current capabilities."},
{n:"Jim Collins",e:"#361,#483",c:"biz",d:"Author of Good to Great and Built to Last. Tracks creative hours precisely — targets 1,000 per year. Nearly abandoned his research before accidentally discovering Level 5 Leadership. Serious rock climber who uses mountains as his primary thinking environment."},
{n:"Marc Andreessen",e:"#163",c:"biz",d:"Mosaic/Netscape creator, a16z co-founder. No recurring meetings, no to-do lists. Works on 'maker time' — long uninterrupted blocks by priority. Tracks mood and energy through structured journaling and adjusts projects accordingly."},
{n:"Ramit Sethi",e:"#33,#34,#166,#371",c:"biz",d:"Author of I Will Teach You to Be Rich. Built multi-million-dollar education business by being ruthlessly specific about his target customer. Automates personal finances completely. Cold-emailing experts relentlessly was his early-career breakthrough."},
{n:"Ben Horowitz",e:"#392",c:"biz",d:"a16z co-founder, author of The Hard Thing About Hard Things. Uses hip-hop lyrics as leadership philosophy delivery. Core insight: peacetime CEO skills are opposite to wartime CEO skills. What You Do Is Who You Are examines culture through historical case studies: Genghis Khan, Toussaint Louverture, Shaka Senghor."},
{n:"Adam Robinson",e:"#219,#322",c:"biz",d:"Princeton Review co-founder, lateral thinker, chess expert. 'Outflanking' — when you can't beat someone head-on, change the game entirely. Considers reading, thinking, and talking to interesting people his actual work. Tim's second interview with him on outflanking competitors is particularly rich."},
{n:"Drew Houston",e:"#334",c:"tech",d:"Dropbox co-founder. 'Tennis ball dog' metaphor for calling: what do you chase obsessively for its own sake? Built Dropbox after forgetting a USB drive on a bus and being unable to find good cloud storage. Small personal board of advisors ('the circle') that he meets with regularly."},
{n:"Patrick Collison",e:"#353",c:"tech",d:"Stripe CEO. Voracious polymath — learns programming languages for fun, reads history obsessively, speaks Irish. Believes most startups fail by doing the obvious thing rather than the correct thing. Advocates for being the last entrant in a space rather than the first."},
{n:"Tobi Lütke",e:"#359",c:"biz",d:"Shopify CEO. Former competitive video gamer and programmer who taught himself through deliberate systems thinking. Built Shopify's culture around intellectual honesty: every meeting must surface the strongest opposing argument before deciding. Snowboards obsessively."},
{n:"Marc Randolph",e:"#496",c:"biz",d:"Netflix co-founder. Daily morning surf as non-negotiable reset. Was laughed out of Blockbuster's boardroom. Netflix succeeded by testing ideas faster than anyone else. Good-enough decisions made quickly beat perfect decisions made slowly."},
{n:"Daniel Ek",e:"#484",c:"biz",d:"Spotify CEO. Walks 5–6 hours daily as his primary thinking environment — no music, no podcasts. Uses two-year planning horizons. Built Spotify from Sweden to 500M+ users. Reads in long sessions and listens to music constantly as both fuel and research."},
{n:"Daymond John",e:"#130",c:"biz",d:"FUBU founder ($6B brand started sewing hats in Queens). Reads written goals twice daily — morning and night. Used his mother's house as collateral for his first $100K bank loan. Placed FUBU on LL Cool J in a Gap ad, creating overnight brand recognition without a single buyer meeting."},
{n:"Brad Feld",e:"#448",c:"biz",d:"Techstars co-founder. Takes one full week completely offline every quarter and one full month offline every year. Reads one literary novel per week (fiction only). Refuses email before 9am. More publicly candid about depression among high-performing entrepreneurs than almost anyone in the VC world."},
{n:"Ann Miura-Ko",e:"#331,#447",c:"biz",d:"Floodgate co-founder. Former national debate champion — used debate to overcome shyness. Tries to find the three most devastating arguments against every investment before committing. PhD in mathematical modeling of cybersecurity. Named NYT's most powerful woman in startups."},
{n:"Mike Maples Jr.",e:"#286,#397",c:"biz",d:"Floodgate co-founder, early investor in Twitter, Lyft, Twitch. 'Thunder lizard' framework — the best investments feel absurd and contrarian at the time. The discomfort of a contrarian bet is the signal, not the warning."},
{n:"Sam Zell",e:"#407",c:"biz",d:"'Grave Dancer' real estate billionaire. Buys distressed assets at cycle bottoms. Fear of failure is miscalibrated — most people overweight embarrassment and underweight missed opportunity. Rides motorcycles internationally as his primary travel and thinking habit."},
{n:"Graham Duncan",e:"#362",c:"biz",d:"East Rock Capital founder, talent investor. His essay 'What's Going on in That Head of Yours?' became one of the most-circulated pieces in finance. Meditates daily. Has thought more carefully about the phenomenology of decision-making under uncertainty than almost any guest on the show."},
{n:"Brendan Moynihan",e:"#29",c:"biz",d:"Author of What I Learned Losing a Million Dollars. There are infinite ways to make money but very few ways to lose — all involve ego protecting a bad position. One of the most psychologically honest books about financial failure ever written."},
{n:"Sophia Amoruso",e:"#112",c:"biz",d:"Nasty Gal founder — built $100M fashion brand from eBay store selling vintage thrift finds. After bankruptcy, founded Girlboss Media. One of the show's most instructive second acts in resilience and reframing catastrophic failure."},
{n:"Blake Mycoskie",e:"#249,#446",c:"biz",d:"TOMS Shoes founder — invented the one-for-one charitable model while on vacation in Argentina seeing children without shoes. In his second appearance discussed the Hoffman Process and ayahuasca as profound transformative tools. Unusually candid about the gap between external success and internal wellbeing."},
{n:"Ricardo Semler",e:"#229",c:"biz",d:"Semco CEO — the most radically democratic company in business history. Employees set their own salaries. Practices 'terminal Wednesdays': if I only had a year to live, would I be doing this? Most management is control theater that destroys the engagement it claims to build."},
{n:"Chip Conley",e:"#374",c:"biz",d:"Joie de Vivre Hotels founder, Airbnb head of global hospitality. Rebuilt his hotel chain using Maslow's hierarchy as a management framework. Found solace in Viktor Frankl's work during the dot-com bust. Coined 'Modern Elder' for the unprecedented role of having wisdom without authority in a younger organization."},
{n:"Shep Gordon",e:"#184",c:"biz",d:"Rock history's most powerful manager (Alice Cooper, 50+ years) who also invented the celebrity chef concept. Zero-budget PR legend — released a truck of chickens on a freeway for Alice Cooper. Has donated most of his wealth to charitable causes. Buddhist practice of generosity as daily discipline."},
{n:"Kevin Rose",e:"#1,#24,#129,#209",c:"tech",d:"Digg co-founder and Tim's longtime co-host on the Random Show. Obsessive biohacker: gut microbiome tracking, Oura ring sleep data, extended fasting. Daily meditator. Brings researcher's rigor to wellness trends before mainstream adoption. The very first episode of the show."},
{n:"Alexis Ohanian",e:"#36,#425",c:"tech",d:"Reddit co-founder and VC. Unusually candid about burnout and mental health in Silicon Valley. Practices radical disconnection on weekends. Prominent advocate for paid parental leave. Studies how movements are built, not just companies."},
{n:"Luis von Ahn",e:"#135",c:"tech",d:"Creator of CAPTCHA and Duolingo. Digitized Google Books using millions of people solving CAPTCHAs — turning a necessary annoyance into free labor for humanity. Product design as behavioral engineering: Duolingo's addictive streak mechanic is a direct application. Built companies around education access as the world's most solvable inequality."},
{n:"Matt Mullenweg",e:"#61,#190,#420",c:"tech",d:"WordPress founder (43% of the internet). Fully distributed since 2005 — long before remote work was fashionable. Hires through writing trials, not interviews. Jazz pianist and amateur photographer. Uses travel as deliberate disruption of routine to generate new thinking."},
{n:"Jason Fried",e:"#329",c:"tech",d:"Basecamp co-founder, author of Rework and It Doesn't Have to Be Crazy at Work. Calm as a competitive advantage. 40-hour weeks for 20+ years, no performance reviews, still highly profitable. Busyness is not productivity — it's a sign of poor organization."},
{n:"David Heinemeier Hansson",e:"#195,#203",c:"tech",d:"Ruby on Rails creator (used by GitHub, Shopify, Twitter), Basecamp co-founder. Won Le Mans class race as a driver. The fastest path is rarely straight-line maximum effort — find the right line and be smooth. Radically contrarian on startup culture."},
{n:"Tristan Harris",e:"#387",c:"tech",d:"Former Google design ethicist, Center for Humane Technology founder. Created viral internal Google presentation on attention exploitation. Has essentially given up his smartphone. Tech is not neutral — it deliberately exploits cognitive vulnerabilities using slot machine mechanics."},
{n:"Caterina Fake",e:"#360",c:"tech",d:"Flickr co-founder (sold to Yahoo). Many founders are unconsciously more afraid of succeeding than failing, because success brings irreversible identity change. Reads widely in literature and philosophy. Candid about the emotional texture of building and selling companies."},
{n:"Kevin Systrom",e:"#369",c:"tech",d:"Instagram co-founder (1B users). Serious amateur photographer and wine enthusiast. Instagram succeeded through radical simplicity — strip everything but what works perfectly. Reads voraciously and practices photography daily even when not building products."},
{n:"Joe Gebbia",e:"#301",c:"tech",d:"Airbnb co-founder and trained designer. Tolerance for embarrassment is the founding skill — being willing to ship imperfect and learn from strangers. He and Chesky personally photographed the first hosts' apartments with a rented camera to improve listing quality."},
{n:"Tony Fadell",e:"#403",c:"tech",d:"'Father of the iPod' — created first 18 iPod generations and first 3 iPhone generations at Apple. Founded Nest (smart thermostat), now coaching 200+ startups at Future Shape. Argues the best innovations solve problems people don't know they have yet. Has filed 300+ patents. Views curiosity as the ultimate career skill."},
{n:"Safi Bahcall",e:"#364,#382",c:"science",d:"Physicist turned biotech CEO, author of Loonshots. Phase transition model: organizations predictably shift from nurturing innovation to exploiting it at ~150 people. Used self-hypnosis to cure his insomnia completely in under a week. Rich historical case studies throughout the book."},
{n:"Howard Marks (2)",e:"#431",c:"biz",d:"Second appearance with Marks covering: three ways to add defense to a portfolio, the US dollar's reserve currency status, and how to ask better questions. His COVID-era memos on uncertainty became some of the most widely circulated investment writing of 2020."},
{n:"Phil Libin",e:"#95",c:"tech",d:"Evernote CEO. Learned lessons from Jeff Bezos: work backwards from the customer, write the press release first. From Reid Hoffman: networks have increasing returns to scale, not diminishing. Argues the best products make people feel smarter, not just more organized."},
{n:"Sophia Amoruso",e:"#112",c:"biz",d:"Nasty Gal founder. Grew $100M brand from an eBay vintage store with zero business training. Author of #GIRLBOSS. Her bankruptcy and reinvention via Girlboss Media became one of the show's most-cited resilience narratives."},
{n:"Bob Metcalfe",e:"#297",c:"tech",d:"Inventor of Ethernet and Metcalfe's Law (the value of a network grows proportionally to the square of its users). Argues most tech predictions are wrong in direction but right in the underlying force. Practices farming in retirement as a grounding counterweight to digital life."},
{n:"Bill Rasmussen",e:"#258",c:"biz",d:"ESPN founder. Long-shot origin story: was fired from the NHL's Hartford Whalers, then convinced RCA and Getty Oil to back a 24-hour sports cable channel at a time when nobody thought sports warranted 24 hours. Was laughed out of every room before it worked."},
{n:"Astro Teller",e:"#77,#309",c:"tech",d:"CEO of X (Google's moonshot factory). '10x thinking' — it is actually easier to make something 10x better than 10% better, because 10x requires entirely different approaches. Rewards teams for killing projects that won't work early. Has run the Boston Marathon multiple times."},
{n:"Karlie Kloss",e:"#307",c:"biz",d:"Supermodel who taught herself to code and founded Kode With Klossy, coding camps for young women. Argues that fashion and technology are not opposites — both are fundamentally about design and communication. Her decision to stop modeling full-time to focus on education technology was widely discussed."},
{n:"Whitney Wolfe Herd",e:"#316",c:"tech",d:"Bumble founder and CEO. Founded Bumble after leaving Tinder following sexual harassment and discrimination. Made women's opening move the central differentiator. Became the youngest woman to take a company public in the US. Arguments that company culture is built on founder behavior, not stated values."},
{n:"Julie Rice",e:"#372",c:"biz",d:"SoulCycle co-founder. Built a cult brand out of what was essentially a commodity (spinning) by focusing obsessively on instructor quality, community, and emotional experience. Taming anxiety and mastering difficult conversations were recurring themes — she argues founders must become therapists to themselves and their teams."},

// FILM & TV
{n:"Arnold Schwarzenegger",e:"#60,#216",c:"film",d:"7x Mr. Olympia, blockbuster actor, Governor of California. Confidence from clear vision: saw himself winning before he won. Used psychological warfare on bodybuilding competitors. Grew up with no running water in rural Austria. Sent bull testicle sculpture to a California state legislator before a tense budget negotiation."},
{n:"Jon Favreau",e:"#71",c:"film",d:"Director/writer (Iron Man, Elf, Chef, The Mandalorian). Made Chef as a creative reset after blockbuster Iron Man films. Approach: craft mastery first, then improvisation. Passion projects as circuit breakers when disconnected from original motivation."},
{n:"Ed Catmull",e:"#22",c:"film",d:"Pixar president and co-founder with Steve Jobs. Every Pixar film starts as a bad movie — systematically. The Braintrust: candid peer critique completely separated from power hierarchy. The inability to hear honest feedback is the most expensive problem any creative organization can have."},
{n:"Robert Rodriguez",e:"#98",c:"film",d:"Director of El Mariachi, Desperado, Sin City, Spy Kids. Sold his body to a drug research trial to fund El Mariachi ($7,000 total cost). Dual-column journal: intended actions left, actual actions right. Shoots, edits, and composes his own work to eliminate creative dependencies."},
{n:"Kevin Costner",e:"#119",c:"film",d:"Two-time Oscar winner (Dances with Wolves). Finances his most ambitious projects independently rather than waiting for studio approval. Grew up working-class in Southern California. Trained classically on piano — music remained a lifelong daily practice."},
{n:"James Cameron",e:"#346",c:"film",d:"Director of Titanic and Avatar. Sets goals explicitly impossible at the time he sets them. Made the deepest solo submarine descent in history to the Mariana Trench. Years of world-building before a single frame is shot."},
{n:"Brian Grazer",e:"#279",c:"film",d:"Producer of A Beautiful Mind, Apollo 13, 8 Mile. Schedules weekly 'curiosity conversations' with experts outside entertainment — one per week for 40+ years. Has met everyone from scientists and criminals to foreign heads of state. Virtually all his most successful films were seeded by ideas from these conversations."},
{n:"Matthew McConaughey",e:"#474",c:"film",d:"Oscar winner (Dallas Buyers Club). Journals since age 14 — published as Greenlights. Turned down every romantic comedy for years. Ask not what you want but what you're willing to struggle for. His three rules: define success for yourself, eliminate the superfluous, be yourself in every room."},
{n:"Joseph Gordon-Levitt",e:"#312",c:"film",d:"Actor and HitRecord founder. Attention paid inward (to your own craft, process) versus outward (to audience metrics, social media). The internet has monetized outward attention at the expense of creative depth. Built HitRecord to explicitly reverse that dynamic."},
{n:"Edward Norton",e:"#133,#393",c:"film",d:"Oscar-nominated actor. Months of deep research immersion for every role. Co-founded Crowdrise to channel celebrity toward scalable social change. Treats career as a calling, not a business. Second appearance focused on Motherless Brooklyn and the creative struggle."},
{n:"Darren Aronofsky",e:"#263",c:"film",d:"Director of Pi, Requiem for a Dream, Black Swan, The Wrestler, mother!. Carries ideas in notebooks for decades. Runs long distances as a creative endurance analogue. Deliberately detaches from critics. His first film Pi was shot for $60,000 and launched his career."},
{n:"Jamie Foxx",e:"#124,#167",c:"film",d:"Oscar and Grammy winner. Carried a professional camera everywhere before fame to create social utility and access. 'The first social media guy without social media' — collected contacts on cue cards after every standup show. Plays piano every day. Two-a-day workouts when prepping for roles."},
{n:"Ken Burns",e:"#386",c:"media",d:"Greatest American documentary filmmaker (Civil War, Baseball, Jazz, Vietnam War). Most films take a decade. The Ken Burns effect (slow zoom on still photos) was a practical solution to having no moving footage that became his most recognizable signature."},
{n:"Rainn Wilson",e:"#123",c:"film",d:"Actor (Dwight Schrute on The Office) and SoulPancake co-founder. Meditates daily in the Baha'i tradition. Serious amateur farmer — agricultural work as meditation. Argues Dwight Schrute worked because he was fully realized as a human being who saw the world differently, not a caricature."},
{n:"Casey Neistat",e:"#116",c:"film",d:"Pioneer YouTube filmmaker who sold media company Beme to CNN for $25M. Grew up poor, dropped out at 15, had a child at 17. Taught himself filmmaking by checking equipment out of a library and refusing to return it. Treats every run and commute as potential footage."},
{n:"Terry Crews",e:"#287",c:"film",d:"Actor and former NFL player. Was a broke, failed NFL player before Hollywood. 3–4am weightlifting sessions before his family wakes as the anchor habit that keeps every other area of his life structured. Has spoken publicly about sexual assault and therapy. Reads obsessively about psychology."},
{n:"Vince Vaughn",e:"#243",c:"film",d:"Actor and writer (Swingers, Wedding Crashers, Dodgeball). Stand-up comedy before acting built his tolerance for silence and rejection. Systematically did uncomfortable things to overcome fear. Best performances come from genuine listening, not technical execution."},
{n:"B.J. Novak",e:"#121",c:"film",d:"Writer and actor on The Office, author of One More Thing. Notebook at all times — compulsive observation and capture. Reads widely in philosophy and psychology. Stand-up as a testing ground for ideas. Jokes that reveal something true about human nature are more interesting than jokes that are merely funny."},
{n:"Brandon Stanton",e:"#321",c:"media",d:"Creator of Humans of New York (25M+ followers). Was fired from bond trading in Chicago, moved to NYC broke with a camera and no training. Built his following by being genuinely — not performatively — curious about every person he photographs. One simple human question, then genuine listening."},
{n:"Shay Carl",e:"#170,#189",c:"media",d:"YouTube pioneer with 2.3 billion views. Was a tile installer before YouTube. Documented his family's real daily life before vlogging was a category. One of the show's most candid episodes on alcoholism, recovery, and how radical vulnerability sustains audience trust through the worst periods."},

// MEDIA & WRITING
{n:"Seth Godin",e:"#138,#177,#343,#476",c:"media",d:"Marketing legend, author of 20+ books (Purple Cow, The Dip, Linchpin). Has blogged every single day for 15+ years. Says no constantly to protect creative focus. Roasts his own coffee beans. Makes honey oatmeal vodka in his basement. Doesn't drink either. Made 120 books as a packager before realizing he was learning the wrong lesson."},
{n:"Maria Popova",e:"#39,#92",c:"media",d:"Founder of Brain Pickings (The Marginalian). Reads voraciously, cross-pollinates ideas across disciplines. Avoids social media consumption during work hours. Treats creative attention as a non-renewable resource. Writes essays of extraordinary depth on literature, philosophy, and science."},
{n:"Malcolm Gladwell",e:"#168",c:"media",d:"Author of Outliers, Tipping Point, Blink. Competitive masters runner. Never starts an article knowing the ending — writing as a process of discovery. Reads academic journals for overlooked studies no one has written about for a general audience. The one counterintuitive fact that reframes everything is his starting point."},
{n:"Ryan Holiday",e:"#4,#169,#410,#419",c:"media",d:"Author of The Obstacle Is the Way, Ego Is the Enemy, Stillness Is the Key. Daily Stoic journaling. Keeps a physical commonplace book (index cards by category). Treats creative time as sacred surgery hours. Has written more books by his 30s than most writers produce in a lifetime."},
{n:"Paulo Coelho",e:"#154",c:"media",d:"Author of The Alchemist (one of the best-selling books in history). Writes in intense short bursts, travels nomadically. Keeps a minimalist writing practice — no research, no outlines. Surprisingly active on social media as a direct line to readers worldwide."},
{n:"Kevin Kelly",e:"#25-27,#96,#164,#247,#432",c:"media",d:"WIRED co-founder, author of The Inevitable and What Technology Wants. Didn't get his first real job until 35 (at the Whole Earth Catalog). Advocates 'productive aimlessness' in youth — premature optimization is the enemy. Travels to deliberately disorienting places to generate new thinking."},
{n:"Yuval Noah Harari",e:"#477",c:"media",d:"Author of Sapiens, Homo Deus. Meditates 2 hours daily, goes on 60-day silent retreats annually. No smartphone. Vegan. Writes with bone-conduction headphones. History as a study of the shared fictions that enable mass cooperation at scale."},
{n:"Elizabeth Gilbert",e:"#430",c:"media",d:"Author of Eat Pray Love and Big Magic. Treats creativity as a separate entity that visits you — show up reliably so it can find you. Captures ideas on index cards. Only works on things she finds genuinely interesting, regardless of commercial logic."},
{n:"Neil Gaiman",e:"#366",c:"media",d:"Author of American Gods, Coraline, Sandman. Writes longhand in a hut in the woods with no internet. Boredom as the source of creativity. Carries a specific black pen everywhere. Has waited 20 years to do this interview with Tim."},
{n:"Michael Lewis",e:"#427",c:"media",d:"Author of Moneyball, The Big Short, Liar's Poker, Flash Boys. Spends 1–2 years embedded in each book's world before writing. Starts from a fascinating character, not a thesis. Reads writers who make him feel inadequate rather than comfortable."},
{n:"Chuck Palahniuk",e:"#457",c:"media",d:"Author of Fight Club, Choke, Haunted. Writes in public places to prevent self-censorship — isolation makes writers too precious. Reads work aloud to audiences before publication to test visceral reactions. Has a set of 'thought experiment' writing techniques he teaches."},
{n:"Joyce Carol Oates",e:"#497",c:"media",d:"One of the most prolific serious novelists in American history (58 novels). Writes every day including holidays. Runs daily — running as her primary thinking and narrative problem-solving tool. Prolificacy and quality are not enemies: standards rise with volume."},
{n:"Mary Karr",e:"#479",c:"media",d:"Author of The Liar's Club and Lit. Daily prayer and meditation. Recovering alcoholic who found sobriety radically improved her prose. Has spent entire days on a single paragraph until it's exactly right. Her memoir writing is forensically honest."},
{n:"Stephen Dubner",e:"#7,#199",c:"media",d:"Freakonomics co-author and podcast host. Finds the one counterintuitive fact that reframes everything — the thing that makes a reasonable person say 'wait, really?' Reads academic papers for overlooked story ideas. Be willing to follow data wherever it leads."},
{n:"Cal Fussman",e:"#145,#183,#259",c:"media",d:"Esquire's legendary 'What I've Learned' interviewer (Ali, Gorbachev, Bezos). One big open question, then genuine listening. Never uses a prepared list of questions. Preparation is for courage, not control — once in the room, let it go. His conversation with Larry King was a masterclass on air."},
{n:"Adam Grant",e:"#399",c:"media",d:"Wharton organizational psychologist, author of Give and Take, Think Again. Writes in two-week intensive bursts then stops completely. Most cited Wharton professor. Volume of output as the best predictor of creative success. Argues we should think like scientists — form hypotheses, test them, update."},
{n:"Daniel Pink",e:"#305",c:"media",d:"Author of Drive, When, A Whole New Mind. Human performance follows a predictable daily arc. Schedule your most cognitively demanding work in your peak window (late morning for most). Routine tasks in the trough. Creative brainstorming in recovery (late afternoon/evening)."},
{n:"Dan Carlin",e:"#20",c:"media",d:"Creator of Hardcore History (5–6 hour episodes, tens of millions of downloads). History as study of human psychology under extreme conditions. Reads primary sources for months per episode. A masterpiece of the long-form format at a time when everyone said shorter was better."},
{n:"Walter Isaacson",e:"#273",c:"media",d:"Biographer of Steve Jobs, Leonardo da Vinci, Benjamin Franklin, Einstein. Finds the pattern that runs through a person's entire life, not just their famous moments. Greatest innovators all refused to specialize — curiosity always broader than expertise."},
{n:"Ezra Klein",e:"#208",c:"media",d:"Vox founder and political journalist. Treats every piece as a chance to genuinely understand something. Meditates daily, reads across disciplines. Candid about how his own cognitive biases shape his thinking. Builds conversations around actual curiosity rather than debate performance."},
{n:"A.J. Jacobs",e:"#211,#344",c:"media",d:"Author of The Year of Living Biblically and Drop Dead Healthy. Immersive journalism — lives the subject for a full year. Tracked every person in his morning coffee supply chain and personally thanked them all. Gratitude journalism as a practice. Stoned adulterers (with pebbles) in Central Park."},
{n:"James Altucher",e:"#18",c:"media",d:"Entrepreneur and prolific writer who lost and rebuilt his fortune multiple times. Ten ideas every morning regardless of quality — the idea muscle atrophies without use. Radically candid about his failures and depressions in ways most public figures carefully avoid."},
{n:"Greg McKeown",e:"#355",c:"media",d:"Author of Essentialism and Effortless. Disciplined pursuit of less — only essential things, done extraordinarily well. Protects large blocks of unscheduled time that most productivity-minded people fill immediately. Wrote Essentialism while at his most overcommitted."},
{n:"Gretchen Rubin",e:"#290",c:"media",d:"Author of The Happiness Project and Better Than Before. Four tendencies framework (Upholder, Questioner, Obliger, Rebel) explains why the same habit advice works brilliantly for some and fails for others. Spent a year testing happiness research in her own life before writing about it."},
{n:"Tim Urban",e:"#283",c:"media",d:"Creator of Wait But Why. Wrote 20,000-word posts that went viral. Coined the 'Panic Monster' as the only thing that defeats chronic procrastination. Argues most people live inside a story about what others think rather than their own authentic story."},
{n:"Scott Adams",e:"#106",c:"media",d:"Dilbert creator. Systems beat goals. Written affirmations: writes specific goals 15 times daily to train selective attention and build confidence through repetition. Trained hypnotist who applies persuasion science to everything he creates."},
{n:"Arianna Huffington",e:"#274",c:"media",d:"Huffington Post founder. Collapsed from exhaustion, broke her cheekbone on her desk. Now sleeps 8 hours without exception. No devices in the bedroom. Thrive Global is built on the premise that burnout is the greatest productivity lie in corporate culture."},
{n:"Kara Swisher",e:"#218",c:"media",d:"The most feared tech journalist of her generation. Doesn't care if the subject likes her. Memorizes everything, cross-references everything. Brought a CEO's own emails to an interview. 'Most executives have never been in a room with someone who actually did their homework.'"},
{n:"Cheryl Strayed",e:"#231",c:"media",d:"Author of Wild and Tiny Beautiful Things. Hiked 1,100 miles of the PCT alone while grieving her mother's death and recovering from heroin addiction. The story you're most afraid to tell is always the most important one. Writes with radical emotional honesty."},
{n:"Susan Cain",e:"#357",c:"media",d:"Author of Quiet. Spent years as a Wall Street lawyer before following her calling. Writes slowly over several years per book. Protects solitary creative work time with the rigor most extroverts use to protect their social calendar."},
{n:"Debbie Millman",e:"#214,#230,#304,#472",c:"media",d:"Brand designer, Design Matters podcast host. Assigns students a 'remarkable life' exercise: write in detail what your life looks like in 10 years if everything goes exactly as you hoped. Did this herself in 2005 and has checked off nearly every item. One of Tim's deepest recurring guest relationships."},
{n:"Doris Kearns Goodwin",e:"#335",c:"media",d:"Historian, author of Team of Rivals. Years of immersion in primary sources — diaries, letters, contemporaneous newspaper accounts — before writing a word. Reads everything aloud to test the rhythm of sentences. Her Lincoln research inspired Spielberg's film."},
{n:"Mike Rowe",e:"#157",c:"media",d:"Host of Dirty Jobs, prominent advocate for skilled trades. Argues the push toward four-year college has produced both a workforce crisis and an epidemic of purposelessness. Trained operatic baritone who sang with the Baltimore Opera before television. 'Safety third.'"},
{n:"Krista Tippett",e:"#223",c:"philosophy",d:"On Being creator and host. Reads everything a guest has ever produced, then sets it aside to meet the person as they are today. True listening requires relinquishing the desire to already know the answer. Came to her calling late — was a journalist and diplomat first."},
{n:"Alain de Botton",e:"#118,#459",c:"philosophy",d:"Philosopher and School of Life founder. Philosophy as therapy for daily emotional problems, not abstract theory. Reads Stoic and Epicurean texts as practical self-help. Has written books on love, travel, work, architecture, and religion through a therapeutic philosophical lens."},
{n:"Brandon Stanton",e:"#321",c:"media",d:"Creator of Humans of New York. Was fired from bond trading, moved to NYC with a camera and no photography training. Photographed 10,000 New Yorkers, was turned down for grants, built 25M followers purely on authenticity and genuine curiosity."},

// COMEDY
{n:"Jerry Seinfeld",e:"#485",c:"comedy",d:"Greatest TV sitcom creator of all time, still actively performing standup. Don't Break the Chain calendar method — marks a red X for every day he writes. Treats joke-writing as a craft requiring daily deliberate practice. No smartphone while working. Quality emerges from quantity of output over time."},
{n:"Dax Shepard",e:"#480",c:"comedy",d:"Actor and Armchair Expert host (one of the most listened-to podcasts in the world). 16+ years of sobriety documented in real time. Over-prepares to be able to go off-script. Credits therapy with transforming both his personal relationships and professional output."},
{n:"Penn Jillette",e:"#405",c:"comedy",d:"Magician and taller half of Penn & Teller. Lost 105 lbs starting with two weeks of only potatoes to reset his palate. Reads hundreds of books a year. Actively seeks books that challenge his existing views. Atheism and magic are philosophically linked: honest acknowledgment of what you don't know."},
{n:"Bill Burr",e:"#265",c:"comedy",d:"One of the most respected working stand-ups. Works out all new material in small clubs before performing it anywhere significant. Flies his own helicopter. Learning to pilot from scratch became his model for approaching any difficult skill."},
{n:"Mike Birbiglia",e:"#176",c:"comedy",d:"Stand-up comedian and filmmaker (Sleepwalk With Me). Has a rare sleepwalking disorder — jumped through a hotel window asleep. Rewrites shows continuously even after opening night. Bedside notebook for capturing hypnagogic fragment thoughts between waking and sleep."},
{n:"Whitney Cummings",e:"#84,#215,#454",c:"comedy",d:"Stand-up comedian and creator of 2 Broke Girls. Intensive therapy work — credits it for most of her professional success. Describes codependency as a hidden driver of overachievement. Reads psychology and neuroscience research. Builds robots as a hobby exploring AI and human connection."},
{n:"Bryan Callen",e:"#47",c:"comedy",d:"Stand-up comedian with a deeply intellectual approach. Reads Greek and Roman history and philosophy obsessively — channels these into his stand-up. Trains in martial arts daily. Advocates reading Epictetus, Marcus Aurelius, and Seneca as practical guides, not academic exercises."},
{n:"Kevin Hart",e:"#435",c:"comedy",d:"One of the most bankable comedians and actors in the world. Pre-dawn runs non-negotiable. Daily journaling. 'Positive paranoia' — anticipate all failures and prepare for each. Unusually candid about his infidelity and its consequences as one of the most important growth experiences of his life."},
{n:"Seth Rogen & Evan Goldberg",e:"#108",c:"comedy",d:"Co-writers behind Superbad, Pineapple Express, This Is the End. Their creative process is built entirely on friendship and genuine shared taste — they only make things that make each other laugh. They credit their high school friendship as the foundation of everything. Discuss the economics of comedy films in detail."},
{n:"Jerrod Carmichael",e:"#222",c:"comedy",d:"One of the most intellectually rigorous comedians of his generation. Does not watch television. Reads philosophy and literature as source material for comedy. The most ancient human questions produce the most universal laughs when framed correctly."},
{n:"Aisha Tyler",e:"#327",c:"comedy",d:"Actress, comedian, director, and author. Uses pain as creative material rather than something to overcome before creating. Reads compulsively, exercises daily. One of the most thoughtful discussions on creating as a Black woman in an industry that systematically underestimates complexity."},
{n:"Margaret Cho",e:"#43",c:"comedy",d:"Stand-up comedian and activist. Pioneer of Asian-American representation in mainstream entertainment. Practices the slow-carb diet and credits it with transforming her energy. Deeply candid about her struggles with addiction, eating disorders, and her tumultuous experience with her short-lived sitcom All-American Girl."},

// SCIENCE & HEALTH
{n:"Dr. Rhonda Patrick",e:"#12,#237",c:"science",d:"Biochemist and longevity researcher. Regular sauna use shown to reduce cardiovascular mortality by up to 63%. Heat/cold contrast therapy. Sulforaphane from broccoli sprouts as a cancer-preventive compound. Detailed food logging to track micronutrient gaps."},
{n:"Wim Hof",e:"#102",c:"science",d:"'The Iceman' — 20+ world records including 1h 53min ice bath. Ran marathons in the Arctic in shorts and across the Namib Desert without water. Had toxins injected under supervision and demonstrated voluntary immune response control. His swimming beneath 1 meter of ice and losing the hole — 'things like that happen.'"},
{n:"Dom D'Agostino",e:"#117,#172,#188",c:"science",d:"USF ketogenic diet researcher. Deadlifted 500 lbs ten times after a 7-day fast to demonstrate ketosis isn't catabolic. Extended fasting experiments. Continuous glucose monitoring. Licensed SCUBA diver studying oxygen toxicity."},
{n:"Jane Goodall",e:"#421",c:"science",d:"Primatologist and conservationist — 60 years studying chimpanzees. Credits her mother's respect for childhood curiosity as her scientific foundation. Travels 300+ days per year in her 80s. Hope as an active discipline: hope requires action, unlike passive optimism."},
{n:"Neil deGrasse Tyson",e:"#389",c:"science",d:"Astrophysicist and science communicator. Greatest skill: being wrong gracefully. The 'baloney detection kit' — cognitive tools to evaluate any claim — is more important than any specific knowledge. Stays up late, wakes late, unapologetically a night person."},
{n:"Lisa Randall",e:"#115",c:"science",d:"Harvard theoretical physicist working on extra dimensions, dark matter, the Large Hadron Collider. First woman tenured in physics at both MIT and Harvard. Climbs and hikes obsessively — mountains as thinking environment. Wrote an opera libretto."},
{n:"Jane McGonigal",e:"#93",c:"science",d:"Game designer at the Institute for the Future. Games build persistence through failure, creative problem-solving, and collaborative strategy. Designed SuperBetter recovery game after her own severe concussion. Platform used by millions dealing with health challenges."},
{n:"Paul Stamets",e:"#340",c:"science",d:"World's leading mycologist. Takes lion's mane + niacin daily for neurogenesis. Mycelial networks as planetary nervous system. Believes fungi are the most underexplored frontier in both nutrition and medicine. Believes psilocybin therapy will be one of the great medical advances of the 21st century."},
{n:"Adam Savage",e:"#370",c:"science",d:"MythBusters co-host and master maker. Best way to understand anything: make it yourself. Meticulous shop organization — every tool has a designated place. Engineering and art are inseparable disciplines. Reads obsessively and crosses disciplines constantly."},
{n:"Scott Kelly",e:"#478",c:"science",d:"NASA astronaut — 340 consecutive days on the ISS. DNA expression measurably shifted from his identical twin's during the mission. Kept detailed journal throughout. Most unexpected discovery: how much he missed trees and the smell of earth."},
{n:"Safi Bahcall",e:"#364,#382",c:"science",d:"Physicist turned biotech CEO, author of Loonshots. Phase transition model of organizations. Used self-hypnosis to cure his insomnia in under a week. Extraordinary historical cases of how great innovations were nearly killed by the organizations that should have nurtured them."},
{n:"Eric Weinstein",e:"#131",c:"science",d:"Mathematician, physicist, Thiel Capital MD. Coined 'intellectual dark web.' Most academic institutions now suppress heterodox ideas. Has spent decades on Geometric Unity, his theory of fundamental physics, developed entirely outside academia. Intellectual courage — willingness to be publicly wrong — as the rarest cognitive virtue."},
{n:"James Fadiman",e:"#66",c:"science",d:"Author of The Psychedelic Explorer's Guide. Has studied microdosing since the 1960s. 1/10th of a standard dose on a structured schedule (one day on, two days off) produces measurable improvements without perceptible effects. Collected data from hundreds of self-experimenters over decades."},
{n:"Michael Pollan",e:"#313,#365",c:"science",d:"Author of Omnivore's Dilemma, In Defense of Food, How to Change Your Mind. 'Eat food. Not too much. Mostly plants.' Personally took psilocybin, LSD, and 5-MeO-DMT in supervised settings to research psychedelic therapy. Gardens obsessively."},
{n:"Dr. Rhonda Patrick (2)",e:"#237",c:"science",d:"Second appearance exploring smart drugs, fasting protocols, and the science of fat loss. Deep dive into sulforaphane, vitamin D, and omega-3 research. Also discussed how pregnancy changes the brain."},
{n:"Dr. Andrew Weil",e:"#350",c:"medicine",d:"Founder of integrative medicine in the US. Practices 4-7-8 breathing (inhale 4, hold 7, exhale 8) — the most powerful non-pharmacological relaxation tool he knows. Studies traditional medicine systems worldwide. Grows his own food, practices fasting."},
{n:"BJ Miller",e:"#153",c:"medicine",d:"Palliative care physician who lost three limbs to electrocution as a college student. Studies how people die. Near-death transformed his relationship with beauty. 'The Man Who Studied 1,000 Deaths to Learn How to Live.'"},
{n:"John Crowley",e:"#225",c:"medicine",d:"CEO of Amicus Therapeutics. Two children diagnosed with fatal Pompe disease. Quit his job, cold-called the world's leading researcher, helped develop the therapy that saved his children's lives. Tim described this as the most extraordinary story of any guest. The basis for the film Extraordinary Measures."},
{n:"Dr. Peter Attia",e:"#50,#65,#193,#352,#398",c:"medicine",d:"Longevity physician. Zone 2 cardio as the highest-leverage longevity intervention. Extended fasting experiments (5–7 days). Continuous glucose monitoring. Tracks blood biomarkers obsessively. One of the most rigorous self-experimenters on the show across 5 appearances."},
{n:"Martin Polanco & Dan Engle",e:"#104",c:"medicine",d:"Researchers studying ibogaine for addiction treatment. Ibogaine is a psychedelic compound used in West African Bwiti tradition that has shown dramatic results for opioid addiction — including a single treatment producing lasting cessation. Discusses the challenges of getting it into mainstream clinical use."},
{n:"Martin Gibala",e:"#217",c:"medicine",d:"Exercise physiologist who designed the one-minute workout. His research showed that 3 rounds of 20-second all-out sprints (60 seconds total) produces cardiovascular adaptations comparable to 45 minutes of moderate continuous exercise. One of the show's most practically impactful episodes on fitness efficiency."},
{n:"Rhonda Patrick & Dom D'Agostino",e:"(multiple)",c:"science",d:"Tim has revisited these two more times than almost any other scientists on the show, reflecting their ongoing practical research. Patrick on sleep, sauna, and micronutrients. D'Agostino on ketosis, fasting, and hyperbaric oxygen."},

// SPORT & ATHLETICS
{n:"Laird Hamilton",e:"#89",c:"sport",d:"Greatest big-wave surfer alive. Pioneer of tow-in surfing. XPT training: weighted underwater obstacle courses + extreme sauna/cold cycling. 'Faster is not always better — calm and purposeful movement is more effective than panicked effort in the water and in life.'"},
{n:"Amelia Boone",e:"#127",c:"sport",d:"Most decorated obstacle racer in the world, consistently defeating elite men. Trains twice daily while practicing law. Mental rehearsal and treating pain as data rather than an enemy are her edges. One of the show's earliest and most impactful athletic guest appearances."},
{n:"Michael Phelps",e:"#494",c:"sport",d:"Most decorated Olympian ever (23 gold medals). Trained every day including Christmas for years. Visualized catastrophic failures — including goggles filling with water — and solved them mentally. Swam blind to a world record at Beijing 2008. Has been open about his depression and the role therapy played."},
{n:"Grant Hackett",e:"#494",c:"sport",d:"Co-guest with Michael Phelps. Australian Olympic swimming champion and Phelps's greatest rival. Has spoken candidly about his struggles with addiction and mental health after retirement. The contrast between the two champions' post-competition journeys is the most substantive part of the episode."},
{n:"Maria Sharapova",e:"#261",c:"sport",d:"Five-time Grand Slam champion who rebuilt her game twice after surgery. Religious pre-match visualization. Micro-goals rather than outcome focus during rehabilitation. Discusses the business mind she developed managing her own brand at a world-class level."},
{n:"Kelly Slater",e:"#461",c:"sport",d:"11x world surfing champion. Reads voraciously across health, nutrition, and consciousness. Each wave fully present — mindfulness as athletic practice. Designed the world's first perfect artificial wave pool. One of the show's most unexpectedly intellectual sports conversations."},
{n:"Pavel Tsatsouline",e:"#55,#57",c:"sport",d:"Former Soviet Spetnas physical training instructor who introduced the kettlebell to America. 'Greasing the groove' — frequent submaximal practice rather than maximal infrequent effort. Never train to failure. Strength is a skill. Answers 15 listener questions in the follow-up episode."},
{n:"Jerzy Gregorek",e:"#228",c:"sport",d:"Four-time world weightlifting champion who defected from communist Poland. Refugee camp. World championship. UCLA coaching. 'Easy choices, hard life. Hard choices, easy life.' The Happy Body program: 30 min daily combining strength, flexibility, and aerobic work."},
{n:"Kyle Maynard",e:"#251",c:"sport",d:"Congenital amputee who climbed Kilimanjaro and Aconcagua without prosthetics, crawling on elbows and knees. Competitive MMA fighter. 'Can't' replaced with 'haven't yet.' Most physical limitations are narrative limitations wearing a biological costume."},
{n:"Gabby Reece",e:"#89",c:"sport",d:"Pro volleyball player married to Laird Hamilton. 'Faster is not always better — calm and purposeful movement is more effective than panicked effort.' First female athlete to design a shoe for Nike."},
{n:"Triple H (Paul Levesque)",e:"#72",c:"sport",d:"WWE executive and wrestling legend. Reveals his extreme pre-match rituals that built psychological readiness. Discusses injury avoidance across a 30-year career with physical demands comparable to NFL players. His insights on Floyd Mayweather Jr. as the most psychologically prepared athlete he's ever encountered."},
{n:"Dorian Yates",e:"#235",c:"sport",d:"6x Mr. Olympia bodybuilding champion. Pioneered high-intensity training (HIT) — fewer sets, maximum intensity. Trained for only 4 days per week for under an hour per session while dominating the sport. Now practices yoga and discusses the contrast between his competitive and post-competitive health philosophies."},
{n:"Amelia Boone",e:"#127",c:"sport",d:"The world's most decorated obstacle course racing champion — first woman to win the World's Toughest Mudder. Discusses training twice daily while working as a corporate attorney. Pain as data, not signal to stop."},
{n:"Charles Poliquin",e:"#91,#198",c:"sport",d:"World-renowned strength coach who has trained Olympic athletes in 17 different sports. On the importance of individualized training: there is no one-size-fits-all program. Extensive discussion of testosterone optimization, specific supplementation protocols, and why most gym programs are fundamentally wrong."},
{n:"Mark Bell",e:"#252",c:"sport",d:"Powerlifter and inventor of the Sling Shot. Inside the world of Super Training gym in Sacramento. Discusses the subculture of elite powerlifting, geared vs. raw lifting, and his unconventional but practical approach to nutrition and recovery."},
{n:"Jason Khalipa",e:"#246",c:"sport",d:"CrossFit world champion and entrepreneur. Discusses the mental framework for becoming the fittest man on Earth. Diagnosed his daughter with leukemia mid-training: describes using his competitive mental frameworks to navigate the worst crisis of his life."},
{n:"Kelly Starrett",e:"#3,#64,#85",c:"sport",d:"Mobility coach and author of Becoming a Supple Leopard. Three appearances covering: fixing movement patterns, CrossFit's goods and bads, and the 80/20 of mobility work. Argues that most chronic pain is a movement problem, not an anatomy problem. Daily practice of 10 min mobility as non-negotiable."},

// PHILOSOPHY & SPIRITUALITY
{n:"Josh Waitzkin",e:"#2,#148,#204,#375,#412,#498",c:"philosophy",d:"National chess champion (depicted in Searching for Bobby Fischer), world Push Hands champion. 'End-spurt' learning: most demanding creative work before email. The Art of Learning is his foundational text. More return appearances than almost any other guest."},
{n:"Sam Harris",e:"#14,#87,#342,#433",c:"philosophy",d:"Neuroscientist, philosopher, meditation teacher, author. Meditates 30–60 min daily (Vipassana). No social media. Author of Waking Up, The Moral Landscape, Making Sense. Treats mindfulness as the most important thing he does."},
{n:"Brené Brown",e:"#100,#207,#409",c:"philosophy",d:"Vulnerability and shame researcher, author of Daring Greatly, Rising Strong. Daily gratitude journaling. Her most-watched TED talk was the one she drove home from mortified. Belonging requires authenticity, not performance. Her 'permission slip' practice before difficult conversations."},
{n:"Derek Sivers",e:"#125,#128,#202",c:"philosophy",d:"CD Baby founder (sold for $22M, proceeds donated to music education). 'Hell yes or no.' Lives by radical simplicity. Publishes book notes online for free. Has moved from Portland to Singapore to New Zealand, deliberately shedding possessions and obligations each time."},
{n:"Jack Kornfield",e:"#300,#414",c:"philosophy",d:"Spirit Rock Meditation Center co-founder. Trained as a monk in Thailand, Burma, and India. Teaches loving-kindness as the foundation — not just mindfulness. Genuine practice requires working with difficulty, not transcending it. Second appearance during COVID."},
{n:"Tara Brach",e:"#94",c:"philosophy",d:"Clinical psychologist and Buddhist teacher, author of Radical Acceptance. The 'trance of unworthiness' as the root of most human suffering. RAIN: Recognize, Allow, Investigate, Nurture — a two-minute field-deployable emotional regulation practice."},
{n:"Dan Harris",e:"#481",c:"philosophy",d:"ABC News anchor, author of 10% Happier. Had a live on-air panic attack traced to self-medicating depression. Makes meditation accessible to secular skeptics. Meditates 20 minutes daily without exception."},
{n:"Sharon Salzberg",e:"#277",c:"philosophy",d:"IMS co-founder and meditation teacher. The moment you notice you've been distracted is the moment of mindfulness — not a failure but the practice. Loving-kindness (metta) as a practical emotional regulation tool, not just a spiritual aspiration."},
{n:"Leo Babauta",e:"#488",c:"philosophy",d:"Zen Habits creator, minimalism advocate. Transformed his entire life through single-habit changes — one at a time, never overhauling everything simultaneously. Publishes everything without copyright since 2007. Homeschools his six children."},
{n:"Jim Dethmer",e:"#434",c:"philosophy",d:"Executive coach. Above the line/below the line framework. When you feel defensive or righteous, you're almost certainly below the line. Full responsibility for every circumstance is the only position of power. Every Silicon Valley founder he coaches has found this framework transformative."},
{n:"Esther Perel",e:"#241,#271,#418",c:"philosophy",d:"World's leading couples therapist, author of Mating in Captivity. Security and desire are in fundamental tension in long-term relationships. Speaks nine languages. Three appearances, each going deeper: the first on relationship vitality, the second on intimacy and emotional baggage, the third on relationships during quarantine."},
{n:"Michael Gervais",e:"#256",c:"philosophy",d:"Sports psychologist for Seattle Seahawks and Olympic athletes including Felix Baumgartner. FOPO (fear of other people's opinions) as the primary obstacle to peak performance. Trains attention through mindfulness to be directed at what matters."},
{n:"Jerry Colonna",e:"#373",c:"philosophy",d:"'CEO whisperer,' executive coach, former VC. Core question: 'How are you complicit in creating the conditions you say you don't want?' Left VC after depression and did deep psychological work that he now helps founders do. Most leadership problems are personal psychological problems wearing a business costume."},
{n:"Krista Tippett",e:"#223",c:"philosophy",d:"On Being creator and host. Reads everything a guest has ever produced, then sets it aside. True listening requires not arriving with the answer. Was a journalist and diplomat before finding her calling in philosophical conversation."},
{n:"Paulo Coelho",e:"#154",c:"philosophy",d:"Author of The Alchemist (65M+ copies). Writes in intense short bursts, travels nomadically. No research, no outlines. Discusses the magical realist tradition and how he has experienced moments of grace — ideas arriving complete rather than constructed."},

// MILITARY & LEADERSHIP
{n:"Gen. Stanley McChrystal",e:"#86,#88",c:"military",d:"4-star general, JSOC commander, commander of all US/coalition forces in Afghanistan. One meal per day. Wakes before 4am. Runs 8+ miles daily. Transformed JSOC by sharing all intelligence in real-time across thousands of personnel. Death of Zarqawi followed from this architecture."},
{n:"Jocko Willink",e:"#107,#187,#275,#395",c:"military",d:"Navy SEAL commander, author of Extreme Ownership and Discipline Equals Freedom. Wakes at 4:30am, photographs his watch daily. Extreme ownership. In a fourth appearance, Jocko takes over the show and interviews Tim. One of the most consistently referenced guests across all Tim's work."},
{n:"Chris Fussell",e:"#86",c:"military",d:"Former Navy SEAL Officer and aide-de-camp to General McChrystal. Co-author of Team of Teams. The Jody/pretzel jar story comes from his account of working alongside McChrystal. Now applies military organizational lessons to business consulting."},
{n:"Tim Kennedy",e:"#310",c:"military",d:"Special Forces sniper and UFC/MMA fighter. 'Hurry up and fail' as a learning philosophy — fail fast, extract the lesson, move forward. Argues that most people's problem is not that they fail but that they fail too slowly because they're too cautious to begin."},
{n:"Nick Norris",e:"#378",c:"military",d:"Navy SEAL turned obstacle racer. Discusses post-traumatic growth (as opposed to PTSD) — how adversity can become a vehicle for transformation when processed with intention. His training philosophy brings SEAL-level preparation to athletic competition."},

// ADVENTURE & EXPLORATION
{n:"Alex Honnold",e:"#160",c:"adventure",d:"First and only free solo of El Capitan (3,000 vertical feet, no rope). Preparation took years — memorized every single move. Lives in a van, eats simply. Has donated most earnings to solar energy through the Honnold Foundation. 'Not fearlessness — prepared to a point where fear had nothing new to say.'"},
{n:"Jimmy Chin",e:"#114",c:"adventure",d:"World-class alpinist, National Geographic photographer, Oscar-winning filmmaker (Free Solo, Meru). Survived an avalanche on Meru. Risk as a discipline: honest accounting of actual probability plus preparation. Daily runs and yoga as baseline maintenance."},
{n:"Sebastian Junger",e:"#161",c:"adventure",d:"Author of Tribe, War, The Perfect Storm. Embedded with US combat troops in Afghanistan's Korengal Valley. Near-fatal ruptured artery while chainsawing alone clarified what matters. Tribe argues the modern West has eliminated the conditions — shared hardship and mutual dependence — that make humans feel alive."},
{n:"David Blaine",e:"#245",c:"adventure",d:"Magician and endurance performer. Held his breath for 17 minutes live on television. Trains with Navy SEAL physiologists. Meditative state so deep during feats that time distortion becomes the primary tool. 'The real training was not physical — it was learning not to identify with the sensation of suffocation.'"},
{n:"Richard Turner",e:"#411",c:"adventure",d:"Greatest card mechanic alive — completely blind. Practices 8+ hours daily. Developed tactile discrimination that sighted people cannot achieve. Tim called it the most cognitively dissonant demonstration of deliberate practice he'd ever witnessed."},
{n:"Caroline Paul",e:"#151,#227",c:"adventure",d:"Former San Francisco firefighter, author of The Gutsy Girl. One of the first female SF firefighters. Western culture systematically teaches girls risk-aversion at the exact developmental stage boys learn to embrace it. Flies planes, surfs, and paraglides."},
{n:"Dita Von Teese",e:"#379",c:"adventure",d:"Queen of burlesque who singlehandedly revived an art form. Built an international career without a label or studio through craft, theatrical vision, and direct audience relationship. Owns her image completely. Treats her art as a luxury product."},

// MUSIC
{n:"Rick Rubin",e:"#76",c:"music",d:"Most important record producer of the last 20 years (Beastie Boys, Johnny Cash, Jay-Z, Metallica, AC/DC, Red Hot Chili Peppers). Lost 135+ lbs by resetting circadian rhythm with morning sunlight. Daily TM. Daily sauna + ice bath. The entire interview was conducted inside a 200°F barrel sauna."},
{n:"Mike Shinoda",e:"#21",c:"music",d:"Linkin Park co-founder behind 60M+ album sales. Treats the studio as daily discipline rather than inspiration. Advocates shipping imperfect creative work consistently over waiting for perfection."},
{n:"Amanda Palmer",e:"#67,#368",c:"music",d:"Singer-songwriter who raised $1.2M on Kickstarter — the most successful music crowdfunding campaign of its era. The Art of Asking argues the inability to ask is rooted in believing you're not worth helping. Crashes on fans' couches during tours as relationship-building."},
{n:"Kaskade",e:"#141",c:"music",d:"EDM pioneer. Mormon faith provides discipline and community that counteracts the chaos of touring. Meditates daily, runs marathons, clean-living in an excess-defined industry. Approaches music production as a devotional practice."},
{n:"Sia",e:"#452",c:"music",d:"Behind some of the most-streamed songs in history (Chandelier, Cheap Thrills, Titanium). Ghost-wrote for major artists for years before reinventing herself with a carefully constructed visual identity. Openly discusses bipolar disorder and addiction. Wrote Chandelier in a morning."},
{n:"The Glitch Mob (Justin Boreta)",e:"#62",c:"music",d:"One of the founding members of the EDM band The Glitch Mob. The show covers how they built a grassroots following through file-sharing before the streaming era, their approach to live performance as an emotional experience, and how the trio's creative dynamic functions."},
{n:"Dan Carlin",e:"#20",c:"media",d:"Creator of Hardcore History. His approach to music and history: both are fundamentally about transporting the listener to a different time and emotional state. The format of 5–6 hour episodes was deliberately chosen against all conventional podcasting wisdom."},
{n:"Kaskade & Sekou Andrews",e:"#141",c:"music",d:"DJ Kaskade paired with spoken word artist Sekou Andrews. Kaskade on the discipline of production in electronic music. Andrews on the craft of spoken word poetry as a performance discipline. An unusual pairing that produced one of the show's most creatively interesting episodes."},
{n:"Amanda Palmer",e:"#368",c:"music",d:"Second appearance, titled 'On Creativity, Pain and Art.' Deeper dive into her creative process during grief (she lost her friend Anthony Martignetti during the writing period), how she writes songs about difficult emotions, and the relationship between personal pain and artistic expression."},
{n:"Stewart Copeland",e:"#262",c:"music",d:"Founding drummer of The Police, widely considered one of the top 10 drummers of all time. Also spent years in the CIA — his father was the CIA's Middle East station chief. Composes film scores. Tim trained with Copeland and then performed as drummer for Foreigner in front of a sold-out auditorium on his TV show."},
{n:"Nicholas McCarthy",e:"#174",c:"music",d:"Concert pianist who was born without his right hand. Teaches himself to play using only his left hand — defying virtually all conventional musical wisdom about what one hand can do at the piano. Pushes the boundaries of what's considered technically possible and redefines limitation."},

// FOOD & CRAFT
{n:"Samin Nosrat",e:"#339",c:"food",d:"Author of Salt, Fat, Acid, Heat. Teaches cooking through principles rather than recipes. Apprenticed at Chez Panisse under Alice Waters. Fear of cooking is almost always fear of not following a recipe exactly. Once you understand the mechanism, you can improvise freely."},
{n:"Nick Kokonas",e:"#341,#429",c:"food",d:"Alinea co-owner and Tock founder. He and Grant Achatz won against late-stage tongue cancer. Achatz designed menus during chemotherapy while unable to taste his own food. Disrupted OpenTable's reservation monopoly. Cooking as a form of emotional communication."},
{n:"Eric Ripert",e:"#268",c:"food",d:"Le Bernardin chef (three Michelin stars for decades). Buddhist meditator — practices every morning, attends extended Tibetan retreats. Spiritual practice and culinary craft are fundamentally integrated. Equanimity from practice enables leading one of the world's most demanding kitchens."},
{n:"Joshua Skenes",e:"#156",c:"food",d:"Chef behind Saison restaurant in San Francisco, which earned three Michelin stars and was for a time one of the world's most expensive restaurants. Approaches cooking as a spiritual and philosophical practice as much as a culinary one. Obsessive about fire — the restaurant's centerpiece is an open-fire hearth."},
{n:"Andrew Zimmern",e:"#40",c:"food",d:"Host of Bizarre Foods. Candid about his addiction and recovery — he was homeless in New York City before finding his way into the food world. Discusses simple cooking tricks he's learned from eating in every country. One of the show's early candid discussions of addiction and recovery."},
{n:"Mark Bittman",e:"#205",c:"food",d:"New York Times food columnist and author of How to Cook Everything. Makes the case for simple, technique-based cooking over recipe-following. Discusses the systemic changes required to fix the American food industry. Advocates for what he calls VB6: vegan before 6pm."},
{n:"Sam Kass",e:"#82",c:"food",d:"White House Chef for the Obama family. Cooked for state dinners, fed the First Family daily, and simultaneously served as the White House's senior policy advisor for nutrition. One of the most unusual job combinations in American history."},

// POLITICS & PUBLIC SERVICE
{n:"Cory Booker",e:"#233",c:"politics",d:"US Senator from New Jersey. Moved into Newark public housing for 4+ months as mayor. Went on a 10-day hunger strike during a tense city standoff. Reads constituent letters first thing every morning. Daily vegan, daily meditator."},
{n:"Madeleine Albright",e:"#437",c:"politics",d:"First female US Secretary of State. Built career by being overprepared for every meeting. Uses a brooch collection as diplomatic signals. Leg-pressed 450 lbs in her 80s. One of the most unexpected athletic disclosures in the show's history."},
{n:"Frank Blake",e:"#303",c:"politics",d:"Former Home Depot CEO who built a remarkable culture of random kindness and recognition at scale. Wrote personal thank-you letters to employees who went above and beyond. Discusses how to operationalize gratitude across a company with 400,000 employees."},
{n:"Will MacAskill",e:"#120",c:"philosophy",d:"Philosopher, Oxford professor, co-founder of Effective Altruism. Argues that most charitable giving is ineffective because we don't rigorously evaluate impact. How do you do the most good you can do? His framework applies cost-effectiveness analysis to moral choices."},
{n:"Phil Zimbardo",e:"#226",c:"philosophy",d:"Stanford professor who ran the infamous Stanford Prison Experiment. Discusses what it revealed about how ordinary people can commit atrocities under the right situational pressures. His book The Lucifer Effect. Also discusses his work on the psychology of heroism and how to cultivate heroic tendencies."},
];

// ─── HABITS ────────────────────────────────────────────────────────────────
const H=[
{c:"morning",t:"4:30am wake + immediate exercise",s:"Jocko Willink — ep. #107",d:"Wakes at 4:30am, photographs his watch and posts to social media for accountability, then trains immediately. The morning belongs entirely to you before the world creates demands. The photograph is not for followers — it's for himself."},
{c:"morning",t:"Morning sunlight exposure",s:"Rick Rubin — ep. #76",d:"On advice from trainer Phil Mafetone, Rubin began going outside for 20 minutes immediately upon waking — naked if possible. This reset his completely inverted circadian rhythm within weeks, shifting from 3am–noon to 9pm–7am and enabling a 135-lb weight loss."},
{c:"morning",t:"10-minute 'priming' ritual",s:"Tony Robbins — ep. #37",d:"Three-part morning ritual: kapalabhati pranayama breathing, a gratitude practice focused on three specific real moments (not abstractions), and visualization of what he wants to accomplish that day. He calls this priming the mind like an engine."},
{c:"morning",t:"Writing before any external input",s:"Seth Godin — ep. #138 / Josh Waitzkin — ep. #375",d:"Both Godin and Waitzkin independently do cognitively demanding creative work before any contact with messages or notifications. Godin blogs every morning. Waitzkin spends his first hours on his most important thinking problems. Email is reactive — the morning belongs to creation."},
{c:"morning",t:"No phone until a defined trigger",s:"Naval Ravikant / Jocko Willink / Jerry Seinfeld",d:"All three protect the early morning from the smartphone — which they view as an anxiety-and-comparison machine. The phone is only consulted after a defined trigger: workout, journaling, or first writing block."},
{c:"morning",t:"Read constituent letters before any briefing",s:"Cory Booker — ep. #233",d:"Reads direct, unfiltered communications from real constituents — not staff summaries, not news. The moment you stop reading about real people's problems, you start optimizing for political problems instead."},
{c:"morning",t:"Exercise before any external information",s:"Bob Iger — ep. #406 / Kevin Hart — ep. #435",d:"Both wake before 5am and exercise before consuming any information — news, email, or social media. Iger described this as giving him physical and mental clarity before the demands of leading Disney arrive."},
{c:"mindset",t:"Happiness as a learnable skill",s:"Naval Ravikant — ep. #97,#136",d:"Happiness is not a personality trait or result of external circumstances — it is a skill that can be deliberately practiced. Naval uses meditation, reading, and eliminating draining relationships. Personal rule: never do anything he deeply doesn't want to do."},
{c:"mindset",t:"Discipline equals freedom",s:"Jocko Willink — ep. #275",d:"The more disciplines you impose on yourself, the more freedom you experience. People with ironclad routines don't need willpower in the moment — the decision is already made. Freedom is downstream of discipline, not in opposition to it."},
{c:"mindset",t:"Fulfillment filter — what do you want on your deathbed?",s:"Tony Robbins — ep. #178",d:"Robbins distinguishes achievement (accumulating things) from fulfillment (meaning). Most people unconsciously sacrifice the latter for the former. His clients imagine their 80-year-old self looking back, and use that as a decision filter."},
{c:"mindset",t:"Extreme ownership — own every failure",s:"Jocko Willink — ep. #107",d:"In SEAL teams, every failure was owned by the leader — not blamed downward. If a subordinate fails, the leader failed. Blaming others leaves you powerless. Owning everything gives you agency over outcomes."},
{c:"mindset",t:"Beginner's mind in every domain",s:"Josh Waitzkin — ep. #2,#375",d:"After becoming national chess champion, Waitzkin began martial arts as a complete white belt. Carrying expertise as identity prevents deep learning. He recommends intentionally pursuing something you're terrible at every few years."},
{c:"mindset",t:"Contrarian question: what do few believe that is true?",s:"Peter Thiel — ep. #28",d:"'What important truth do very few people agree with you on?' Great businesses and great lives are built on non-consensus beliefs that turn out to be correct. Consensus thinking produces average outcomes at best."},
{c:"mindset",t:"'Hell yes or no' — the Sivers rule",s:"Derek Sivers — ep. #125,#128",d:"If the gut reaction is anything less than an enthusiastic 'hell yes!', the answer is no. The middle ground — 'sure, I guess' — fills your schedule with things you don't love and prevents the great from arriving."},
{c:"mindset",t:"Above the line / below the line awareness",s:"Jim Dethmer — ep. #434",d:"You're always in one of two states: above the line (open, curious, responsible) or below the line (defensive, closed, victim). The moment you feel righteous or defensive in a conflict, you're almost certainly below the line. Pause and ask: 'Where am I right now?'"},
{c:"mindset",t:"Optimism as active leadership practice",s:"Bob Iger — ep. #406",d:"Optimism is not a personality trait — it is a leadership choice requiring daily maintenance. Leaders who display anxiety spread it through organizations faster than any memo. Iger projects calm certainty even in crisis."},
